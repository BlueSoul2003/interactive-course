<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karasuno Training Camp - IGCSE Science</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .blank-space {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            margin: 0.25rem;
            border-radius: 0.25rem;
            font-weight: 800;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            border-bottom: 4px solid;
        }
        .blank-hidden {
            background-color: #e5e7eb;
            color: transparent;
            border-color: #000;
        }
        .blank-hidden:hover { background-color: #d1d5db; }
        .blank-revealed {
            background-color: #f97316; /* orange-500 */
            color: white;
            border-color: #c2410c; /* orange-700 */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transform: scale(1.05);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="min-h-screen bg-neutral-900 text-gray-100 selection:bg-orange-500 selection:text-white flex flex-col">

    <!-- Global Home Button -->
    <a href="../../../../../index.html" class="fixed top-4 left-4 bg-white/90 backdrop-blur shadow-md text-gray-700 p-3 rounded-full hover:bg-gray-50 z-50 flex items-center justify-center border border-gray-200 transition-all hover:scale-105 active:scale-95" title="Back to Home">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
    </a>

    <!-- HEADER: Karasuno Theme -->
    <header class="bg-black border-b-4 border-orange-500 p-4 shadow-lg sticky top-0 z-10">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-orange-500 text-black px-3 py-1 rounded-full font-black text-xl italic tracking-tighter">
                    Karasuno
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-wide">Training Camp</h1>
                    <p class="text-xs text-orange-400">Chapter 7: Diet and Growth (IGCSE Science)</p>
                </div>
            </div>
            
            <div id="stage-nav" class="hidden md:flex space-x-2">
                <!-- Nav buttons generated by JS -->
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-grow flex flex-col items-center justify-center p-4 max-w-4xl mx-auto w-full relative">
        
        <!-- QUESTION VIEW -->
        <div id="question-view" class="w-full">
            <!-- Stage Title & Progress -->
            <div class="mb-6 flex justify-between items-end">
                <div>
                    <h2 id="stage-title" class="text-2xl md:text-3xl font-black text-orange-500 flex items-center space-x-3">
                        <i id="stage-icon" class="fa-solid fa-heartbeat"></i>
                        <span id="stage-name">Stage Title</span>
                    </h2>
                </div>
                <div class="text-right">
                    <span id="q-current" class="text-4xl font-black text-white">1</span>
                    <span id="q-total" class="text-xl font-bold text-gray-500"> / 18</span>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="w-full bg-gray-800 rounded-full h-2.5 mb-8 overflow-hidden">
                <div id="progress-bar" class="h-2.5 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
            </div>

            <!-- QUESTION CARD -->
            <div id="question-card" class="bg-white text-black p-8 rounded-xl shadow-2xl border-4 border-black relative cursor-pointer transform transition-transform">
                <!-- Decorative Corner -->
                <div class="absolute -top-4 -left-4 w-8 h-8 bg-orange-500 border-4 border-black rounded-full z-10"></div>
                
                <p id="question-text" class="text-2xl md:text-3xl font-medium leading-relaxed tracking-wide text-gray-800">
                    <!-- Question injected here -->
                </p>

                <!-- Interaction Hint -->
                <div class="mt-12 flex justify-end items-center">
                    <p id="hint-text" class="text-sm font-bold text-gray-400 mr-4 animate-pulse">
                        Press SPACE to reveal answer
                    </p>
                    <button id="action-btn" class="flex items-center space-x-2 px-6 py-3 rounded-lg font-bold text-lg border-2 border-black transition-colors bg-orange-500 text-black hover:bg-orange-400">
                        <span id="btn-text">Reveal</span>
                        <i id="btn-icon" class="fa-solid fa-check-circle"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- STAGE COMPLETE SCREEN -->
        <div id="complete-view" class="w-full bg-black border-4 border-orange-500 p-8 rounded-xl text-center space-y-6 hidden">
            <i class="fa-solid fa-trophy text-6xl text-orange-500 mx-auto"></i>
            <h2 class="text-4xl font-black text-white uppercase tracking-widest">Stage Cleared!</h2>
            <p id="complete-msg" class="text-xl text-gray-400">Nice receive! You've mastered all concepts in this chapter.</p>
            
            <div class="pt-8 flex justify-center space-x-4">
                <button onclick="changeStage(currentStageIdx)" class="flex items-center px-6 py-3 bg-gray-800 text-white rounded-lg font-bold hover:bg-gray-700 transition">
                    <i class="fa-solid fa-rotate-left mr-2"></i> Play Again
                </button>
                
                <button id="next-stage-btn" onclick="changeStage(currentStageIdx + 1)" class="flex items-center px-6 py-3 bg-orange-500 text-black rounded-lg font-bold hover:bg-orange-400 transition hidden">
                    <i class="fa-solid fa-play mr-2"></i> Next Stage
                </button>
            </div>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="text-center p-4 text-gray-600 text-sm font-bold">
        <p>Tip: Use <kbd class="bg-gray-800 px-2 py-1 rounded text-orange-400">Spacebar</kbd> or <kbd class="bg-gray-800 px-2 py-1 rounded text-orange-400">→</kbd> to go forward, and <kbd class="bg-gray-800 px-2 py-1 rounded text-orange-400">←</kbd> to go back.</p>
    </footer>

    <script>
        // --- DATA: ALL 70 QUESTIONS EXTRACTED FROM WORKSHEET ---
        const STAGES = [
            {
                title: "Stage 1: Karasuno Cafeteria Secrets (7.1 Nutrients)",
                icon: "fa-heartbeat",
                color: "bg-orange-500",
                questions: [
                    "[[Nutrients]] are essential chemical substances found in our food that the body requires to survive, grow, and repair itself.",
                    "A healthy human body needs seven main components from food: carbohydrates, proteins, fats (lipids), vitamins, [[minerals]], [[water]], and [[fibre]].",
                    "[[Carbohydrates]] are the body's primary, most rapid, and most important source of energy.",
                    "Starchy carbohydrates are [[complex]] carbohydrates that release energy slowly; they are found in staple foods like [[potatoes]], [[bread]], [[rice]], and pasta.",
                    "Sugary carbohydrates are [[simple]] carbohydrates that provide quick energy spikes, commonly found in [[fruits]], [[honey]], and sweets.",
                    "[[Proteins]] are structural building blocks crucial for the growth of new cells and the repair of damaged tissues in the body.",
                    "Excellent sources of dietary protein include [[meat]], [[fish]], [[eggs]], [[dairy products]], beans, and lentils.",
                    "During digestion, proteins are broken down into smaller, absorbable building blocks called [[amino acids]].",
                    "Fats and oils (lipids) provide a highly concentrated, long-term [[energy]] store for the body, containing more energy per gram than carbohydrates.",
                    "Generally, fats are [[solid]] at room temperature (like butter or animal fat), while oils are [[liquid]] at room temperature (like olive oil or sunflower oil).",
                    "A specialized layer of fat stored under the skin acts as thermal [[insulation]] to keep the body warm in cold environments.",
                    "[[Vitamins]] are complex organic substances required in very small, trace amounts to maintain normal bodily functions and prevent diseases.",
                    "Vitamin [[C]] is a specific vitamin vital for maintaining healthy skin, strong gums, and ensuring the rapid healing of wounds (found heavily in citrus fruits).",
                    "[[Minerals]] are inorganic elements that the body needs in small quantities for various structural and functional roles.",
                    "[[Calcium]] is a major mineral responsible for building and maintaining strong, dense bones and teeth (found in dairy and leafy greens).",
                    "Iron is an essential mineral needed for the production of [[haemoglobin]], the red pigment inside red blood cells that carries [[oxygen]].",
                    "[[Water]] acts as a universal solvent in the body, making up about 60-70% of human body weight and transporting dissolved substances.",
                    "Fibre (roughage) is mostly made of plant cell walls (cellulose); although humans cannot digest it, it adds necessary bulk to food to help intestinal muscles push waste through, preventing [[constipation]]."
                ]
            },
            {
                title: "Stage 2: The Stamina Scale (7.2 A Balanced Diet)",
                icon: "fa-bullseye",
                color: "bg-blue-500",
                questions: [
                    "A [[balanced]] diet is defined as consuming all the essential nutrients (carbs, proteins, fats, vitamins, minerals, water, fibre) in the correct proportions and quantities.",
                    "Because no single food contains every single nutrient we need, eating a wide, colorful [[variety]] of foods is absolutely necessary.",
                    "Daily [[energy]] requirements are not identical for everyone; they vary significantly based on multiple physiological and lifestyle factors.",
                    "Age is a major factor: growing children and teenagers require significantly more [[energy]] and protein relative to their body size than older adults do.",
                    "Gender also plays a role: on average, males tend to have a naturally higher [[muscle]] mass and therefore slightly higher daily energy needs than females.",
                    "A person's activity level heavily influences their diet: athletes or manual laborers need a much higher intake of [[energy-yielding]] foods than someone sitting at a desk.",
                    "Pregnant women have unique dietary needs, requiring additional nutrients—particularly [[calcium]], [[iron]], and [[protein]]—to support the rapidly developing baby.",
                    "The energy we get from food is scientifically measured in units called [[kilojoules (kJ)]] or [[kilocalories (kcal)]] (commonly just called calories).",
                    "To maintain a stable, healthy body weight, the energy taken in from eating food must perfectly [[equal]] the energy used up by the body's processes and physical activity.",
                    "Reading and interpreting nutritional [[labels]] on food packaging is a critical life skill for managing and maintaining a balanced diet.",
                    "Nutritional labels almost always provide information \"[[per 100g]]\" of food, making it easy to mathematically compare the healthiness of different products.",
                    "These labels help consumers monitor their intake of total [[fat]], [[sugar]], and [[salt]], all of which should be consumed in moderation.",
                    "[[Saturated]] fats, often found in high amounts in animal products and processed foods, are linked to higher blood [[cholesterol]] levels and an increased risk of heart disease.",
                    "Consistently high salt intake can lead to high blood [[pressure]], which drastically increases the risk of strokes and cardiovascular issues later in life.",
                    "A truly healthy diet involves not just balancing energy, but ensuring a rich, diverse supply of [[micronutrients]] (vitamins and minerals).",
                    "The term \"[[empty calories]]\" refers to highly processed foods (like soda or candy) that are packed with energy (sugars and fats) but completely lack beneficial [[vitamins]], [[minerals]], and [[fibre]]."
                ]
            },
            {
                title: "Stage 3: The Obsession with Height! (7.3 Growth & Health)",
                icon: "fa-trophy",
                color: "bg-green-500",
                questions: [
                    "[[Malnutrition]] is a broad medical condition resulting from an unbalanced diet; it can mean eating too much, eating too little, or missing one specific nutrient entirely.",
                    "[[Starvation]] is an extreme and severe form of malnutrition where a person's total daily energy intake is far below what they need to survive.",
                    "[[Obesity]] is a form of malnutrition that occurs when energy intake consistently exceeds energy expenditure over a long period.",
                    "In cases of obesity, the body takes the excess, unused energy from food and stores it away as layers of body [[fat]].",
                    "Being obese puts immense strain on the body and significantly increases the risk of developing serious long-term health conditions like Type 2 [[diabetes]] and coronary heart disease.",
                    "[[Deficiency]] diseases are specific, preventable illnesses caused directly by the prolonged lack of a particular vitamin or mineral in a person's diet.",
                    "[[Scurvy]] is a famous deficiency disease caused by a severe lack of Vitamin C, historically very common among sailors on long voyages without fresh fruit.",
                    "The devastating symptoms of scurvy include [[bleeding gums]], [[loose teeth]], extreme physical fatigue, and minor wounds that refuse to heal.",
                    "[[Rickets]] is a dangerous condition affecting bone development in growing children, primarily caused by a lack of Vitamin D or the mineral calcium.",
                    "Rickets leads to bones failing to harden properly, becoming [[soft]] and [[weak]], which often results in painful [[bowed legs]] and permanent skeletal deformities.",
                    "Interestingly, the human body can naturally synthesize its own Vitamin D when the skin is directly exposed to [[sunlight]].",
                    "[[Anaemia]] is a common condition caused by a deficiency of the mineral iron in the daily diet.",
                    "Without enough iron, the body cannot produce adequate amounts of [[haemoglobin]], meaning the [[red]] blood cells cannot carry enough [[oxygen]] to the body's tissues.",
                    "People suffering from anaemia often feel constantly [[exhausted]], dizzy, weak, and may look unusually pale due to poor oxygen delivery.",
                    "Beyond diet, everyday [[lifestyle]] choices play a monumental role in a person's overall physical health, cellular growth, and organ development.",
                    "Smoking is a highly destructive lifestyle choice that introduces thousands of harmful chemicals—including [[tar]] and [[carbon monoxide]]—into the respiratory and circulatory systems.",
                    "[[Nicotine]] is the highly addictive stimulant chemical found in tobacco that alters brain chemistry and makes quitting smoking exceptionally difficult.",
                    "Tar from cigarette smoke builds up and coats the inside of the lungs, damaging the tiny sweeping hairs (cilia) and significantly increasing the risk of lung [[cancer]] and chronic [[bronchitis]]."
                ]
            },
            {
                title: "Stage 4: Mechanics of a Perfect Spike (7.4 Moving the Body)",
                icon: "fa-bolt",
                color: "bg-purple-500",
                questions: [
                    "The human body requires a rigid, internal structural framework to support its shape against gravity, which is provided by the [[skeleton]].",
                    "The human skeleton has three absolutely primary functions: structural [[support]], protection of delicate internal [[organs]], and facilitating physical [[movement]].",
                    "The skull acts as a rigid, protective bone helmet that encases and shields the delicate, vital tissue of the [[brain]].",
                    "The ribcage is a bony cage that surrounds and protects the vital organs of the chest, specifically the heart and the spongy [[lungs]], from physical trauma.",
                    "Despite appearing dry and hard, bones are [[living]] tissues that contain blood vessels and require a steady supply of [[calcium]] and phosphorus to remain strong and dense.",
                    "A [[joint]] is defined as the specific anatomical location where two or more individual bones meet and articulate with one another.",
                    "Synovial joints are freely movable joints that are surrounded by a special capsule containing lubricating [[synovial fluid]], which drastically reduces internal [[friction]].",
                    "[[Cartilage]] is a very smooth, incredibly tough, rubbery tissue that covers the ends of bones at a joint, acting as a [[shock absorber]].",
                    "[[Hinge]] joints are a specific type of joint, such as those found in the [[knee]] and [[elbow]], that only allow movement in one single plane (like a door opening and closing).",
                    "[[Ball-and-socket]] joints, located in the [[hip]] and [[shoulder]], feature a rounded bone fitting into a cup-like bone, allowing for a wide, rotational range of movement in multiple directions.",
                    "[[Ligaments]] are exceptionally strong, slightly elastic bands of connective tissue that attach one [[bone]] directly to another bone, keeping joints stable and preventing painful dislocations.",
                    "[[Tendons]] are tough, completely inelastic cords of connective tissue that firmly connect [[muscles]] to [[bones]], transmitting the pulling force required for movement.",
                    "Muscles create movement through a process called [[contraction]]; when a muscle is stimulated by a nerve, its fibers shorten and thicken to generate a powerful pulling force.",
                    "A fundamental rule of human biomechanics is that muscles can only actively [[pull]] on bones; they are physically incapable of [[pushing]] bones apart.",
                    "Because muscles can only pull, they must be arranged in opposing teams called \"[[antagonistic pairs]]\" to produce reversible back-and-forth movements.",
                    "In the human arm, the [[biceps]] muscle (front of the upper arm) and [[triceps]] (back of the upper arm) form a perfect, classic antagonistic pair.",
                    "To bend (flex) the arm at the elbow joint, the biceps muscle [[contracts]] and shortens, while the [[triceps]] muscle simultaneously [[relaxes]] and stretches.",
                    "Conversely, to straighten (extend) the arm back out, the [[triceps]] muscle actively [[contracts]] to pull the bone back down while the [[biceps]] muscle completely [[relaxes]]."
                ]
            }
        ];

        // --- APP STATE ---
        let currentStageIdx = 0;
        let currentQIdx = 0;
        let blankStates = []; // Array to track individual blanks, e.g., [false, true, false]
        let isStageComplete = false;

        // --- WEB AUDIO API FOR SOUND EFFECTS (First Principles!) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(type) {
            // Initialize AudioContext on first user interaction to bypass browser autoplay blocks
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            switch(type) {
                case 'reveal':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                    gainNode.gain.setValueAtTime(0.5, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'next':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                    break;
                case 'back':
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'complete':
                    osc.type = 'sine';
                    gainNode.gain.setValueAtTime(0.3, now);
                    osc.frequency.setValueAtTime(261.63, now); // C4
                    osc.frequency.setValueAtTime(329.63, now + 0.1); // E4
                    osc.frequency.setValueAtTime(392.00, now + 0.2); // G4
                    osc.frequency.setValueAtTime(523.25, now + 0.3); // C5
                    gainNode.gain.linearRampToValueAtTime(0, now + 0.6);
                    osc.start(now);
                    osc.stop(now + 0.6);
                    break;
                case 'stage':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
                    gainNode.gain.setValueAtTime(0.4, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
            }
        }

        // --- DOM ELEMENTS ---
        const els = {
            nav: document.getElementById('stage-nav'),
            qView: document.getElementById('question-view'),
            cView: document.getElementById('complete-view'),
            qCard: document.getElementById('question-card'),
            stageTitle: document.getElementById('stage-name'),
            stageIcon: document.getElementById('stage-icon'),
            qCurrent: document.getElementById('q-current'),
            qTotal: document.getElementById('q-total'),
            progressBar: document.getElementById('progress-bar'),
            qText: document.getElementById('question-text'),
            hintText: document.getElementById('hint-text'),
            actionBtn: document.getElementById('action-btn'),
            btnText: document.getElementById('btn-text'),
            btnIcon: document.getElementById('btn-icon'),
            completeMsg: document.getElementById('complete-msg'),
            nextStageBtn: document.getElementById('next-stage-btn')
        };

        // --- INIT APP ---
        function init() {
            loadQuestion();
            buildNav();
            render();
            
            // Global Event Listener for Keyboard Controls
            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space' || e.code === 'ArrowRight') {
                    e.preventDefault();
                    handleNext();
                } else if (e.code === 'ArrowLeft') {
                    e.preventDefault();
                    handleBack();
                }
            });

            // Event Delegation for clicking individual blanks
            els.qText.addEventListener('click', (e) => {
                if (e.target.classList.contains('blank-space')) {
                    e.stopPropagation(); // Stop it from triggering the parent card click
                    const index = e.target.getAttribute('data-index');
                    // Only reveal if it's not already revealed
                    if (index !== null && !blankStates[parseInt(index)]) {
                        blankStates[parseInt(index)] = true;
                        playSound('reveal');
                        render();
                    }
                }
            });

            // Event listener for clicking anywhere on the question card
            els.qCard.addEventListener('click', () => {
                handleNext();
            });
        }

        // Setup the blanks array for the current question
        function loadQuestion() {
            const rawText = STAGES[currentStageIdx].questions[currentQIdx];
            // Count how many [[ ]] exist in the text
            const matchCount = (rawText.match(/\[\[(.*?)\]\]/g) || []).length;
            // Create an array filled with 'false' (meaning hidden) for each blank
            blankStates = new Array(matchCount).fill(false);
        }

        function buildNav() {
            els.nav.innerHTML = STAGES.map((s, idx) => `
                <button onclick="changeStage(${idx})" class="px-3 py-1 text-sm font-bold rounded transition-colors ${currentStageIdx === idx ? 'bg-orange-500 text-black' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white'}">
                    Stage ${idx + 1}
                </button>
            `).join('');
        }

        // --- CORE LOGIC ---
        function handleNext() {
            if (isStageComplete) return;

            // Find the index of the first hidden blank (from left to right)
            const nextBlankIdx = blankStates.indexOf(false);

            if (nextBlankIdx !== -1) {
                // Step 1: Reveal the *next* available blank only
                blankStates[nextBlankIdx] = true;
                playSound('reveal');
            } else {
                // Step 2: All blanks are revealed, move to next question or complete stage
                const stage = STAGES[currentStageIdx];
                if (currentQIdx < stage.questions.length - 1) {
                    currentQIdx++;
                    loadQuestion(); // Reset blanks for the new question
                    playSound('next');
                } else {
                    isStageComplete = true;
                    
                    // Save progress to Supabase
                    if (window.ProgressTracker) {
                        let stageKey = 'stage' + currentStageIdx;
                        let progressObj = {};
                        progressObj[stageKey] = 1;
                        window.ProgressTracker.save(progressObj);
                    }
                    
                    playSound('complete');
                }
            }
            render();
        }

        function handleBack() {
            if (isStageComplete) {
                // Undo stage complete, go back to last question fully revealed
                isStageComplete = false;
                const stage = STAGES[currentStageIdx];
                currentQIdx = stage.questions.length - 1;
                loadQuestion();
                blankStates = blankStates.map(() => true); 
                playSound('back');
                render();
                return;
            }

            const lastRevealedIdx = blankStates.lastIndexOf(true);
            
            if (lastRevealedIdx !== -1) {
                // Undo the last revealed blank
                blankStates[lastRevealedIdx] = false;
                playSound('back');
            } else {
                // All blanks hidden, go to previous question
                if (currentQIdx > 0) {
                    currentQIdx--;
                    loadQuestion();
                    // When going back, show previous question fully revealed so teacher can hide it step-by-step if needed
                    blankStates = blankStates.map(() => true);
                    playSound('back');
                }
            }
            render();
        }

        function changeStage(idx) {
            if (idx >= STAGES.length || idx < 0) return;
            currentStageIdx = idx;
            currentQIdx = 0;
            isStageComplete = false;
            loadQuestion();
            buildNav();
            playSound('stage');
            render();
        }

        // --- RENDER UI ---
        function render() {
            const stage = STAGES[currentStageIdx];
            const qCount = stage.questions.length;

            if (isStageComplete) {
                els.qView.classList.add('hidden');
                els.cView.classList.remove('hidden');
                els.completeMsg.innerText = `Nice receive! You've mastered all ${qCount} concepts in this chapter.`;
                if (currentStageIdx < STAGES.length - 1) {
                    els.nextStageBtn.classList.remove('hidden');
                } else {
                    els.nextStageBtn.classList.add('hidden');
                }
                return;
            }

            // Normal Question View
            els.qView.classList.remove('hidden');
            els.cView.classList.add('hidden');

            // Update Header
            els.stageTitle.innerText = stage.title;
            els.stageIcon.className = `fa-solid ${stage.icon}`;
            els.qCurrent.innerText = currentQIdx + 1;
            els.qTotal.innerText = ` / ${qCount}`;

            // Update Progress Bar
            const progressPct = (currentQIdx / qCount) * 100;
            els.progressBar.style.width = `${progressPct}%`;
            els.progressBar.className = `h-2.5 rounded-full transition-all duration-500 ease-out ${stage.color}`;

            // Parse and Inject Question Text
            let blankIndex = 0;
            const rawText = stage.questions[currentQIdx];
            const parsedText = rawText.replace(/\[\[(.*?)\]\]/g, (match, answer) => {
                const isRevealed = blankStates[blankIndex];
                const widthStyle = isRevealed ? '' : `style="min-width: ${answer.length * 1.2}rem;"`;
                const cssClass = isRevealed ? 'blank-space blank-revealed' : 'blank-space blank-hidden';
                const displayAnswer = isRevealed ? answer : answer; 
                
                // Inject the specific blankIndex into a data attribute instead of onclick
                const html = `<span class="${cssClass}" ${widthStyle} data-index="${blankIndex}">${displayAnswer}</span>`;
                blankIndex++;
                return html;
            });
            els.qText.innerHTML = parsedText;

            // Check if all blanks in the current question are revealed
            const isFullyRevealed = !blankStates.includes(false);
            const remainingBlanks = blankStates.filter(b => b === false).length;

            // Update Buttons and Hint
            if (isFullyRevealed) {
                els.hintText.innerText = 'Press SPACE to go next!';
                els.actionBtn.className = "flex items-center space-x-2 px-6 py-3 rounded-lg font-bold text-lg border-2 border-black transition-colors bg-black text-white hover:bg-gray-800";
                els.btnText.innerText = 'Next';
                els.btnIcon.className = 'fa-solid fa-chevron-right';
            } else {
                els.hintText.innerText = remainingBlanks > 1 ? `Press SPACE to reveal next blank (${remainingBlanks} left)` : 'Press SPACE to reveal final blank';
                els.actionBtn.className = "flex items-center space-x-2 px-6 py-3 rounded-lg font-bold text-lg border-2 border-black transition-colors bg-orange-500 text-black hover:bg-orange-400";
                els.btnText.innerText = 'Reveal';
                els.btnIcon.className = 'fa-solid fa-check-circle';
            }
        }

        // Start everything when DOM is completely loaded
        document.addEventListener('DOMContentLoaded', init);
    </script>
