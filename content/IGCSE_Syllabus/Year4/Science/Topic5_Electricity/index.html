<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGCSE Science: Electricity and Circuits</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0fdf4;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Custom scrollbar for textareas */
        textarea::-webkit-scrollbar {
            width: 8px;
        }

        textarea::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div style="background:#ffffff;border-bottom:1px solid #e2e8f0;padding:10px 24px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;position:sticky;top:0;z-index:1000;box-shadow:0 1px 6px rgba(0,0,0,0.07);">
    <a href="slides.pdf" target="_blank" style="display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:10px;font-weight:600;font-size:13px;color:#0369a1;text-decoration:none;">&#128196; Slides PDF</a>
    <a href="Worksheet.pdf" target="_blank" style="display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;font-weight:600;font-size:13px;color:#15803d;text-decoration:none;">&#128203; Worksheet</a>
    <a href="Answer_Key.pdf" target="_blank" style="display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:#fffbeb;border:1.5px solid #fcd34d;border-radius:10px;font-weight:600;font-size:13px;color:#92400e;text-decoration:none;">&#128273; Answer Key</a>
</div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- AUDIO ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        const playCuteSound = (isCorrect) => {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            const rand = Math.floor(Math.random() * 3);

            if (isCorrect) {
                // 3 Different Correct Sounds
                if (rand === 0) { // Coin / Ping
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(987.77, now);
                    osc.frequency.setValueAtTime(1318.51, now + 0.1);
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                } else if (rand === 1) { // Happy Arpeggio
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.setValueAtTime(659.25, now + 0.1);
                    osc.frequency.setValueAtTime(783.99, now + 0.2);
                    osc.frequency.setValueAtTime(1046.50, now + 0.3);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                    osc.start(now); osc.stop(now + 0.6);
                } else { // Chime
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, now);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    osc.start(now); osc.stop(now + 0.8);

                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2); gain2.connect(audioCtx.destination);
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(1108.73, now + 0.1);
                    gain2.gain.setValueAtTime(0.2, now + 0.1);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    osc2.start(now + 0.1); osc2.stop(now + 0.8);
                }
            } else {
                // 3 Different Wrong Sounds
                if (rand === 0) { // Boink
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.4);
                    gainNode.gain.setValueAtTime(0.4, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (rand === 1) { // Buzz
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(100, now);
                    osc.frequency.linearRampToValueAtTime(80, now + 0.3);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.linearRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else { // Wah-wah
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(250, now);
                    osc.frequency.setValueAtTime(200, now + 0.2);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.linearRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                }
            }
        };

        // --- 50 QUESTIONS DATABASE (TOPIC 5) ---
        const questionsData = [
            // Set 1: MCQ (0-9)
            { id: 1, type: 'mcq', text: "What happens to the brightness of a lamp if you use a much longer wire in your circuit?", options: ["It gets brighter", "It gets dimmer", "It stays exactly the same", "It changes color"], answer: "It gets dimmer" },
            { id: 2, type: 'mcq', text: "Which of the following materials is a good conductor of electricity?", options: ["Plastic", "Glass", "Copper", "Rubber"], answer: "Copper" },
            { id: 3, type: 'mcq', text: "What is the scientific purpose of a switch in a circuit?", options: ["To make the battery stronger", "To act as an insulator", "To open and close the circuit", "To change the color of the light"], answer: "To open and close the circuit" },
            { id: 4, type: 'mcq', text: "What do we call a circuit where all the components are joined in a single loop, one after the other?", options: ["A parallel circuit", "A series circuit", "A broken circuit", "A short circuit"], answer: "A series circuit" },
            { id: 5, type: 'mcq', text: "If you add three more lamps to a series circuit without adding extra cells (batteries), what will happen?", options: ["The lamps will shine brighter", "The lamps will burn out", "The lamps will get dimmer", "The cells will explode"], answer: "The lamps will get dimmer" },
            { id: 6, type: 'mcq', text: "Why is the metal wire on a television plug covered in plastic?", options: ["Because plastic is a conductor", "To make it look nice", "Because plastic is an insulator and prevents electric shocks", "To make the television louder"], answer: "Because plastic is an insulator and prevents electric shocks" },
            { id: 7, type: 'mcq', text: "What happens when a fuse wire burns out in a home or vehicle?", options: ["It creates a gap and purposely breaks the circuit for safety", "It makes the appliances work twice as fast", "It creates a short circuit", "It generates lightning"], answer: "It creates a gap and purposely breaks the circuit for safety" },
            { id: 8, type: 'mcq', text: "Which of the following is an example of an electrical insulator?", options: ["Iron", "Silver", "Water", "Ceramic"], answer: "Ceramic" },
            { id: 9, type: 'mcq', text: "Why is it highly dangerous to touch an electrical appliance with wet hands?", options: ["Because water makes the appliance rust", "Because water is an insulator", "Because water contains dissolved salts and acts as a conductor", "Because water will turn off the switch"], answer: "Because water contains dissolved salts and acts as a conductor" },
            { id: 10, type: 'mcq', text: "What is placed at the highest point of a tall building to protect it from lightning strikes?", options: ["A ceramic insulator", "A lightning conductor (metal rod)", "A plastic switch", "A giant fuse"], answer: "A lightning conductor (metal rod)" },

            // Set 2: True or False (10-19)
            { id: 11, type: 'tf', text: "A shorter wire in a circuit will make the lamp shine more brightly.", answer: "True" },
            { id: 12, type: 'tf', text: "Electrical devices can still work even if there is a break in the circuit.", answer: "False" },
            { id: 13, type: 'tf', text: "When a switch is \"open,\" it creates a gap that stops the flow of electricity.", answer: "True" },
            { id: 14, type: 'tf', text: "Pure water is an insulator, but tap water contains salts that make it a conductor.", answer: "True" },
            { id: 15, type: 'tf', text: "In a series circuit, if one lamp breaks, the other lamps will continue to shine.", answer: "False" },
            { id: 16, type: 'tf', text: "Electricians wear thick rubber gloves because rubber is an excellent electrical conductor.", answer: "False" },
            { id: 17, type: 'tf', text: "Power lines use glass or ceramic insulators to stop current from traveling down the metal poles.", answer: "True" },
            { id: 18, type: 'tf', text: "Lightning is a very strong, natural flash of electricity.", answer: "True" },
            { id: 19, type: 'tf', text: "Adding more cells (batteries) to a circuit will make a single lamp dimmer.", answer: "False" },
            { id: 20, type: 'tf', text: "A lightning conductor safely carries electricity down a wire to a ground rod buried in the earth.", answer: "True" },

            // Set 3: Fill in the Blanks (20-27)
            { id: 21, type: 'fill', text: "A ________ is used to break a circuit on purpose so we can control when a device is on or off.", answer: ["switch"] },
            { id: 22, type: 'fill', text: "The ________ the wire used in a circuit, the dimmer the lamp will be.", answer: ["longer"] },
            { id: 23, type: 'fill', text: "Materials that do NOT allow an electrical current to flow through them are called ________.", answer: ["insulators", "insulator"] },
            { id: 24, type: 'fill', text: "A flow of electricity through the components in a closed circuit is called an electric ________.", answer: ["current"] },
            { id: 25, type: 'fill', text: "Metals like copper, iron, and silver are excellent ________ of electricity.", answer: ["conductors", "conductor"] },
            { id: 26, type: 'fill', text: "If a device is unplugged or wires are loose, it creates an ________ connection.", answer: ["incomplete", "open"] },
            { id: 27, type: 'fill', text: "In homes, safety breakers called ________ have a wire that burns out to stop electricity if the supply is too strong.", answer: ["fuses", "fuse"] },
            { id: 28, type: 'fill', text: "When a switch is \"________\", a conductor closes the gap and completes the circuit.", answer: ["closed"] },

            // Set 4: Matching (28-32)
            { id: 29, type: 'match', text: "Rubber", options: ["A. Controls the flow of electricity by opening or closing a gap.", "B. Protects tall buildings from natural flashes of electricity.", "C. A material worn by electricians to prevent electric shocks.", "D. Provides the input energy (power) for a circuit.", "E. A highly conductive metal commonly used for wires."], answer: "C. A material worn by electricians to prevent electric shocks." },
            { id: 30, type: 'match', text: "Cell / Battery", options: ["A. Controls the flow of electricity by opening or closing a gap.", "B. Protects tall buildings from natural flashes of electricity.", "C. A material worn by electricians to prevent electric shocks.", "D. Provides the input energy (power) for a circuit.", "E. A highly conductive metal commonly used for wires."], answer: "D. Provides the input energy (power) for a circuit." },
            { id: 31, type: 'match', text: "Copper", options: ["A. Controls the flow of electricity by opening or closing a gap.", "B. Protects tall buildings from natural flashes of electricity.", "C. A material worn by electricians to prevent electric shocks.", "D. Provides the input energy (power) for a circuit.", "E. A highly conductive metal commonly used for wires."], answer: "E. A highly conductive metal commonly used for wires." },
            { id: 32, type: 'match', text: "Switch", options: ["A. Controls the flow of electricity by opening or closing a gap.", "B. Protects tall buildings from natural flashes of electricity.", "C. A material worn by electricians to prevent electric shocks.", "D. Provides the input energy (power) for a circuit.", "E. A highly conductive metal commonly used for wires."], answer: "A. Controls the flow of electricity by opening or closing a gap." },
            { id: 33, type: 'match', text: "Lightning Conductor", options: ["A. Controls the flow of electricity by opening or closing a gap.", "B. Protects tall buildings from natural flashes of electricity.", "C. A material worn by electricians to prevent electric shocks.", "D. Provides the input energy (power) for a circuit.", "E. A highly conductive metal commonly used for wires."], answer: "B. Protects tall buildings from natural flashes of electricity." },

            // Set 5: Short Answer (33-37)
            { id: 34, type: 'long', text: "Explain the main difference between an electrical conductor and an electrical insulator.", expected: "A conductor allows electrical current to pass through it easily, while an insulator blocks or does not allow electrical current to flow through it." },
            { id: 35, type: 'long', text: "What is a series circuit?", expected: "A circuit where all the components are joined in a single loop, one after the other." },
            { id: 36, type: 'long', text: "Name three common causes of a break in an electrical circuit.", expected: "An open switch, incomplete/loose connections (or unplugged devices), and faulty components (like flat cells, broken lamps, or blown fuses)." },
            { id: 37, type: 'long', text: "Why do power lines use glass or ceramic parts where the wires attach to the poles?", expected: "Glass and ceramic are insulators. They stop the electrical current from traveling from the wires down the metal poles and shocking people." },
            { id: 38, type: 'long', text: "If you have a series circuit with one cell and one lamp, what are two ways you could make the lamp dimmer?", expected: "You could add a longer wire, or you could add more lamps (or buzzers/motors) to the circuit." },

            // Set 6: Enquiry (38-41)
            { id: 39, type: 'long', text: "Safia wants to test whether a plastic spoon is a conductor or an insulator. What electrical components does she need to build a testing circuit?", expected: "She needs a cell (battery), wires, and a lamp (or buzzer)." },
            { id: 40, type: 'long', text: "Safia places the plastic spoon into her complete testing circuit. What observation will she make, and what conclusion should she draw?", expected: "She will observe that the lamp does not light up. Her conclusion should be that the plastic spoon is an insulator." },
            { id: 41, type: 'long', text: "Youssef is conducting a fair test to see how wire length affects lamp brightness. He tests a 10 cm wire and a 50 cm wire. Name two variables (things) he MUST keep exactly the same to make it a fair test.", expected: "He must use the same cell/battery, the same type of lamp, and the same thickness of wire." },
            { id: 42, type: 'long', text: "Look at Youssef's results: 10 cm wire = Bright lamp; 50 cm wire = Dim lamp. Write a scientific conclusion for his experiment.", expected: "The length of the wire affects brightness; the longer the wire used in a circuit, the dimmer the lamp will be." },

            // Set 7: Troubleshooting (42-44)
            { id: 43, type: 'long', text: "Chen builds a series circuit with a new battery, a closed switch, and a lamp. The wire is very short, but the lamp does not light up. He checks the wires and they are all tightly connected. What is the most likely faulty component causing the break?", expected: "The lamp itself is likely broken or spent (the filament inside is broken)." },
            { id: 44, type: 'long', text: "A circuit diagram shows a battery connected to two lamps, but the switch is drawn in the \"up\" position, leaving a space between the metal contacts. Will the lamps light up? Explain why.", expected: "No, the lamps will not light up because the switch is \"open,\" meaning there is a gap that breaks the circuit, stopping the flow of electricity." },
            { id: 45, type: 'long', text: "Gabriella connects a buzzer and three lamps in a series circuit using only one small cell. None of the components seem to be working. Besides a broken circuit, what is a scientific reason for this?", expected: "There are too many components in the series circuit for just one cell. The energy is spread so thin that it is not strong enough to power the lamps and buzzer." },

            // Set 8: Real-World Application (45-49)
            { id: 46, type: 'long', text: "You are holding a hairdryer with a power cord where the outer plastic covering has worn away, exposing the metal wires inside. Explain the danger of using this hairdryer.", expected: "The exposed metal wires are conductors. If you touch them, the electrical current can travel into your body, giving you a dangerous electric shock." },
            { id: 47, type: 'long', text: "Why is it highly dangerous to use that same hairdryer in a bathroom right next to a bathtub full of water?", expected: "Water (especially tap water) acts as a conductor of electricity. If the appliance touches the water, the electric current can travel through the water and shock anyone in or near it." },
            { id: 48, type: 'long', text: "A modern car has a \"fuse box\" to protect its electronics. If the car's engine suddenly sends an electrical current that is much too strong to the car radio, the radio shuts off but is not destroyed. Explain the job the fuse did to save the radio.", expected: "The fuse wire burned out/melted because of the strong current, purposely creating a break in the circuit so the dangerous electricity could not reach the radio." },
            { id: 49, type: 'long', text: "An architect is designing a new 50-story skyscraper. Explain how they should design a lightning conductor system to keep the people inside safe during a thunderstorm.", expected: "They should place a thick metal rod (like copper or aluminum) at the very top of the building, connected to a wire that runs all the way safely down the outside of the building and into a ground rod buried in the earth." },
            { id: 50, type: 'long', text: "Why does the architect in the previous question use copper for the lightning conductor system instead of ceramic?", expected: "Copper is an excellent conductor, so it will easily carry the lightning's electricity safely away. Ceramic is an insulator and would block the electricity, causing the lightning to strike and damage the building instead." }
        ];

        // Set Navigation Bounds
        const questionSets = [
            { id: 1, label: "Set 1: MCQ", start: 0 },
            { id: 2, label: "Set 2: True/False", start: 10 },
            { id: 3, label: "Set 3: Fill in Blanks", start: 20 },
            { id: 4, label: "Set 4: Matching", start: 28 },
            { id: 5, label: "Set 5: Short Answer", start: 33 },
            { id: 6, label: "Set 6: Enquiry", start: 38 },
            { id: 7, label: "Set 7: Troubleshoot", start: 42 },
            { id: 8, label: "Set 8: Real-World", start: 45 }
        ];

        const getActiveSetId = (index) => {
            if (index < 10) return 1;
            if (index < 20) return 2;
            if (index < 28) return 3;
            if (index < 33) return 4;
            if (index < 38) return 5;
            if (index < 42) return 6;
            if (index < 45) return 7;
            return 8;
        };

        const getSetName = (index) => {
            const setObj = questionSets.find(s => s.id === getActiveSetId(index));
            return setObj ? setObj.label : "Questions";
        };

        // --- MAIN APPLICATION COMPONENT ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('presentation');


            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [userInputs, setUserInputs] = useState({});
            const [isCompleted, setIsCompleted] = useState({});
            const [feedback, setFeedback] = useState(null);
            const [showSelfGrade, setShowSelfGrade] = useState(false);

            const q = questionsData[currentQIndex];

            useEffect(() => {
                setFeedback(null);
                setShowSelfGrade(false);
            }, [currentQIndex]);

            const handleInput = (val) => {
                setUserInputs(prev => ({ ...prev, [currentQIndex]: val }));
            };

            const checkAnswer = () => {
                const input = userInputs[currentQIndex];
                if (!input) {
                    setFeedback({ type: 'error', msg: 'Please provide an answer first!' });
                    return;
                }

                if (q.type === 'mcq' || q.type === 'tf' || q.type === 'match') {
                    if (input === q.answer) markCorrect();
                    else markWrong();
                } else if (q.type === 'fill') {
                    const cleanInput = input.trim().toLowerCase();
                    const isRight = q.answer.some(ans => cleanInput === ans.toLowerCase());
                    if (isRight) markCorrect();
                    else markWrong();
                } else if (q.type === 'long') {
                    setShowSelfGrade(true);
                }
            };

            const markCorrect = () => {
                playCuteSound(true);
                setFeedback({ type: 'success', msg: 'Correct! Great job!' });
                setIsCompleted(prev => ({ ...prev, [currentQIndex]: true }));
            };

            const markWrong = () => {
                playCuteSound(false);
                setFeedback({ type: 'error', msg: 'Not quite right. Try again!' });
            };

            const handleSelfGrade = (wasCorrect) => {
                if (wasCorrect) {
                    markCorrect();
                } else {
                    markWrong();
                    setShowSelfGrade(false);
                }
            };

            const nextQuestion = () => {
                if (currentQIndex < questionsData.length - 1) setCurrentQIndex(currentQIndex + 1);
            };

            const prevQuestion = () => {
                if (currentQIndex > 0) setCurrentQIndex(currentQIndex - 1);
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-4 md:p-8">
                    {/* Header */}
                    <header className="w-full max-w-6xl bg-white rounded-xl shadow-md p-6 mb-6 text-center border-t-4 border-green-600">
                        <h1 className="text-3xl font-bold text-green-700">IGCSE Year 4 Science</h1>
                        <h2 className="text-xl text-gray-600 mt-2 font-semibold">Topic 5: Electricity and Circuits</h2>
                    </header>

                    {/* Navigation Tabs */}
                    <div className="w-full max-w-6xl flex space-x-2 mb-6">
                        <button
                            onClick={() => setActiveTab('presentation')}
                            className={`flex-1 py-3 rounded-t-lg font-bold text-lg transition-colors border-b-4 ${activeTab === 'presentation' ? 'bg-white text-green-700 border-green-600 shadow-md' : 'bg-green-50 text-gray-500 border-transparent hover:bg-green-100'}`}>
                            📺 Presentation View
                        </button>
                        <button
                            onClick={() => setActiveTab('questions')}
                            className={`flex-1 py-3 rounded-t-lg font-bold text-lg transition-colors border-b-4 ${activeTab === 'questions' ? 'bg-white text-green-700 border-green-600 shadow-md' : 'bg-green-50 text-gray-500 border-transparent hover:bg-green-100'}`}>
                            📝 Interactive Questions (50)
                        </button>
                    </div>

                    {/* Content Area */}
                    <div className="w-full max-w-6xl bg-white rounded-b-xl rounded-tr-xl shadow-xl overflow-hidden min-h-[650px] flex flex-col">

                        {/* --- PRESENTATION TAB --- */}
                        {activeTab === 'presentation' && (
                            <div className="flex flex-col h-full flex-grow fade-in" style={{padding: '16px'}}>
                                <h3 className="text-xl font-bold mb-4" style={{color: '#1e293b'}}>Presentation Slides</h3>
                                <div style={{flex: 1, background: '#f1f5f9', borderRadius: '12px', overflow: 'hidden', minHeight: '540px', position: 'relative'}}>
                                    <iframe src="slides.pdf" style={{position: 'absolute', inset: 0, width: '100%', height: '100%', border: 'none'}} title="Presentation Slides"></iframe>
                                </div>
                            </div>
                        )}

                        {/* --- QUESTIONS TAB --- */}
                        {activeTab === 'questions' && (
                            <div className="flex flex-col h-full flex-grow p-6 md:p-10 fade-in">

                                {/* Set Navigation Menu */}
                                <div className="flex overflow-x-auto space-x-3 pb-4 mb-6 hide-scrollbar border-b border-gray-200">
                                    {questionSets.map(set => (
                                        <button
                                            key={set.id}
                                            onClick={() => {
                                                setCurrentQIndex(set.start);
                                                setFeedback(null);
                                                setShowSelfGrade(false);
                                            }}
                                            className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all ${getActiveSetId(currentQIndex) === set.id
                                                    ? 'bg-green-600 text-white shadow-md transform scale-105'
                                                    : 'bg-green-50 text-green-700 hover:bg-green-100 hover:shadow'
                                                }`}
                                        >
                                            {set.label}
                                        </button>
                                    ))}
                                </div>

                                {/* Question Header */}
                                <div className="flex justify-between items-center mb-6">
                                    <span className="text-green-700 font-bold uppercase tracking-wider text-lg">{getSetName(currentQIndex)}</span>
                                    <span className="bg-gray-800 text-white py-1 px-4 rounded-full font-bold text-sm tracking-widest shadow-inner">
                                        Q: {currentQIndex + 1} / 50
                                    </span>
                                </div>

                                {/* Question Body */}
                                <div className="flex-grow">
                                    <h3 className="text-2xl font-semibold text-gray-800 mb-8 whitespace-pre-wrap leading-relaxed">{q.text}</h3>

                                    {/* MCQ / Match Options */}
                                    {(q.type === 'mcq' || q.type === 'match') && (
                                        <div className="space-y-3">
                                            {q.options.map((opt, i) => (
                                                <button
                                                    key={i}
                                                    onClick={() => !isCompleted[currentQIndex] && handleInput(opt)}
                                                    className={`w-full text-left p-4 rounded-lg border-2 font-medium transition-all ${userInputs[currentQIndex] === opt
                                                            ? (isCompleted[currentQIndex] ? 'bg-green-100 border-green-500 text-green-900' : 'bg-blue-50 border-blue-500 text-blue-900')
                                                            : 'bg-white border-gray-200 hover:border-green-300 hover:bg-green-50'
                                                        } ${isCompleted[currentQIndex] ? 'cursor-default' : 'cursor-pointer'}`}
                                                >
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {/* True / False Options */}
                                    {q.type === 'tf' && (
                                        <div className="flex space-x-6">
                                            {['True', 'False'].map((opt) => (
                                                <button
                                                    key={opt}
                                                    onClick={() => !isCompleted[currentQIndex] && handleInput(opt)}
                                                    className={`flex-1 p-6 rounded-lg border-2 text-2xl font-bold transition-all ${userInputs[currentQIndex] === opt
                                                            ? (isCompleted[currentQIndex] ? 'bg-green-100 border-green-500 text-green-900' : 'bg-blue-50 border-blue-500 text-blue-900')
                                                            : 'bg-white border-gray-200 hover:border-green-300'
                                                        } ${isCompleted[currentQIndex] ? 'cursor-default' : 'cursor-pointer'}`}
                                                >
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {/* Fill in the Blanks */}
                                    {q.type === 'fill' && (
                                        <div>
                                            <input
                                                type="text"
                                                disabled={isCompleted[currentQIndex]}
                                                placeholder="Type your one-word answer here..."
                                                value={userInputs[currentQIndex] || ''}
                                                onChange={(e) => handleInput(e.target.value)}
                                                className={`w-full p-4 border-2 rounded-lg text-xl focus:outline-none focus:ring-2 focus:ring-green-500 ${isCompleted[currentQIndex] ? 'bg-green-50 border-green-500 text-green-900 font-bold shadow-inner' : 'border-gray-300'}`}
                                                onKeyDown={(e) => { if (e.key === 'Enter') checkAnswer(); }}
                                            />
                                        </div>
                                    )}

                                    {/* Long Answer */}
                                    {q.type === 'long' && (
                                        <div>
                                            <textarea
                                                disabled={isCompleted[currentQIndex] || showSelfGrade}
                                                placeholder="Explain your reasoning here..."
                                                value={userInputs[currentQIndex] || ''}
                                                onChange={(e) => handleInput(e.target.value)}
                                                rows="4"
                                                className={`w-full p-4 border-2 rounded-lg text-lg focus:outline-none focus:ring-2 focus:ring-green-500 resize-none ${isCompleted[currentQIndex] ? 'bg-green-50 border-green-500 text-green-900 font-medium' : 'border-gray-300'}`}
                                            ></textarea>

                                            {showSelfGrade && !isCompleted[currentQIndex] && (
                                                <div className="mt-6 p-6 bg-blue-50 border-l-4 border-blue-500 rounded-r-lg shadow-sm fade-in">
                                                    <h4 className="font-bold text-blue-900 mb-2 uppercase text-sm tracking-wider">Expected Answer:</h4>
                                                    <p className="text-blue-900 mb-6 text-lg italic">"{q.expected}"</p>
                                                    <div className="bg-white p-4 rounded border border-blue-100">
                                                        <p className="font-bold text-gray-800 mb-3 text-center">Did your answer capture this scientific meaning correctly?</p>
                                                        <div className="flex justify-center space-x-4">
                                                            <button onClick={() => handleSelfGrade(true)} className="px-6 py-2 bg-green-500 text-white font-bold rounded hover:bg-green-600 transition shadow">Yes, I got it right!</button>
                                                            <button onClick={() => handleSelfGrade(false)} className="px-6 py-2 bg-red-500 text-white font-bold rounded hover:bg-red-600 transition shadow">No, let me try again</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* Feedback Message */}
                                    {feedback && (
                                        <div className={`mt-8 p-4 rounded-lg font-bold text-center text-xl shadow-sm fade-in ${feedback.type === 'success' ? 'bg-green-100 text-green-800 border border-green-300' : 'bg-red-100 text-red-800 border border-red-300'}`}>
                                            {feedback.type === 'success' ? '✨ ' : '❌ '}{feedback.msg}
                                        </div>
                                    )}
                                </div>

                                {/* Controls */}
                                <div className="mt-8 flex justify-between items-center pt-6 border-t border-gray-200">
                                    <button
                                        onClick={prevQuestion}
                                        disabled={currentQIndex === 0}
                                        className={`px-6 py-3 rounded-lg font-bold transition ${currentQIndex === 0 ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}
                                    >
                                        &larr; Previous
                                    </button>

                                    {!isCompleted[currentQIndex] && !showSelfGrade ? (
                                        <button
                                            onClick={checkAnswer}
                                            className="px-10 py-3 bg-green-600 text-white rounded-lg font-bold text-lg hover:bg-green-700 shadow-lg transform hover:scale-105 transition"
                                        >
                                            Check Answer
                                        </button>
                                    ) : (
                                        <button
                                            onClick={nextQuestion}
                                            disabled={!isCompleted[currentQIndex] || currentQIndex === questionsData.length - 1}
                                            className={`px-10 py-3 rounded-lg font-bold text-lg flex items-center shadow-lg transition ${(!isCompleted[currentQIndex] || currentQIndex === questionsData.length - 1) ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-green-500 text-white hover:bg-green-600 transform hover:scale-105 animate-pulse'}`}
                                        >
                                            Next Question &rarr;
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
