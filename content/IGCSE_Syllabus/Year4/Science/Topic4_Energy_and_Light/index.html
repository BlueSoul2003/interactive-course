<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGCSE Science: Energy and Light</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX compilation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body>
    <div style="background:#ffffff;border-bottom:1px solid #e2e8f0;padding:10px 24px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;position:sticky;top:0;z-index:1000;box-shadow:0 1px 6px rgba(0,0,0,0.07);">
    <a href="slides.pdf" target="_blank" style="display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:10px;font-weight:600;font-size:13px;color:#0369a1;text-decoration:none;">&#128196; Slides PDF</a>
    <a href="Worksheet.pdf" target="_blank" style="display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;font-weight:600;font-size:13px;color:#15803d;text-decoration:none;">&#128203; Worksheet</a>
    <a href="Answer_Key.pdf" target="_blank" style="display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:#fffbeb;border:1.5px solid #fcd34d;border-radius:10px;font-weight:600;font-size:13px;color:#92400e;text-decoration:none;">&#128273; Answer Key</a>
</div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- AUDIO ENGINE ---
        // Generates cute synthesized sounds without needing external files
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        const playCuteSound = (isCorrect) => {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            const rand = Math.floor(Math.random() * 3);

            if (isCorrect) {
                // 3 Different Correct Sounds
                if (rand === 0) { // "Coin / Ping"
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(987.77, now);
                    osc.frequency.setValueAtTime(1318.51, now + 0.1);
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                } else if (rand === 1) { // "Happy Arpeggio"
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.setValueAtTime(659.25, now + 0.1);
                    osc.frequency.setValueAtTime(783.99, now + 0.2);
                    osc.frequency.setValueAtTime(1046.50, now + 0.3);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                    osc.start(now); osc.stop(now + 0.6);
                } else { // "Chime"
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, now);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    osc.start(now); osc.stop(now + 0.8);

                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2); gain2.connect(audioCtx.destination);
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(1108.73, now + 0.1);
                    gain2.gain.setValueAtTime(0.2, now + 0.1);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    osc2.start(now + 0.1); osc2.stop(now + 0.8);
                }
            } else {
                // 3 Different Wrong Sounds
                if (rand === 0) { // "Boink"
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.4);
                    gainNode.gain.setValueAtTime(0.4, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (rand === 1) { // "Buzz"
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(100, now);
                    osc.frequency.linearRampToValueAtTime(80, now + 0.3);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.linearRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else { // "Wah-wah"
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(250, now);
                    osc.frequency.setValueAtTime(200, now + 0.2);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.linearRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                }
            }
        };

        // --- 50 QUESTIONS DATABASE ---
        const questionsData = [
            // Set 1: MCQ
            { id: 1, type: 'mcq', text: "What is the golden rule of energy?", options: ["Energy can be destroyed", "Energy cannot be made, lost, used up, or destroyed", "Energy is only found in light", "Energy always disappears"], answer: "Energy cannot be made, lost, used up, or destroyed" },
            { id: 2, type: 'mcq', text: "How does light travel from a source?", options: ["In wavy lines", "In circles", "In straight lines", "In zig-zags"], answer: "In straight lines" },
            { id: 3, type: 'mcq', text: "Energy that is waiting to be used inside a battery is called:", options: ["Movement energy", "Stored (potential) energy", "Light energy", "Wasted energy"], answer: "Stored (potential) energy" },
            { id: 4, type: 'mcq', text: "How do we see objects that are NOT light sources?", options: ["They make their own light", "They absorb all light", "Light reflects off them and enters our eyes", "They glow in the dark"], answer: "Light reflects off them and enters our eyes" },
            { id: 5, type: 'mcq', text: "What do scientists use to show the exact direction light travels?", options: ["Wavy lines", "Ray diagrams with arrows", "Dot plots", "Bar charts"], answer: "Ray diagrams with arrows" },
            { id: 6, type: 'mcq', text: "When an electrical lamp is turned on, what is the wasted energy?", options: ["Light energy", "Movement energy", "Heat energy", "Sound energy"], answer: "Heat energy" },
            { id: 7, type: 'mcq', text: "Materials that completely block light and create dark shadows are called:", options: ["Transparent", "Translucent", "Opaque", "Reflective"], answer: "Opaque" },
            { id: 8, type: 'mcq', text: "Which of the following has movement energy?", options: ["A kicked ball rolling on the ground", "A sleeping dog", "An unlit candle", "A book sitting on a shelf"], answer: "A kicked ball rolling on the ground" },
            { id: 9, type: 'mcq', text: "Why is the Moon NOT a light source?", options: ["It is too far away", "It only reflects the Sun's light", "It is made of cheese", "It is a star"], answer: "It only reflects the Sun's light" },
            { id: 10, type: 'mcq', text: "The black hole in the middle of your eye where light enters is called the:", options: ["Iris", "Cornea", "Pupil", "Retina"], answer: "Pupil" },

            // Set 2: True or False
            { id: 11, type: 'tf', text: "Energy is present in all matter, even if it is not moving.", answer: "True" },
            { id: 12, type: 'tf', text: "Output energy is always greater than input energy.", answer: "False" },
            { id: 13, type: 'tf', text: "Sunglasses protect our eyes because they are translucent and block some light.", answer: "True" },
            { id: 14, type: 'tf', text: "A television changes electrical energy into light energy, sound energy, and wasted heat energy.", answer: "True" },
            { id: 15, type: 'tf', text: "A shadow gets longer in the middle of the day (noon).", answer: "False" },
            { id: 16, type: 'tf', text: "Wasted energy simply disappears into nothing.", answer: "False" },
            { id: 17, type: 'tf', text: "A burning candle flame is an example of a light source.", answer: "True" },
            { id: 18, type: 'tf', text: "You need energy to do 'work,' such as breathing, moving, or cooking.", answer: "True" },
            { id: 19, type: 'tf', text: "We can see around corners because light can bend easily.", answer: "False" },
            { id: 20, type: 'tf', text: "Modern LED lamps are 'energy savers' because they produce less wasted heat.", answer: "True" },

            // Set 3: Fill in the Blanks
            { id: 21, type: 'fill', text: "Energy can be changed from one form to another; scientists say the energy has been _________.", answer: ["transferred"] },
            { id: 22, type: 'fill', text: "When a moving foot kicks a ball, it provides a _________ that makes the ball move.", answer: ["force"] },
            { id: 23, type: 'fill', text: "The energy that goes into an object is called the _________ energy.", answer: ["input"] },
            { id: 24, type: 'fill', text: "If a material blocks some light but lets a little bit through, it is called _________.", answer: ["translucent"] },
            { id: 25, type: 'fill', text: "Shadows are formed when light is _________ by an object.", answer: ["blocked"] },
            { id: 26, type: 'fill', text: "When light bounces off a surface, we say it is _________.", answer: ["reflected", "reflects"] },
            { id: 27, type: 'fill', text: "All moving objects have _________ energy.", answer: ["movement", "kinetic"] },
            { id: 28, type: 'fill', text: "We see things because light enters our eyes through the _________.", answer: ["pupil"] },
            { id: 29, type: 'fill', text: "You can record shadow measurements in a table or on a _________ plot graph to spot patterns.", answer: ["dot"] },
            { id: 30, type: 'fill', text: "To make a test fair, scientists use standard _________ (like centimeters or seconds).", answer: ["measurements", "measurement", "units", "unit"] },

            // Set 4: Match the Concepts
            { id: 31, type: 'match', text: "Ray diagram", options: ["A) Energy that is stored and waiting to be used", "B) Energy transferred to the environment that is not useful", "C) A material that completely blocks light", "D) Straight lines with arrows showing light direction", "E) An object that gives out its own light"], answer: "D) Straight lines with arrows showing light direction" },
            { id: 32, type: 'match', text: "Light source", options: ["A) Energy that is stored and waiting to be used", "B) Energy transferred to the environment that is not useful", "C) A material that completely blocks light", "D) Straight lines with arrows showing light direction", "E) An object that gives out its own light"], answer: "E) An object that gives out its own light" },
            { id: 33, type: 'match', text: "Potential energy", options: ["A) Energy that is stored and waiting to be used", "B) Energy transferred to the environment that is not useful", "C) A material that completely blocks light", "D) Straight lines with arrows showing light direction", "E) An object that gives out its own light"], answer: "A) Energy that is stored and waiting to be used" },
            { id: 34, type: 'match', text: "Wasted energy", options: ["A) Energy that is stored and waiting to be used", "B) Energy transferred to the environment that is not useful", "C) A material that completely blocks light", "D) Straight lines with arrows showing light direction", "E) An object that gives out its own light"], answer: "B) Energy transferred to the environment that is not useful" },
            { id: 35, type: 'match', text: "Opaque", options: ["A) Energy that is stored and waiting to be used", "B) Energy transferred to the environment that is not useful", "C) A material that completely blocks light", "D) Straight lines with arrows showing light direction", "E) An object that gives out its own light"], answer: "C) A material that completely blocks light" },

            // Set 5: Short Answer (Self-graded)
            { id: 36, type: 'long', text: "Name three forms of energy.", expected: "Heat, light, sound, movement, electrical, or stored/potential energy." },
            { id: 37, type: 'long', text: "Explain why a shadow forms behind a tree trunk when the Sun shines on it.", expected: "The tree trunk is opaque and blocks the light. Because light travels in straight lines, it cannot bend around the tree, leaving a dark shadow behind it." },
            { id: 38, type: 'long', text: "What energy transfer happens inside a battery-operated flashlight?", expected: "Stored (potential) energy -> Electrical energy -> Light energy (and wasted heat)." },
            { id: 39, type: 'long', text: "Give two examples of 'work' in science.", expected: "Breathing, cooking food, running, a ball rolling, or objects falling due to gravity." },
            { id: 40, type: 'long', text: "Why can you see the words in a book if the book does not make its own light?", expected: "Light from a light source (like the Sun or a lamp) bounces (reflects) off the book and enters your eyes." },

            // Set 6: Exam Style
            { id: 41, type: 'fill', text: "Chen rides his bicycle at night. He wears a bright jacket and has a front lamp. The lamp is a source of light. \n\nComplete the sentence: Light from the lamp travels in ________ lines to the person.", answer: ["straight"] },
            { id: 42, type: 'long', text: "The jacket is not a source of light, but the person in the car sees it clearly. Explain why.", expected: "Light from the car's headlights (or another light source) reflects off the jacket and into the person's eyes." },
            { id: 43, type: 'long', text: "Gabriella has a picture of wind turbines spinning in the wind. Where do the turbines get their energy from to do the 'work' of spinning?", expected: "The movement energy of the wind (moving air)." },
            { id: 44, type: 'long', text: "A group of children are singing and jumping around, which makes them very hot. What happens to the sound energy and heat energy they produce?", expected: "It is transferred into the surrounding environment (the air)." },
            { id: 45, type: 'long', text: "You are looking at a mirror in a bright room. Describe the path the light takes using the words 'light source', 'reflects', and 'eyes'.", expected: "Light from the light source travels to the mirror, reflects off the mirror's surface, and enters our eyes." },

            // Set 7: Practical / Enquiry
            { id: 46, type: 'long', text: "Safia wants to investigate how the length of a shadow changes during the day. What standard measuring equipment should she use to measure the shadow?", expected: "A tape measure or ruler." },
            { id: 47, type: 'long', text: "Safia decides to measure the shadow at 8:00 a.m., 10:00 a.m., 12:00 p.m., and 2:00 p.m. Identify ONE variable she must keep the same to make it a fair test.", expected: "She must use the same object to cast the shadow every time, keep the object in the exact same location, AND measure on a flat surface." },
            { id: 48, type: 'long', text: "When investigating shadows outside using the Sun as a light source, name one safety rule you must follow to protect your eyes.", expected: "Never look directly at the Sun." },
            { id: 49, type: 'long', text: "Look at these results from Safia's shadow experiment: 08:00 (150 cm), 10:00 (90 cm), 12:00 (30 cm). Describe the pattern in the data during the morning.", expected: "As the morning goes on and it gets closer to midday, the length of the shadow gets shorter." },
            { id: 50, type: 'long', text: "Youssef claims that 'a longer wire in a circuit will make the lamp dimmer.' What observation would he need to make to prove his prediction is correct?", expected: "He needs to observe that the light bulb is bright when the wire is short, and that the brightness decreases (gets dimmer) when he replaces it with a longer wire." }
        ];

        // --- MAIN APPLICATION COMPONENT ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('questions');
            const [currentQIndex, setCurrentQIndex] = useState(0);

            // State to store user's inputs
            const [userInputs, setUserInputs] = useState({});
            // State to store whether a question has been successfully completed
            const [isCompleted, setIsCompleted] = useState({});
            // State for UI feedback
            const [feedback, setFeedback] = useState(null);
            const [showSelfGrade, setShowSelfGrade] = useState(false);

            const q = questionsData[currentQIndex];

            // Setup
            useEffect(() => {
                setFeedback(null);
                setShowSelfGrade(false);
            }, [currentQIndex]);

            const handleInput = (val) => {
                setUserInputs(prev => ({ ...prev, [currentQIndex]: val }));
            };

            const checkAnswer = () => {
                const input = userInputs[currentQIndex];
                if (!input) {
                    setFeedback({ type: 'error', msg: 'Please provide an answer first!' });
                    return;
                }

                if (q.type === 'mcq' || q.type === 'tf' || q.type === 'match') {
                    if (input === q.answer) {
                        markCorrect();
                    } else {
                        markWrong();
                    }
                } else if (q.type === 'fill') {
                    const cleanInput = input.trim().toLowerCase();
                    const isRight = q.answer.some(ans => cleanInput === ans.toLowerCase());
                    if (isRight) {
                        markCorrect();
                    } else {
                        markWrong();
                    }
                } else if (q.type === 'long') {
                    // For long text, we reveal the expected answer and ask them to self-grade
                    setShowSelfGrade(true);
                }
            };

            const markCorrect = () => {
                playCuteSound(true);
                setFeedback({ type: 'success', msg: 'Correct! Great job!' });
                setIsCompleted(prev => ({ ...prev, [currentQIndex]: true }));
            };

            const markWrong = () => {
                playCuteSound(false);
                setFeedback({ type: 'error', msg: 'Not quite right. Try again!' });
            };

            const handleSelfGrade = (wasCorrect) => {
                if (wasCorrect) {
                    markCorrect();
                } else {
                    markWrong();
                    setShowSelfGrade(false);
                }
            };

            const nextQuestion = () => {
                if (currentQIndex < questionsData.length - 1) {
                    setCurrentQIndex(currentQIndex + 1);
                }
            };

            const prevQuestion = () => {
                if (currentQIndex > 0) {
                    setCurrentQIndex(currentQIndex - 1);
                }
            };

            // Set Navigation Menu Data
            const questionSets = [
                { id: 1, label: "Set 1: MCQ", start: 0 },
                { id: 2, label: "Set 2: True/False", start: 10 },
                { id: 3, label: "Set 3: Fill in Blanks", start: 20 },
                { id: 4, label: "Set 4: Matching", start: 30 },
                { id: 5, label: "Set 5: Short Answer", start: 35 },
                { id: 6, label: "Set 6: Exam Style", start: 40 },
                { id: 7, label: "Set 7: Enquiry", start: 45 }
            ];

            const getActiveSetId = (index) => {
                if (index < 10) return 1;
                if (index < 20) return 2;
                if (index < 30) return 3;
                if (index < 35) return 4;
                if (index < 40) return 5;
                if (index < 45) return 6;
                return 7;
            };

            // Helpers for getting Set Names
            const getSetName = (index) => {
                if (index < 10) return "Set 1: Multiple Choice";
                if (index < 20) return "Set 2: True or False";
                if (index < 30) return "Set 3: Fill in the Blanks";
                if (index < 35) return "Set 4: Match the Concepts";
                if (index < 40) return "Set 5: Short Answer";
                if (index < 45) return "Set 6: Exam Style Questions";
                return "Set 7: Scientific Enquiry";
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-4 md:p-8">
                    {/* Header */}
                    <header className="w-full max-w-5xl bg-white rounded-xl shadow-md p-6 mb-6 text-center">
                        <h1 className="text-3xl font-bold text-blue-700">IGCSE Year 4 Science</h1>
                        <h2 className="text-xl text-gray-600 mt-2">Topic 4: Energy and Light</h2>
                    </header>

                    {/* Navigation Tabs */}
                    <div className="w-full max-w-5xl flex space-x-2 mb-6">
                        <button
                            onClick={() => setActiveTab('presentation')}
                            className={`flex-1 py-3 rounded-lg font-bold text-lg transition-colors ${activeTab === 'presentation' ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-gray-600 hover:bg-gray-100'}`}>
                            📄 Presentation View
                        </button>
                        <button
                            onClick={() => setActiveTab('questions')}
                            className={`flex-1 py-3 rounded-lg font-bold text-lg transition-colors ${activeTab === 'questions' ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-gray-600 hover:bg-gray-100'}`}>
                            📝 Interactive Questions
                        </button>
                    </div>

                    {/* Content Area */}
                    <div className="w-full max-w-5xl bg-white rounded-xl shadow-xl overflow-hidden min-h-[600px] flex flex-col">

                        {/* --- PRESENTATION TAB --- */}
                        {activeTab === 'presentation' && (
                            <div className="flex flex-col h-full flex-grow fade-in" style={{padding: '16px'}}>
                                <h3 className="text-xl font-bold mb-4" style={{color: '#1e293b'}}>Presentation Slides</h3>
                                <div style={{flex: 1, background: '#f1f5f9', borderRadius: '12px', overflow: 'hidden', minHeight: '540px', position: 'relative'}}>
                                    <iframe src="slides.pdf" style={{position: 'absolute', inset: 0, width: '100%', height: '100%', border: 'none'}} title="Presentation Slides"></iframe>
                                </div>
                            </div>
                        )}

                        {/* --- QUESTIONS TAB --- */}
                        {activeTab === 'questions' && (
                            <div className="flex flex-col h-full flex-grow p-6 md:p-10 fade-in">

                                {/* Set Navigation Menu */}
                                <div className="flex overflow-x-auto space-x-2 pb-3 mb-4 hide-scrollbar border-b">
                                    {questionSets.map(set => (
                                        <button
                                            key={set.id}
                                            onClick={() => {
                                                setCurrentQIndex(set.start);
                                                setFeedback(null);
                                                setShowSelfGrade(false);
                                            }}
                                            className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all ${getActiveSetId(currentQIndex) === set.id
                                                    ? 'bg-indigo-600 text-white shadow-md transform scale-105'
                                                    : 'bg-indigo-50 text-indigo-700 hover:bg-indigo-100 hover:shadow'
                                                }`}
                                        >
                                            {set.label}
                                        </button>
                                    ))}
                                </div>

                                {/* Question Header */}
                                <div className="flex justify-between items-center mb-6 pb-4 border-b">
                                    <span className="text-indigo-600 font-bold uppercase tracking-wider">{getSetName(currentQIndex)}</span>
                                    <span className="bg-indigo-100 text-indigo-800 py-1 px-3 rounded-full font-bold">
                                        Question {currentQIndex + 1} of 50
                                    </span>
                                </div>

                                {/* Question Body */}
                                <div className="flex-grow">
                                    <h3 className="text-2xl font-semibold text-gray-800 mb-6 whitespace-pre-wrap">{q.text}</h3>

                                    {/* MCQ / Match Options */}
                                    {(q.type === 'mcq' || q.type === 'match') && (
                                        <div className="space-y-3">
                                            {q.options.map((opt, i) => (
                                                <button
                                                    key={i}
                                                    onClick={() => !isCompleted[currentQIndex] && handleInput(opt)}
                                                    className={`w-full text-left p-4 rounded-lg border-2 transition-all ${userInputs[currentQIndex] === opt
                                                            ? (isCompleted[currentQIndex] ? 'bg-green-100 border-green-500 text-green-800' : 'bg-indigo-50 border-indigo-500 text-indigo-800')
                                                            : 'bg-white border-gray-200 hover:border-indigo-300'
                                                        } ${isCompleted[currentQIndex] ? 'cursor-default' : 'cursor-pointer'}`}
                                                >
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {/* True / False Options */}
                                    {q.type === 'tf' && (
                                        <div className="flex space-x-4">
                                            {['True', 'False'].map((opt) => (
                                                <button
                                                    key={opt}
                                                    onClick={() => !isCompleted[currentQIndex] && handleInput(opt)}
                                                    className={`flex-1 p-4 rounded-lg border-2 text-xl font-bold transition-all ${userInputs[currentQIndex] === opt
                                                            ? (isCompleted[currentQIndex] ? 'bg-green-100 border-green-500 text-green-800' : 'bg-indigo-50 border-indigo-500 text-indigo-800')
                                                            : 'bg-white border-gray-200 hover:border-indigo-300'
                                                        } ${isCompleted[currentQIndex] ? 'cursor-default' : 'cursor-pointer'}`}
                                                >
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {/* Fill in the Blanks */}
                                    {q.type === 'fill' && (
                                        <div>
                                            <input
                                                type="text"
                                                disabled={isCompleted[currentQIndex]}
                                                placeholder="Type your answer here..."
                                                value={userInputs[currentQIndex] || ''}
                                                onChange={(e) => handleInput(e.target.value)}
                                                className={`w-full p-4 border-2 rounded-lg text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 ${isCompleted[currentQIndex] ? 'bg-green-50 border-green-500 text-green-800 font-bold' : 'border-gray-300'}`}
                                                onKeyDown={(e) => { if (e.key === 'Enter') checkAnswer(); }}
                                            />
                                        </div>
                                    )}

                                    {/* Long Answer */}
                                    {q.type === 'long' && (
                                        <div>
                                            <textarea
                                                disabled={isCompleted[currentQIndex] || showSelfGrade}
                                                placeholder="Write your explanation here..."
                                                value={userInputs[currentQIndex] || ''}
                                                onChange={(e) => handleInput(e.target.value)}
                                                rows="4"
                                                className={`w-full p-4 border-2 rounded-lg text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none ${isCompleted[currentQIndex] ? 'bg-green-50 border-green-500 text-green-800' : 'border-gray-300'}`}
                                            ></textarea>

                                            {showSelfGrade && !isCompleted[currentQIndex] && (
                                                <div className="mt-6 p-6 bg-blue-50 border-l-4 border-blue-500 rounded-r-lg fade-in">
                                                    <h4 className="font-bold text-blue-800 mb-2">Expected Answer:</h4>
                                                    <p className="text-blue-900 mb-4">{q.expected}</p>
                                                    <p className="font-semibold text-gray-700 mb-3">Did your answer capture this meaning correctly?</p>
                                                    <div className="flex space-x-3">
                                                        <button onClick={() => handleSelfGrade(true)} className="px-6 py-2 bg-green-500 text-white font-bold rounded hover:bg-green-600 transition">Yes, I got it!</button>
                                                        <button onClick={() => handleSelfGrade(false)} className="px-6 py-2 bg-red-500 text-white font-bold rounded hover:bg-red-600 transition">No, let me try again</button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* Feedback Message */}
                                    {feedback && (
                                        <div className={`mt-6 p-4 rounded-lg font-bold text-center text-lg fade-in ${feedback.type === 'success' ? 'bg-green-100 text-green-800 border border-green-300' : 'bg-red-100 text-red-800 border border-red-300'}`}>
                                            {feedback.msg}
                                        </div>
                                    )}
                                </div>

                                {/* Controls */}
                                <div className="mt-8 flex justify-between items-center pt-4 border-t">
                                    <button
                                        onClick={prevQuestion}
                                        disabled={currentQIndex === 0}
                                        className={`px-6 py-3 rounded-lg font-bold transition ${currentQIndex === 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}
                                    >
                                        &larr; Previous
                                    </button>

                                    {!isCompleted[currentQIndex] && !showSelfGrade ? (
                                        <button
                                            onClick={checkAnswer}
                                            className="px-8 py-3 bg-blue-600 text-white rounded-lg font-bold text-lg hover:bg-blue-700 shadow-lg transform hover:scale-105 transition"
                                        >
                                            Check Answer
                                        </button>
                                    ) : (
                                        <button
                                            onClick={nextQuestion}
                                            disabled={!isCompleted[currentQIndex] || currentQIndex === questionsData.length - 1}
                                            className={`px-8 py-3 rounded-lg font-bold text-lg flex items-center shadow-lg transition ${(!isCompleted[currentQIndex] || currentQIndex === questionsData.length - 1) ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-green-500 text-white hover:bg-green-600 transform hover:scale-105'}`}
                                        >
                                            Next Question &rarr;
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
