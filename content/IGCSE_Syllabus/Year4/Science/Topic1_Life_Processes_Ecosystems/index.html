<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGCSE Science: Life Processes and Ecosystems</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ecfdf5;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        textarea::-webkit-scrollbar {
            width: 8px;
        }

        textarea::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div style="background:#ffffff;border-bottom:1px solid #e2e8f0;padding:10px 24px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;position:sticky;top:0;z-index:1000;box-shadow:0 1px 6px rgba(0,0,0,0.07);">
    <a href="slides.pdf" target="_blank" style="display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:10px;font-weight:600;font-size:13px;color:#0369a1;text-decoration:none;">&#128196; Slides PDF</a>
    <a href="Worksheet.pdf" target="_blank" style="display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;font-weight:600;font-size:13px;color:#15803d;text-decoration:none;">&#128203; Worksheet</a>
    <a href="Answer_Key.pdf" target="_blank" style="display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:#fffbeb;border:1.5px solid #fcd34d;border-radius:10px;font-weight:600;font-size:13px;color:#92400e;text-decoration:none;">&#128273; Answer Key</a>
</div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- AUDIO ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        const playCuteSound = (isCorrect) => {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            const rand = Math.floor(Math.random() * 3);

            if (isCorrect) {
                // 3 Different Correct Sounds
                if (rand === 0) { // Coin / Ping
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(987.77, now);
                    osc.frequency.setValueAtTime(1318.51, now + 0.1);
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                } else if (rand === 1) { // Happy Arpeggio
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.setValueAtTime(659.25, now + 0.1);
                    osc.frequency.setValueAtTime(783.99, now + 0.2);
                    osc.frequency.setValueAtTime(1046.50, now + 0.3);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                    osc.start(now); osc.stop(now + 0.6);
                } else { // Chime
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, now);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    osc.start(now); osc.stop(now + 0.8);

                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2); gain2.connect(audioCtx.destination);
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(1108.73, now + 0.1);
                    gain2.gain.setValueAtTime(0.2, now + 0.1);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    osc2.start(now + 0.1); osc2.stop(now + 0.8);
                }
            } else {
                // 3 Different Wrong Sounds
                if (rand === 0) { // Boink
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.4);
                    gainNode.gain.setValueAtTime(0.4, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (rand === 1) { // Buzz
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(100, now);
                    osc.frequency.linearRampToValueAtTime(80, now + 0.3);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.linearRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else { // Wah-wah
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(250, now);
                    osc.frequency.setValueAtTime(200, now + 0.2);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.linearRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                }
            }
        };

        // --- 50 QUESTIONS DATABASE (TOPIC 1: Life Processes and Ecosystems) ---
        const questionsData = [
            // Set 1: MCQ (0-9)
            { id: 1, type: 'mcq', text: "What form of exercise is best for building your stamina?", options: ["A) Sleeping", "B) Running or swimming", "C) Stretching", "D) Sitting"], answer: "B) Running or swimming" },
            { id: 2, type: 'mcq', text: "What do we call drugs that are specifically used to treat illnesses?", options: ["A) Vaccines", "B) Poisons", "C) Medicines", "D) Prescriptions"], answer: "C) Medicines" },
            { id: 3, type: 'mcq', text: "How are medicines for asthma usually taken into the body?", options: ["A) Swallowed as a pill", "B) Rubbed on the skin", "C) Injected", "D) Inhaled through an inhaler"], answer: "D) Inhaled through an inhaler" },
            { id: 4, type: 'mcq', text: "What do we call the practice of keeping infected animals apart from healthy ones to stop disease from spreading?", options: ["A) Rehabilitation", "B) Vaccination", "C) Quarantine", "D) Digestion"], answer: "C) Quarantine" },
            { id: 5, type: 'mcq', text: "Who used scientific enquiry to develop the very first vaccine for smallpox over 200 years ago?", options: ["A) Albert Einstein", "B) Edward Jenner", "C) Galileo", "D) Isaac Newton"], answer: "B) Edward Jenner" },
            { id: 6, type: 'mcq', text: "What is the scientific name for an animal's natural home or surroundings?", options: ["A) Ecosystem", "B) Pharmacy", "C) Habitat", "D) Enclosure"], answer: "C) Habitat" },
            { id: 7, type: 'mcq', text: "Which of the following is a producer in a food chain?", options: ["A) A grasshopper", "B) A hawk", "C) A plant", "D) A rabbit"], answer: "C) A plant" },
            { id: 8, type: 'mcq', text: "An animal that only eats meat is called a:", options: ["A) Herbivore", "B) Carnivore", "C) Omnivore", "D) Producer"], answer: "B) Carnivore" },
            { id: 9, type: 'mcq', text: "What is the main source of energy for all living things on Earth?", options: ["A) The Sun", "B) Soil", "C) Water", "D) Wind"], answer: "A) The Sun" },
            { id: 10, type: 'mcq', text: "During photosynthesis, what sugar do plants make for energy?", options: ["A) Sucrose", "B) Fructose", "C) Glucose", "D) Lactose"], answer: "C) Glucose" },

            // Set 2: True or False (10-19)
            { id: 11, type: 'tf', text: "Eating a balanced diet without any exercise is enough to make you strong and flexible.", answer: "False" },
            { id: 12, type: 'tf', text: "Medicines can be swallowed, injected, inhaled, or absorbed through the skin.", answer: "True" },
            { id: 13, type: 'tf', text: "Only humans get infectious diseases; plants and animals do not.", answer: "False" },
            { id: 14, type: 'tf', text: "Rabies is an infectious animal disease that can be passed on to humans.", answer: "True" },
            { id: 15, type: 'tf', text: "Smallpox is a deadly disease that no longer exists today because of successful vaccination programmes.", answer: "True" },
            { id: 16, type: 'tf', text: "A rock-pool is a suitable habitat for a rabbit.", answer: "False" },
            { id: 17, type: 'tf', text: "Animals that are taken to rehabilitation centres are always able to return to the wild.", answer: "False" },
            { id: 18, type: 'tf', text: "All food chains must start with a plant.", answer: "True" },
            { id: 19, type: 'tf', text: "An omnivore is an animal that eats only plants.", answer: "False" },
            { id: 20, type: 'tf', text: "Animals get their energy indirectly from the Sun by eating plants or other animals.", answer: "True" },

            // Set 3: Fill in the Blanks (20-29)
            { id: 21, type: 'fill', text: "To become more __________, you need to do exercises like stretching to make your body bendy and supple.", answer: ["flexible", "supple"] },
            { id: 22, type: 'fill', text: "Doctors sometimes give sick patients a __________ to take to a pharmacy so they can get the right medicine.", answer: ["prescription"] },
            { id: 23, type: 'fill', text: "A __________ is a small amount of a disease injected into the body to teach it how to fight the illness.", answer: ["vaccine", "vaccination"] },
            { id: 24, type: 'fill', text: "The branch of medicine that deals with the prevention and treatment of diseases in animals is called __________ medicine.", answer: ["veterinary", "vet"] },
            { id: 25, type: 'fill', text: "The place in the environment where a plant or animal lives is called its __________.", answer: ["habitat"] },
            { id: 26, type: 'fill', text: "Limpets have a strong muscular __________ that attaches them to rocks so they aren't washed away by the tide.", answer: ["foot"] },
            { id: 27, type: 'fill', text: "When we describe what eats what in an environment, we are describing __________ relationships.", answer: ["feeding"] },
            { id: 28, type: 'fill', text: "An animal that consumes another animal is a __________, and the animal it eats is its prey.", answer: ["predator", "carnivore"] },
            { id: 29, type: 'fill', text: "Plants make their own food through a process called __________.", answer: ["photosynthesis"] },
            { id: 30, type: 'fill', text: "During photosynthesis, plants use light energy to change water and __________ into glucose.", answer: ["carbon dioxide", "co2"] },

            // Set 4: Matching (30-34)
            { id: 31, type: 'match', text: "Stamina", options: ["A) An animal that relies on plants or other animals for its food.", "B) Restoring an animal to health after an injury or illness.", "C) The scientific name for our surroundings and the conditions found there.", "D) Medicines used to treat infections caused by bacteria.", "E) Being able to carry on doing something for a long time."], answer: "E) Being able to carry on doing something for a long time." },
            { id: 32, type: 'match', text: "Antibiotics", options: ["A) An animal that relies on plants or other animals for its food.", "B) Restoring an animal to health after an injury or illness.", "C) The scientific name for our surroundings and the conditions found there.", "D) Medicines used to treat infections caused by bacteria.", "E) Being able to carry on doing something for a long time."], answer: "D) Medicines used to treat infections caused by bacteria." },
            { id: 33, type: 'match', text: "Rehabilitation", options: ["A) An animal that relies on plants or other animals for its food.", "B) Restoring an animal to health after an injury or illness.", "C) The scientific name for our surroundings and the conditions found there.", "D) Medicines used to treat infections caused by bacteria.", "E) Being able to carry on doing something for a long time."], answer: "B) Restoring an animal to health after an injury or illness." },
            { id: 34, type: 'match', text: "Consumer", options: ["A) An animal that relies on plants or other animals for its food.", "B) Restoring an animal to health after an injury or illness.", "C) The scientific name for our surroundings and the conditions found there.", "D) Medicines used to treat infections caused by bacteria.", "E) Being able to carry on doing something for a long time."], answer: "A) An animal that relies on plants or other animals for its food." },
            { id: 35, type: 'match', text: "Environment", options: ["A) An animal that relies on plants or other animals for its food.", "B) Restoring an animal to health after an injury or illness.", "C) The scientific name for our surroundings and the conditions found there.", "D) Medicines used to treat infections caused by bacteria.", "E) Being able to carry on doing something for a long time."], answer: "C) The scientific name for our surroundings and the conditions found there." },

            // Set 5: Short Answer (35-44)
            { id: 36, type: 'long', text: "Why is it important to do exercises like push-ups and sit-ups?", expected: "These exercises build up strength in our legs, arms, and body." },
            { id: 37, type: 'long', text: "Why should you never take medicine that was prescribed for someone else, or eat pills that look like sweets?", expected: "Medicines are drugs and can be dangerous or harmful if they are not used in the correct way or if you don't know what they are." },
            { id: 38, type: 'long', text: "What did Edward Jenner observe about dairy maids that helped him create the smallpox vaccine?", expected: "He observed that dairy maids who had already caught cowpox did not catch the deadly smallpox virus." },
            { id: 39, type: 'long', text: "What three things must a habitat provide for an animal to survive?", expected: "Food, water, and shelter." },
            { id: 40, type: 'long', text: "How is a limpet's shell adapted to keep it safe from predators?", expected: "It has a strong, pyramid-shaped shell that is difficult to break, so it seldom gets eaten." },
            { id: 41, type: 'long', text: "What is the purpose of an identification \"key\" in science?", expected: "Keys allow scientists to group and identify living things based on their similarities and differences." },
            { id: 42, type: 'long', text: "What is the difference between a herbivore and a carnivore?", expected: "A herbivore eats only plants, while a carnivore eats only meat." },
            { id: 43, type: 'long', text: "What does a food chain show?", expected: "It shows the feeding relationships in an environment (what eats what)." },
            { id: 44, type: 'long', text: "Why are plants called \"producers\"?", expected: "Because they make their own food using light energy from the Sun." },
            { id: 45, type: 'long', text: "Look at this food chain: Grass -> Rabbit -> Hawk. What would happen to the hawk if all the rabbits died?", expected: "The hawk would lose its food source and might die or have to move to a new habitat to find food." },

            // Set 6: Enquiry (45-49)
            { id: 46, type: 'long', text: "A student runs on the spot for 60 seconds to test their fitness. What observation should they make to see how hard their body is working?", expected: "They should observe how their heart feels (heart rate) and how their skin feels (sweating/temperature)." },
            { id: 47, type: 'long', text: "When Edward Jenner tested his new smallpox vaccine, he repeated his test many times on other patients. Why is repeating tests an important part of scientific enquiry?", expected: "Repeating observations and tests gives a much more reliable result." },
            { id: 48, type: 'long', text: "You want to investigate how plants need light to grow. You place Plant A in a sunny window. Where should you place Plant B to make a fair comparison?", expected: "In complete darkness (like a dark cupboard) to see the difference light makes." },
            { id: 49, type: 'long', text: "In the plant light experiment above, name two variables you must keep the same to ensure it is a fair test.", expected: "The amount of water given to each plant, the type of plant, and the type of soil." },
            { id: 50, type: 'long', text: "You are investigating pine leaves (needles) to see how they are adapted to snowy mountain habitats. You cut different leaf shapes out of paper and drop fake snow (flour) on them. What are you trying to observe?", expected: "You are observing which leaf shape catches the least amount of snow, preventing the branches from getting too heavy and breaking." }
        ];

        // Set Navigation Bounds
        const questionSets = [
            { id: 1, label: "Set 1: MCQ", start: 0 },
            { id: 2, label: "Set 2: True/False", start: 10 },
            { id: 3, label: "Set 3: Fill in Blanks", start: 20 },
            { id: 4, label: "Set 4: Matching", start: 30 },
            { id: 5, label: "Set 5: Short Answer", start: 35 },
            { id: 6, label: "Set 6: Enquiry", start: 45 }
        ];

        const getActiveSetId = (index) => {
            if (index < 10) return 1;
            if (index < 20) return 2;
            if (index < 30) return 3;
            if (index < 35) return 4;
            if (index < 45) return 5;
            return 6;
        };

        const getSetName = (index) => {
            const setObj = questionSets.find(s => s.id === getActiveSetId(index));
            return setObj ? setObj.label : "Questions";
        };

        // --- MAIN APPLICATION COMPONENT ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('presentation');


            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [userInputs, setUserInputs] = useState({});
            const [isCompleted, setIsCompleted] = useState({});
            const [feedback, setFeedback] = useState(null);
            const [showSelfGrade, setShowSelfGrade] = useState(false);

            const q = questionsData[currentQIndex];

            useEffect(() => {
                setFeedback(null);
                setShowSelfGrade(false);
            }, [currentQIndex]);

            const handleInput = (val) => {
                setUserInputs(prev => ({ ...prev, [currentQIndex]: val }));
            };

            const checkAnswer = () => {
                const input = userInputs[currentQIndex];
                if (!input) {
                    setFeedback({ type: 'error', msg: 'Please provide an answer first!' });
                    return;
                }

                if (q.type === 'mcq' || q.type === 'tf' || q.type === 'match') {
                    if (input === q.answer) markCorrect();
                    else markWrong();
                } else if (q.type === 'fill') {
                    const cleanInput = input.trim().toLowerCase();
                    const isRight = q.answer.some(ans => cleanInput === ans.toLowerCase());
                    if (isRight) markCorrect();
                    else markWrong();
                } else if (q.type === 'long') {
                    setShowSelfGrade(true);
                }
            };

            const markCorrect = () => {
                playCuteSound(true);
                setFeedback({ type: 'success', msg: 'Correct! Excellent job!' });
                setIsCompleted(prev => ({ ...prev, [currentQIndex]: true }));
            };

            const markWrong = () => {
                playCuteSound(false);
                setFeedback({ type: 'error', msg: 'Not quite right. Try again!' });
            };

            const handleSelfGrade = (wasCorrect) => {
                if (wasCorrect) {
                    markCorrect();
                } else {
                    markWrong();
                    setShowSelfGrade(false);
                }
            };

            const nextQuestion = () => {
                if (currentQIndex < questionsData.length - 1) setCurrentQIndex(currentQIndex + 1);
            };

            const prevQuestion = () => {
                if (currentQIndex > 0) setCurrentQIndex(currentQIndex - 1);
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-4 md:p-8">
                    {/* Header */}
                    <header className="w-full max-w-6xl bg-white rounded-xl shadow-md p-6 mb-6 text-center border-t-4 border-emerald-500">
                        <h1 className="text-3xl font-bold text-slate-800">IGCSE Year 4 Science</h1>
                        <h2 className="text-xl text-emerald-600 mt-2 font-semibold">Topic 1: Life Processes and Ecosystems</h2>
                    </header>

                    {/* Navigation Tabs */}
                    <div className="w-full max-w-6xl flex space-x-2 mb-6">
                        <button
                            onClick={() => setActiveTab('presentation')}
                            className={`flex-1 py-3 rounded-t-lg font-bold text-lg transition-colors border-b-4 ${activeTab === 'presentation' ? 'bg-white text-emerald-700 border-emerald-600 shadow-md' : 'bg-emerald-50 text-emerald-600 border-transparent hover:bg-emerald-100'}`}>
                            📺 Presentation View
                        </button>
                        <button
                            onClick={() => setActiveTab('questions')}
                            className={`flex-1 py-3 rounded-t-lg font-bold text-lg transition-colors border-b-4 ${activeTab === 'questions' ? 'bg-white text-emerald-700 border-emerald-600 shadow-md' : 'bg-emerald-50 text-emerald-600 border-transparent hover:bg-emerald-100'}`}>
                            📝 Interactive Questions (50)
                        </button>
                    </div>

                    {/* Content Area */}
                    <div className="w-full max-w-6xl bg-white rounded-b-xl rounded-tr-xl shadow-xl overflow-hidden min-h-[650px] flex flex-col">

                        {/* --- PRESENTATION TAB --- */}
                        {activeTab === 'presentation' && (
                            <div className="flex flex-col h-full flex-grow fade-in" style={{padding: '16px'}}>
                                <h3 className="text-xl font-bold mb-4" style={{color: '#1e293b'}}>Presentation Slides</h3>
                                <div style={{flex: 1, background: '#f1f5f9', borderRadius: '12px', overflow: 'hidden', minHeight: '540px', position: 'relative'}}>
                                    <iframe src="slides.pdf" style={{position: 'absolute', inset: 0, width: '100%', height: '100%', border: 'none'}} title="Presentation Slides"></iframe>
                                </div>
                            </div>
                        )}

                        {/* --- QUESTIONS TAB --- */}
                        {activeTab === 'questions' && (
                            <div className="flex flex-col h-full flex-grow p-6 md:p-10 fade-in">

                                {/* Set Navigation Menu */}
                                <div className="flex overflow-x-auto space-x-3 pb-4 mb-6 hide-scrollbar border-b border-slate-200">
                                    {questionSets.map(set => (
                                        <button
                                            key={set.id}
                                            onClick={() => {
                                                setCurrentQIndex(set.start);
                                                setFeedback(null);
                                                setShowSelfGrade(false);
                                            }}
                                            className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all ${getActiveSetId(currentQIndex) === set.id
                                                    ? 'bg-emerald-500 text-white shadow-md transform scale-105'
                                                    : 'bg-emerald-50 text-emerald-700 hover:bg-emerald-100 hover:shadow'
                                                }`}
                                        >
                                            {set.label}
                                        </button>
                                    ))}
                                </div>

                                {/* Question Header */}
                                <div className="flex justify-between items-center mb-6">
                                    <span className="text-emerald-600 font-bold uppercase tracking-wider text-lg">{getSetName(currentQIndex)}</span>
                                    <span className="bg-slate-800 text-white py-1 px-4 rounded-full font-bold text-sm tracking-widest shadow-inner">
                                        Q: {currentQIndex + 1} / 50
                                    </span>
                                </div>

                                {/* Question Body */}
                                <div className="flex-grow">
                                    <h3 className="text-2xl font-semibold text-slate-800 mb-8 whitespace-pre-wrap leading-relaxed">{q.text}</h3>

                                    {/* MCQ / Match Options */}
                                    {(q.type === 'mcq' || q.type === 'match') && (
                                        <div className="space-y-3">
                                            {q.options.map((opt, i) => (
                                                <button
                                                    key={i}
                                                    onClick={() => !isCompleted[currentQIndex] && handleInput(opt)}
                                                    className={`w-full text-left p-4 rounded-lg border-2 font-medium transition-all ${userInputs[currentQIndex] === opt
                                                            ? (isCompleted[currentQIndex] ? 'bg-emerald-100 border-emerald-500 text-emerald-900' : 'bg-teal-50 border-teal-500 text-teal-900')
                                                            : 'bg-white border-slate-200 hover:border-emerald-300 hover:bg-emerald-50'
                                                        } ${isCompleted[currentQIndex] ? 'cursor-default' : 'cursor-pointer'}`}
                                                >
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {/* True / False Options */}
                                    {q.type === 'tf' && (
                                        <div className="flex space-x-6">
                                            {['True', 'False'].map((opt) => (
                                                <button
                                                    key={opt}
                                                    onClick={() => !isCompleted[currentQIndex] && handleInput(opt)}
                                                    className={`flex-1 p-6 rounded-lg border-2 text-2xl font-bold transition-all ${userInputs[currentQIndex] === opt
                                                            ? (isCompleted[currentQIndex] ? 'bg-emerald-100 border-emerald-500 text-emerald-900' : 'bg-teal-50 border-teal-500 text-teal-900')
                                                            : 'bg-white border-slate-200 hover:border-emerald-300'
                                                        } ${isCompleted[currentQIndex] ? 'cursor-default' : 'cursor-pointer'}`}
                                                >
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {/* Fill in the Blanks */}
                                    {q.type === 'fill' && (
                                        <div>
                                            <input
                                                type="text"
                                                disabled={isCompleted[currentQIndex]}
                                                placeholder="Type your one-word answer here..."
                                                value={userInputs[currentQIndex] || ''}
                                                onChange={(e) => handleInput(e.target.value)}
                                                className={`w-full p-4 border-2 rounded-lg text-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 ${isCompleted[currentQIndex] ? 'bg-emerald-50 border-emerald-500 text-emerald-900 font-bold shadow-inner' : 'border-slate-300'}`}
                                                onKeyDown={(e) => { if (e.key === 'Enter') checkAnswer(); }}
                                            />
                                        </div>
                                    )}

                                    {/* Long Answer */}
                                    {q.type === 'long' && (
                                        <div>
                                            <textarea
                                                disabled={isCompleted[currentQIndex] || showSelfGrade}
                                                placeholder="Explain your scientific reasoning here..."
                                                value={userInputs[currentQIndex] || ''}
                                                onChange={(e) => handleInput(e.target.value)}
                                                rows="5"
                                                className={`w-full p-4 border-2 rounded-lg text-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 resize-none ${isCompleted[currentQIndex] ? 'bg-emerald-50 border-emerald-500 text-emerald-900 font-medium' : 'border-slate-300'}`}
                                            ></textarea>

                                            {showSelfGrade && !isCompleted[currentQIndex] && (
                                                <div className="mt-6 p-6 bg-slate-50 border-l-4 border-slate-500 rounded-r-lg shadow-sm fade-in">
                                                    <h4 className="font-bold text-slate-700 mb-2 uppercase text-sm tracking-wider">Expected Answer:</h4>
                                                    <p className="text-slate-900 mb-6 text-lg italic whitespace-pre-wrap">"{q.expected}"</p>
                                                    <div className="bg-white p-4 rounded border border-slate-200">
                                                        <p className="font-bold text-slate-800 mb-3 text-center">Did your answer capture this scientific meaning correctly?</p>
                                                        <div className="flex justify-center space-x-4">
                                                            <button onClick={() => handleSelfGrade(true)} className="px-6 py-2 bg-emerald-500 text-white font-bold rounded hover:bg-emerald-600 transition shadow">Yes, I got it right!</button>
                                                            <button onClick={() => handleSelfGrade(false)} className="px-6 py-2 bg-red-500 text-white font-bold rounded hover:bg-red-600 transition shadow">No, let me try again</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* Feedback Message */}
                                    {feedback && (
                                        <div className={`mt-8 p-4 rounded-lg font-bold text-center text-xl shadow-sm fade-in ${feedback.type === 'success' ? 'bg-emerald-100 text-emerald-800 border border-emerald-300' : 'bg-red-100 text-red-800 border border-red-300'}`}>
                                            {feedback.type === 'success' ? '✨ ' : '❌ '}{feedback.msg}
                                        </div>
                                    )}
                                </div>

                                {/* Controls */}
                                <div className="mt-8 flex justify-between items-center pt-6 border-t border-slate-200">
                                    <button
                                        onClick={prevQuestion}
                                        disabled={currentQIndex === 0}
                                        className={`px-6 py-3 rounded-lg font-bold transition ${currentQIndex === 0 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}
                                    >
                                        &larr; Previous
                                    </button>

                                    {!isCompleted[currentQIndex] && !showSelfGrade ? (
                                        <button
                                            onClick={checkAnswer}
                                            className="px-10 py-3 bg-emerald-600 text-white rounded-lg font-bold text-lg hover:bg-emerald-700 shadow-lg transform hover:scale-105 transition"
                                        >
                                            Check Answer
                                        </button>
                                    ) : (
                                        <button
                                            onClick={nextQuestion}
                                            disabled={!isCompleted[currentQIndex] || currentQIndex === questionsData.length - 1}
                                            className={`px-10 py-3 rounded-lg font-bold text-lg flex items-center shadow-lg transition ${(!isCompleted[currentQIndex] || currentQIndex === questionsData.length - 1) ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-emerald-500 text-white hover:bg-emerald-600 transform hover:scale-105 animate-pulse'}`}
                                        >
                                            Next Question &rarr;
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
