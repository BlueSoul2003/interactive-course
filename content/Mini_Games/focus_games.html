<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Attention Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 防止雙擊選中文字，影響遊戲體驗 */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800 no-select">

    <div class="max-w-xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 text-center text-white relative">
            <h1 class="text-2xl font-bold tracking-wide">🔥 注意力急救站</h1>
            <p class="text-indigo-100 text-sm mt-1">9-Grid Pattern Interrupts</p>
        </div>

        <!-- Game Area -->
        <div class="p-6 relative min-h-[400px]">

            <!-- 0. 主選單 (Main Menu) -->
            <div id="screen-menu" class="screen">
                <p class="text-center text-slate-500 mb-6 text-sm">選擇一個小挑戰，喚醒同學們的專注力！</p>
                <div class="grid grid-cols-3 gap-3 md:gap-4" id="menu-grid">
                    <!-- Menu items generated by JS -->
                </div>
            </div>

            <!-- 1. 🚦 极限红绿灯 -->
            <div id="screen-rlgl" class="screen hidden flex flex-col items-center">
                <div class="w-full flex justify-between items-center mb-6">
                    <h2 class="font-bold text-xl text-slate-700">🚦 极限红绿灯</h2>
                    <button onclick="showScreen('menu')" class="text-indigo-500 font-bold hover:underline">返回</button>
                </div>
                <div id="rlgl-box" onclick="rlgl_click()"
                    class="w-full h-48 rounded-2xl flex items-center justify-center cursor-pointer transition-colors duration-100 bg-slate-200 shadow-inner">
                    <span id="rlgl-text" class="text-3xl font-black tracking-widest text-slate-400">START</span>
                </div>
                <div class="mt-6 h-8">
                    <p id="rlgl-msg" class="text-xl font-bold text-indigo-600"></p>
                </div>
                <button id="rlgl-start-btn" onclick="rlgl_start()"
                    class="mt-4 w-full py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg text-lg">开始挑战</button>
            </div>

            <!-- 2. 🎯 10秒神射手 -->
            <div id="screen-target" class="screen hidden flex flex-col items-center">
                <div class="w-full flex justify-between items-center mb-4">
                    <h2 class="font-bold text-xl text-slate-700">🎯 10秒神射手</h2>
                    <button onclick="showScreen('menu')" class="text-indigo-500 font-bold hover:underline">返回</button>
                </div>
                <div class="w-full flex justify-between px-2 mb-4 text-lg">
                    <div class="text-slate-500">得分: <span id="tgt-score" class="font-bold text-indigo-600">0</span>
                    </div>
                    <div class="text-slate-500">剩余: <span id="tgt-time" class="font-bold text-rose-500">10s</span></div>
                </div>
                <div id="tgt-area" class="w-full h-64 bg-slate-200 rounded-2xl relative overflow-hidden shadow-inner">
                    <div id="tgt-overlay"
                        class="absolute inset-0 flex flex-col items-center justify-center bg-slate-800/10 z-10">
                        <p id="tgt-final-msg" class="mb-4 text-2xl font-bold text-slate-800 hidden">总分: 0</p>
                        <button onclick="tgt_start()"
                            class="px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg"
                            id="tgt-btn-start">开始 (10s)</button>
                    </div>
                    <div id="tgt-dot" onclick="tgt_hit(event)"
                        class="absolute w-12 h-12 bg-rose-500 rounded-full cursor-pointer flex items-center justify-center shadow-lg active:scale-75 transition-transform hidden">
                        <div class="w-6 h-6 border-4 border-white rounded-full"></div>
                    </div>
                </div>
            </div>

            <!-- 3. ⏱️ 盲狙秒表 -->
            <div id="screen-blind" class="screen hidden flex flex-col items-center">
                <div class="w-full flex justify-between items-center mb-6">
                    <h2 class="font-bold text-xl text-slate-700">⏱️ 盲狙秒表</h2>
                    <button onclick="showScreen('menu')" class="text-indigo-500 font-bold hover:underline">返回</button>
                </div>
                <div class="w-full bg-slate-800 rounded-2xl p-8 text-center shadow-inner mb-6">
                    <h1 class="text-6xl font-mono tracking-wider text-slate-600" id="blind-display">
                        0.000<span class="text-2xl text-slate-500 ml-1">s</span>
                    </h1>
                    <p class="text-slate-400 mt-2">目标: 准确停在 3.000 秒</p>
                </div>
                <div class="h-8 mb-6">
                    <p id="blind-msg" class="text-lg font-bold text-slate-700"></p>
                </div>
                <div class="w-full">
                    <button id="blind-start-btn" onclick="blind_start()"
                        class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg text-lg">开始计时</button>
                    <button id="blind-stop-btn" onclick="blind_stop()"
                        class="w-full py-4 bg-rose-500 text-white rounded-xl font-bold shadow-lg text-lg hidden">停止！</button>
                </div>
            </div>

            <!-- 4. 👁️ 火眼金睛 -->
            <div id="screen-odd" class="screen hidden flex flex-col items-center">
                <div class="w-full flex justify-between items-center mb-4">
                    <h2 class="font-bold text-xl text-slate-700">👁️ 火眼金睛</h2>
                    <button onclick="showScreen('menu')" class="text-indigo-500 font-bold hover:underline">返回</button>
                </div>
                <div class="w-full flex justify-between px-2 mb-4 text-lg">
                    <div class="text-slate-500">连胜: <span id="odd-score" class="font-bold text-indigo-600">0</span>
                    </div>
                    <div class="text-slate-500">剩余: <span id="odd-time" class="font-bold text-rose-500">15s</span></div>
                </div>
                <div id="odd-msg" class="h-8 mb-2 text-xl font-bold text-indigo-600"></div>

                <div id="odd-grid" class="grid gap-2 w-full max-w-[300px] mb-6 transition-all duration-300">
                    <!-- Generated by JS -->
                </div>

                <button id="odd-start-btn" onclick="odd_start()"
                    class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">开始寻找</button>
            </div>

            <!-- 5. 🎨 颜色陷阱 -->
            <div id="screen-color" class="screen hidden flex flex-col items-center">
                <div class="w-full flex justify-between items-center mb-4">
                    <h2 class="font-bold text-xl text-slate-700">🎨 颜色陷阱</h2>
                    <button onclick="showScreen('menu')" class="text-indigo-500 font-bold hover:underline">返回</button>
                </div>
                <div class="w-full flex justify-between px-4 mb-6">
                    <div class="text-slate-500 text-lg">得分: <span id="col-score"
                            class="font-bold text-indigo-600">0</span></div>
                    <div class="text-slate-500 text-lg">剩余: <span id="col-time"
                            class="font-bold text-rose-500">0s</span></div>
                </div>
                <div class="w-full h-40 flex items-center justify-center bg-slate-100 rounded-2xl mb-6 shadow-inner">
                    <h1 id="col-word" class="text-7xl font-black text-slate-400">准备</h1>
                </div>
                <div id="col-controls" class="flex gap-4 w-full hidden">
                    <button onclick="col_answer(true)"
                        class="flex-1 py-4 bg-emerald-500 text-white rounded-xl font-bold shadow-lg text-lg">✔️
                        一致</button>
                    <button onclick="col_answer(false)"
                        class="flex-1 py-4 bg-rose-500 text-white rounded-xl font-bold shadow-lg text-lg">❌ 不一致</button>
                </div>
                <button id="col-start-btn" onclick="col_start()"
                    class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">开始游戏 (10s)</button>
            </div>

            <!-- 6. ⚡ 手速狂人 -->
            <div id="screen-mash" class="screen hidden flex flex-col items-center">
                <div class="w-full flex justify-between items-center mb-6">
                    <h2 class="font-bold text-xl text-slate-700">⚡ 手速狂人</h2>
                    <button onclick="showScreen('menu')" class="text-indigo-500 font-bold hover:underline">返回</button>
                </div>
                <div class="text-slate-500 mb-6 font-mono text-lg">剩余时间: <span id="mash-time">0.0</span>s</div>

                <button id="mash-btn" onclick="mash_click()"
                    class="w-48 h-48 rounded-full shadow-[0_10px_20px_rgba(0,0,0,0.2)] flex items-center justify-center text-5xl font-black text-white bg-indigo-500 transition-transform active:scale-90 active:shadow-inner">
                    点我!
                </button>
                <div class="mt-6 h-8">
                    <p id="mash-msg" class="text-xl font-bold text-indigo-600"></p>
                </div>
            </div>

            <!-- 7. ➕ 极速心算 -->
            <div id="screen-math" class="screen hidden flex flex-col items-center">
                <div class="w-full flex justify-between items-center mb-4">
                    <h2 class="font-bold text-xl text-slate-700">➕ 极速心算</h2>
                    <button onclick="showScreen('menu')" class="text-indigo-500 font-bold hover:underline">返回</button>
                </div>
                <div class="w-full flex justify-between px-4 mb-6">
                    <div class="text-slate-500 text-lg">得分: <span id="math-score"
                            class="font-bold text-indigo-600">0</span></div>
                    <div class="text-slate-500 text-lg">剩余: <span id="math-time"
                            class="font-bold text-rose-500">0s</span></div>
                </div>
                <div
                    class="w-full h-32 flex items-center justify-center bg-slate-800 rounded-2xl mb-6 shadow-inner text-white">
                    <h1 id="math-eq" class="text-5xl font-mono">准备就绪</h1>
                </div>
                <div id="math-options" class="grid grid-cols-3 gap-4 w-full hidden">
                    <!-- Generated by JS -->
                </div>
                <button id="math-start-btn" onclick="math_start()"
                    class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">开始挑战 (10s)</button>
            </div>

            <!-- 8. 🧠 瞬间记忆 -->
            <div id="screen-memory" class="screen hidden flex flex-col items-center">
                <div class="w-full flex justify-between items-center mb-4">
                    <h2 class="font-bold text-xl text-slate-700">🧠 瞬间记忆</h2>
                    <button onclick="showScreen('menu')" class="text-indigo-500 font-bold hover:underline">返回</button>
                </div>
                <div class="w-full flex justify-end px-2 mb-2 text-lg">
                    <div class="text-slate-500">Level: <span id="mem-level-txt"
                            class="font-bold text-indigo-600">1</span></div>
                </div>
                <div class="h-10 mb-4 text-center" id="mem-msg-area">
                    <!-- Status msg -->
                </div>
                <div class="flex justify-center gap-2 mb-8" id="mem-boxes">
                    <!-- 4 Boxes -->
                </div>
                <button id="mem-start-btn" onclick="mem_start()"
                    class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">开始记忆测试</button>
            </div>

            <!-- 9. 🧩 记忆方块 -->
            <div id="screen-pattern" class="screen hidden flex flex-col items-center">
                <div class="w-full flex justify-between items-center mb-4">
                    <h2 class="font-bold text-xl text-slate-700">🧩 记忆方块</h2>
                    <button onclick="showScreen('menu')" class="text-indigo-500 font-bold hover:underline">返回</button>
                </div>
                <p id="pat-msg" class="text-slate-500 h-6 mb-4 font-bold">看仔细闪烁顺序</p>
                <div class="grid grid-cols-3 gap-2 w-full max-w-[250px] mb-6" id="pat-grid">
                    <!-- 9 Boxes generated by JS -->
                </div>
                <button id="pat-start-btn" onclick="pat_start()"
                    class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">展示方块序列</button>
            </div>

        </div>
    </div>

    <script>
        // --- System Logic & Utilities ---
        let activeIntervals = [];
        let activeTimeouts = [];

        function addInterval(fn, ms) {
            let id = setInterval(fn, ms);
            activeIntervals.push(id);
            return id;
        }

        function addTimeout(fn, ms) {
            let id = setTimeout(fn, ms);
            activeTimeouts.push(id);
            return id;
        }

        function clearAllTimers() {
            activeIntervals.forEach(clearInterval);
            activeTimeouts.forEach(clearTimeout);
            activeIntervals = [];
            activeTimeouts = [];
        }

        function showScreen(screenId) {
            clearAllTimers(); // Stop all games when switching
            document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
            document.getElementById('screen-' + screenId).classList.remove('hidden');
            if (screenId === 'menu') playSound('tick');
        }

        // --- Sound Engine (Web Audio API) ---
        let audioCtx = null;
        function playSound(type) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                const now = audioCtx.currentTime;
                const r = Math.random(); // 用于生成随机音效的变量

                if (type === 'hit') {
                    // 三种不同的 Hit 声音 (泡泡、硬币、激光)
                    if (r < 0.33) {
                        osc.type = 'square'; osc.frequency.setValueAtTime(880, now); osc.frequency.exponentialRampToValueAtTime(440, now + 0.1);
                    } else if (r < 0.66) {
                        osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                    } else {
                        osc.type = 'triangle'; osc.frequency.setValueAtTime(1000, now); osc.frequency.linearRampToValueAtTime(200, now + 0.1);
                    }
                    gainNode.gain.setValueAtTime(0.1, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'error') {
                    // 两种 Error 声音 (快速掉落 vs 电子杂音)
                    osc.type = 'sawtooth';
                    if (r < 0.5) {
                        osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
                    } else {
                        osc.frequency.setValueAtTime(200, now); osc.frequency.setValueAtTime(150, now + 0.15); osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                    }
                    gainNode.gain.setValueAtTime(0.1, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'win') {
                    // 两种不同的胜利和弦 (C Major vs A Major)
                    osc.type = 'sine';
                    if (r < 0.5) {
                        osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.1); osc.frequency.setValueAtTime(783.99, now + 0.2); osc.frequency.setValueAtTime(1046.50, now + 0.3);
                    } else {
                        osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554.37, now + 0.1); osc.frequency.setValueAtTime(659.25, now + 0.2); osc.frequency.setValueAtTime(880, now + 0.3);
                    }
                    gainNode.gain.setValueAtTime(0.1, now);
                    gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                } else if (type === 'ready') {
                    osc.type = r < 0.5 ? 'sine' : 'triangle';
                    osc.frequency.setValueAtTime(440 + (r * 100), now); // 每次音高微调
                    gainNode.gain.setValueAtTime(0.1, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                } else if (type === 'go') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(1000 + (r * 200), now);
                    gainNode.gain.setValueAtTime(0.1, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (type === 'tick') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(1200 + (r * 300), now);
                    gainNode.gain.setValueAtTime(0.1, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now); osc.stop(now + 0.05);
                }
            } catch (e) {
                console.log("Audio skipped");
            }
        }

        // --- Initialize Menu ---
        const gamesList = [
            { id: 'rlgl', icon: '🚦', name: '极限红绿灯' },
            { id: 'target', icon: '🎯', name: '10秒神射手' },
            { id: 'blind', icon: '⏱️', name: '盲狙秒表' },
            { id: 'odd', icon: '👁️', name: '火眼金睛' },
            { id: 'color', icon: '🎨', name: '颜色陷阱' },
            { id: 'mash', icon: '⚡', name: '手速狂人' },
            { id: 'math', icon: '➕', name: '极速心算' },
            { id: 'memory', icon: '🧠', name: '瞬间记忆' },
            { id: 'pattern', icon: '🧩', name: '记忆方块' }
        ];

        const menuGrid = document.getElementById('menu-grid');
        gamesList.forEach(game => {
            let btn = document.createElement('button');
            btn.className = "flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-slate-100 bg-white hover:border-indigo-400 hover:bg-indigo-50 hover:shadow-md hover:-translate-y-1 transition-all duration-200 aspect-square group";
            btn.onclick = () => showScreen(game.id);
            btn.innerHTML = `
                <span class="text-4xl mb-2 group-hover:scale-110 transition-transform">${game.icon}</span>
                <span class="font-bold text-xs md:text-sm text-slate-600 group-hover:text-indigo-700 whitespace-nowrap">${game.name}</span>
            `;
            menuGrid.appendChild(btn);
        });

        // --- 1. RLGL ---
        let rlgl_state = 'idle'; // idle, waiting, ready
        let rlgl_startTime = 0;

        function rlgl_start() {
            playSound('tick');
            rlgl_state = 'waiting';
            document.getElementById('rlgl-msg').innerText = '';
            document.getElementById('rlgl-start-btn').classList.add('hidden');

            let box = document.getElementById('rlgl-box');
            let text = document.getElementById('rlgl-text');
            box.className = "w-full h-48 rounded-2xl flex items-center justify-center cursor-pointer transition-colors duration-100 bg-rose-500 shadow-inner";
            text.className = "text-3xl font-black tracking-widest text-white";
            text.innerText = "WAIT...";

            addTimeout(() => {
                playSound('go');
                rlgl_state = 'ready';
                rlgl_startTime = Date.now();
                box.classList.replace('bg-rose-500', 'bg-emerald-500');
                text.innerText = "GO!!!";
            }, Math.random() * 3000 + 2000);
        }

        function rlgl_click() {
            if (rlgl_state === 'waiting') {
                clearAllTimers();
                playSound('error');
                rlgl_reset("太心急了！重来！", 'text-rose-500');
            } else if (rlgl_state === 'ready') {
                playSound('win');
                let time = (Date.now() - rlgl_startTime) / 1000;
                rlgl_reset(`反应时间: ${time.toFixed(3)} 秒！`, 'text-indigo-600');
            }
        }

        function rlgl_reset(msg, colorClass) {
            rlgl_state = 'idle';
            document.getElementById('rlgl-box').className = "w-full h-48 rounded-2xl flex items-center justify-center cursor-pointer transition-colors duration-100 bg-slate-200 shadow-inner";
            document.getElementById('rlgl-text').className = "text-3xl font-black tracking-widest text-slate-400";
            document.getElementById('rlgl-text').innerText = "DONE";
            let msgEl = document.getElementById('rlgl-msg');
            msgEl.className = `text-xl font-bold ${colorClass}`;
            msgEl.innerText = msg;
            document.getElementById('rlgl-start-btn').classList.remove('hidden');
            document.getElementById('rlgl-start-btn').innerText = "再试一次";
        }

        // --- 2. Target ---
        let tgt_playing = false;
        let tgt_score = 0;
        let tgt_time = 10;

        function tgt_start() {
            playSound('tick');
            tgt_playing = true;
            tgt_score = 0;
            tgt_time = 10;
            document.getElementById('tgt-score').innerText = tgt_score;
            document.getElementById('tgt-time').innerText = tgt_time + 's';
            document.getElementById('tgt-overlay').classList.add('hidden');
            document.getElementById('tgt-final-msg').classList.add('hidden');

            // 重置标靶大小
            let dot = document.getElementById('tgt-dot');
            dot.classList.remove('hidden');
            dot.style.width = '48px'; dot.style.height = '48px';
            dot.children[0].style.width = '24px'; dot.children[0].style.height = '24px';

            tgt_move();

            addInterval(() => {
                tgt_time--;
                document.getElementById('tgt-time').innerText = tgt_time + 's';
                if (tgt_time <= 0) {
                    clearAllTimers();
                    playSound('error');
                    tgt_playing = false;
                    document.getElementById('tgt-dot').classList.add('hidden');
                    document.getElementById('tgt-overlay').classList.remove('hidden');
                    document.getElementById('tgt-final-msg').classList.remove('hidden');
                    document.getElementById('tgt-final-msg').innerText = `总分: ${tgt_score}`;
                    document.getElementById('tgt-btn-start').innerText = "再玩一次";
                }
            }, 1000);
        }

        function tgt_move() {
            let area = document.getElementById('tgt-area');
            let dot = document.getElementById('tgt-dot');
            let maxX = area.clientWidth - 48;
            let maxY = area.clientHeight - 48;
            dot.style.left = Math.max(10, Math.floor(Math.random() * maxX)) + 'px';
            dot.style.top = Math.max(10, Math.floor(Math.random() * maxY)) + 'px';
        }

        function tgt_hit(e) {
            e.stopPropagation();
            if (!tgt_playing) return;
            playSound('hit');
            tgt_score++;
            document.getElementById('tgt-score').innerText = tgt_score;

            // 越点越小：极限收缩到 20px
            let dot = document.getElementById('tgt-dot');
            let newSize = Math.max(20, 48 - (tgt_score * 2));
            dot.style.width = newSize + 'px';
            dot.style.height = newSize + 'px';
            dot.children[0].style.width = (newSize / 2) + 'px';
            dot.children[0].style.height = (newSize / 2) + 'px';

            tgt_move();
        }

        // --- 3. Blind ---
        let blind_state = 'idle';
        let blind_start_t = 0;

        function blind_start() {
            playSound('tick');
            blind_state = 'running';
            blind_start_t = Date.now();
            document.getElementById('blind-display').innerHTML = `?.???<span class="text-2xl text-slate-500 ml-1">s</span>`;
            document.getElementById('blind-display').classList.replace('text-emerald-400', 'text-slate-600');
            document.getElementById('blind-msg').innerText = '';
            document.getElementById('blind-start-btn').classList.add('hidden');
            document.getElementById('blind-stop-btn').classList.remove('hidden');

            let tempCount = 0;
            addInterval(() => {
                playSound('tick');
                tempCount += 100;
                if (tempCount > 500) clearAllTimers();
            }, 100);
        }

        function blind_stop() {
            if (blind_state !== 'running') return;
            blind_state = 'stopped';
            let passed = (Date.now() - blind_start_t) / 1000;

            document.getElementById('blind-display').innerHTML = `${passed.toFixed(3)}<span class="text-2xl text-slate-500 ml-1">s</span>`;
            document.getElementById('blind-display').classList.replace('text-slate-600', 'text-emerald-400');

            document.getElementById('blind-stop-btn').classList.add('hidden');
            document.getElementById('blind-start-btn').classList.remove('hidden');
            document.getElementById('blind-start-btn').innerText = "再试一次";

            let diff = Math.abs(3.000 - passed);
            let msgEl = document.getElementById('blind-msg');
            if (diff < 0.1) { playSound('win'); msgEl.innerText = '🔥 太神了！完美盲狙！'; }
            else if (diff < 0.5) { playSound('hit'); msgEl.innerText = `差了 ${diff.toFixed(3)}s，还不错！`; }
            else { playSound('error'); msgEl.innerText = `差了 ${diff.toFixed(3)}s，再练练吧！`; }
        }

        // --- 4. Odd One Out ---
        const odd_pairs = [['😂', '😅'], ['🍎', '🍅'], ['🚗', '🚕'], ['O', '0'], ['b', 'd'], ['🤩', '😍'], ['I', 'l'], ['白', '百']];
        let odd_playing = false;
        let odd_time = 0;
        let odd_score = 0;
        let odd_level = 3; // 开始是 3x3 棋盘
        let odd_targetIdx = -1;

        function odd_start() {
            playSound('tick');
            odd_playing = true;
            odd_time = 15; // 15秒大挑战
            odd_score = 0;
            odd_level = 3;
            document.getElementById('odd-time').innerText = "15s";
            document.getElementById('odd-score').innerText = odd_score;
            document.getElementById('odd-msg').innerText = '';
            document.getElementById('odd-start-btn').classList.add('hidden');

            odd_next();

            addInterval(() => {
                odd_time--;
                document.getElementById('odd-time').innerText = odd_time + 's';
                if (odd_time <= 0) {
                    clearAllTimers();
                    odd_playing = false;
                    playSound('error');
                    document.getElementById('odd-msg').innerText = `时间到！总连胜: ${odd_score}`;
                    document.getElementById('odd-start-btn').classList.remove('hidden');
                    document.getElementById('odd-start-btn').innerText = "再战一次";
                    document.getElementById('odd-grid').innerHTML = ''; // 清空画面
                }
            }, 1000);
        }

        function odd_next() {
            let pair = odd_pairs[Math.floor(Math.random() * odd_pairs.length)];
            let totalCells = odd_level * odd_level;
            odd_targetIdx = Math.floor(Math.random() * totalCells);

            let grid = document.getElementById('odd-grid');
            // 动态改变九宫格行列数
            grid.style.gridTemplateColumns = `repeat(${odd_level}, minmax(0, 1fr))`;
            grid.innerHTML = '';

            // 格子变多，字就变小一点
            let textSize = odd_level > 6 ? 'text-xl' : odd_level > 4 ? 'text-2xl' : 'text-3xl';

            for (let i = 0; i < totalCells; i++) {
                let btn = document.createElement('button');
                btn.className = `bg-slate-100 hover:bg-indigo-100 aspect-square rounded-xl ${textSize} flex items-center justify-center transition-colors shadow-sm`;
                btn.innerText = i === odd_targetIdx ? pair[1] : pair[0];
                btn.onclick = () => odd_click(i);
                grid.appendChild(btn);
            }
        }

        function odd_click(idx) {
            if (!odd_playing) return;

            if (idx === odd_targetIdx) {
                playSound('hit');
                odd_score++;
                odd_time += 1; // 答对奖励时间
                // 每连胜2次，难度增加一级 (最高8x8)
                if (odd_score % 2 === 0 && odd_level < 8) odd_level++;

                document.getElementById('odd-score').innerText = odd_score;
                document.getElementById('odd-time').innerText = odd_time + 's';
                odd_next();
            } else {
                playSound('error');
                odd_time = Math.max(0, odd_time - 3); // 答错扣3秒
                document.getElementById('odd-time').innerText = odd_time + 's';
                // 加上视觉震动效果可增强反馈
                let grid = document.getElementById('odd-grid');
                grid.classList.add('translate-x-2');
                setTimeout(() => grid.classList.remove('translate-x-2'), 100);
            }
        }

        // --- 5. Color Trap ---
        const col_list = [
            { text: '红', color: 'text-rose-500' }, { text: '蓝', color: 'text-blue-500' },
            { text: '绿', color: 'text-emerald-500' }, { text: '黄', color: 'text-amber-500' }
        ];
        let col_playing = false;
        let col_score = 0;
        let col_time = 0;
        let col_current = null;

        function col_start() {
            playSound('tick');
            col_playing = true;
            col_score = 0;
            col_time = 10;
            document.getElementById('col-score').innerText = col_score;
            document.getElementById('col-time').innerText = col_time + 's';
            document.getElementById('col-start-btn').classList.add('hidden');
            document.getElementById('col-controls').classList.remove('hidden');

            col_next();

            addInterval(() => {
                col_time--;
                document.getElementById('col-time').innerText = col_time + 's';
                if (col_time <= 0) {
                    clearAllTimers();
                    playSound('error');
                    col_playing = false;
                    document.getElementById('col-controls').classList.add('hidden');
                    document.getElementById('col-start-btn').classList.remove('hidden');
                    document.getElementById('col-start-btn').innerText = "再玩一次";
                    document.getElementById('col-word').innerText = "时间到";
                    document.getElementById('col-word').className = "text-5xl font-black text-slate-400";
                }
            }, 1000);
        }

        function col_next() {
            let tObj = col_list[Math.floor(Math.random() * col_list.length)];
            let cObj = col_list[Math.floor(Math.random() * col_list.length)];
            col_current = { isMatch: tObj.color === cObj.color };

            let w = document.getElementById('col-word');
            w.innerText = tObj.text;
            w.className = `text-7xl font-black ${cObj.color}`;
        }

        function col_answer(userSaysMatch) {
            if (!col_playing) return;
            if (userSaysMatch === col_current.isMatch) {
                playSound('hit');
                col_score++;
            } else {
                playSound('error');
                col_score = Math.max(0, col_score - 1);
            }
            document.getElementById('col-score').innerText = col_score;
            col_next();
        }

        // --- 6. Mash ---
        let mash_playing = false;
        let mash_clicks = 0;
        let mash_time = 0;

        function mash_click() {
            if (!mash_playing && mash_time === 0) {
                // start
                playSound('tick');
                mash_playing = true;
                mash_clicks = 0;
                mash_time = 5.0;
                document.getElementById('mash-msg').innerText = '';
                let btn = document.getElementById('mash-btn');
                btn.classList.replace('bg-indigo-500', 'bg-rose-500');
                btn.innerText = "0";

                addInterval(() => {
                    mash_time -= 0.1;
                    if (mash_time <= 0.05) { // floating point accuracy
                        mash_time = 0;
                        clearAllTimers();
                        mash_playing = false;
                        playSound('win');
                        btn.classList.replace('bg-rose-500', 'bg-indigo-500');
                        btn.innerText = "点我!";
                        document.getElementById('mash-msg').innerText = `你的手速: ${(mash_clicks / 5).toFixed(1)} 点击/秒`;
                    }
                    document.getElementById('mash-time').innerText = mash_time.toFixed(1);
                }, 100);
            } else if (mash_playing) {
                playSound('hit');
                mash_clicks++;
                document.getElementById('mash-btn').innerText = mash_clicks;
            }
        }

        // --- 7. Fast Math ---
        let math_playing = false;
        let math_score = 0;
        let math_time = 0;
        let math_ans = 0;

        function math_start() {
            playSound('tick');
            math_playing = true;
            math_score = 0;
            math_time = 10;
            document.getElementById('math-score').innerText = math_score;
            document.getElementById('math-time').innerText = math_time + 's';
            document.getElementById('math-start-btn').classList.add('hidden');
            document.getElementById('math-options').classList.remove('hidden');

            math_next();

            addInterval(() => {
                math_time--;
                document.getElementById('math-time').innerText = math_time + 's';
                if (math_time <= 0) {
                    clearAllTimers();
                    playSound('error');
                    math_playing = false;
                    document.getElementById('math-options').classList.add('hidden');
                    document.getElementById('math-start-btn').classList.remove('hidden');
                    document.getElementById('math-start-btn').innerText = "再挑战一次";
                    document.getElementById('math-eq').innerText = "时间到";
                }
            }, 1000);
        }

        function math_next() {
            let isAdd = Math.random() > 0.5;
            let a = Math.floor(Math.random() * 20) + 1;
            let b = Math.floor(Math.random() * 20) + 1;
            math_ans = isAdd ? a + b : a - b;
            document.getElementById('math-eq').innerText = `${a} ${isAdd ? '+' : '-'} ${b} = ?`;

            let opts = [math_ans, math_ans + 1, math_ans - 1, math_ans + 2].sort(() => Math.random() - 0.5).slice(0, 3);
            if (!opts.includes(math_ans)) opts[0] = math_ans;
            opts.sort(() => Math.random() - 0.5);

            let container = document.getElementById('math-options');
            container.innerHTML = '';
            opts.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = "py-4 bg-indigo-100 hover:bg-indigo-200 text-indigo-900 rounded-xl font-bold text-2xl shadow-sm";
                btn.innerText = opt;
                btn.onclick = () => math_answer(opt);
                container.appendChild(btn);
            });
        }

        function math_answer(opt) {
            if (!math_playing) return;
            if (opt === math_ans) {
                playSound('hit');
                math_score++;
            } else {
                playSound('error');
                math_score = Math.max(0, math_score - 1);
            }
            document.getElementById('math-score').innerText = math_score;
            math_next();
        }

        // --- 8. Memory ---
        const mem_emojis = ['🍎', '🐶', '🚗', '⚽', '🎸', '🍕', '🚀', '🎈', '⭐', '🍉'];
        let mem_phase = 'idle'; // idle, mem, guess, result
        let mem_seq = [];
        let mem_target = '';
        let mem_level = 1;

        function mem_render_boxes(show) {
            let container = document.getElementById('mem-boxes');
            container.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                let btn = document.createElement('button');
                btn.className = "w-16 h-20 bg-slate-100 border-2 border-slate-200 rounded-xl flex items-center justify-center text-4xl shadow-sm hover:border-indigo-400 transition-colors";
                if (show) {
                    btn.innerText = mem_seq[i] || '';
                    btn.disabled = true;
                } else if (mem_phase === 'guess') {
                    btn.innerText = '❓';
                    btn.onclick = () => mem_guess(i);
                } else {
                    btn.innerText = mem_seq[i] || ''; // result phase
                    btn.disabled = true;
                }
                container.appendChild(btn);
            }
        }
        mem_render_boxes(true); // init empty

        function mem_start(isNextLevel = false) {
            if (!isNextLevel) mem_level = 1;
            document.getElementById('mem-level-txt').innerText = mem_level;

            playSound('ready');
            mem_phase = 'mem';
            document.getElementById('mem-start-btn').classList.add('hidden');

            mem_seq = [...mem_emojis].sort(() => Math.random() - 0.5).slice(0, 4);
            mem_render_boxes(true);

            // 闪现时间随等级加快 (最低压缩到 0.5 秒)
            let showTimeMs = Math.max(500, 2500 - (mem_level * 300));
            let showTimeSec = (showTimeMs / 1000).toFixed(1);

            let msgArea = document.getElementById('mem-msg-area');
            msgArea.innerHTML = `<p class="text-rose-500 font-bold animate-pulse">快记下它们的位置！(${showTimeSec}秒)</p>`;

            addTimeout(() => {
                playSound('go');
                mem_phase = 'guess';
                mem_target = mem_seq[Math.floor(Math.random() * 4)];
                msgArea.innerHTML = `<p class="text-indigo-600 font-bold text-lg">刚刚 <span class="text-2xl">${mem_target}</span> 在第几个位置？</p>`;
                mem_render_boxes(false);
            }, showTimeMs);
        }

        function mem_guess(idx) {
            if (mem_phase !== 'guess') return;
            mem_phase = 'result';

            let msgArea = document.getElementById('mem-msg-area');
            if (mem_seq[idx] === mem_target) {
                playSound('win');
                mem_level++; // Level Up
                msgArea.innerHTML = `<p class="text-emerald-600 font-bold text-lg">✅ 正确！准备下一关...</p>`;
                mem_render_boxes(false);
                // 1.5秒后自动进入下一关
                addTimeout(() => mem_start(true), 1500);
            } else {
                playSound('error');
                msgArea.innerHTML = `<p class="text-rose-600 font-bold text-lg">❌ 记错啦！连胜终止于 Level ${mem_level}</p>`;
                mem_render_boxes(false);
                document.getElementById('mem-start-btn').classList.remove('hidden');
                document.getElementById('mem-start-btn').innerText = "重新挑战";
            }
        }

        // --- 9. Pattern Match ---
        let pat_seq = [];
        let pat_step = 0;
        let pat_playing = false;

        function pat_init_grid() {
            let grid = document.getElementById('pat-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                let btn = document.createElement('button');
                btn.id = `pat-btn-${i}`;
                btn.className = "aspect-square rounded-xl shadow-inner transition-colors duration-200 bg-slate-200 hover:bg-slate-300";
                btn.onclick = () => pat_click(i);
                grid.appendChild(btn);
            }
        }
        pat_init_grid();

        async function pat_start() {
            document.getElementById('pat-start-btn').classList.add('hidden');
            document.getElementById('pat-msg').innerText = "仔细看...";
            pat_playing = false; // block user click during anim
            pat_step = 0;

            // 如果是挑战更难，方块序列加 1
            if (document.getElementById('pat-start-btn').innerText === "挑战更难") {
                pat_seq.push(Math.floor(Math.random() * 9));
            } else {
                pat_seq = Array.from({ length: 3 }, () => Math.floor(Math.random() * 9)); // 从3个开始
            }

            const sleep = ms => new Promise(r => setTimeout(r, ms));

            // 随着序列变长，闪烁速度变快
            let speedOff = pat_seq.length * 30;
            let showMs = Math.max(150, 600 - speedOff);
            let hideMs = Math.max(50, 300 - (speedOff / 2));

            for (let i = 0; i < pat_seq.length; i++) {
                await sleep(showMs);
                let idx = pat_seq[i];
                let btn = document.getElementById(`pat-btn-${idx}`);
                btn.classList.replace('bg-slate-200', 'bg-emerald-400');
                btn.classList.replace('hover:bg-slate-300', 'scale-95');
                playSound('tick');
                await sleep(hideMs);
                btn.classList.replace('bg-emerald-400', 'bg-slate-200');
                btn.classList.replace('scale-95', 'hover:bg-slate-300');
            }

            document.getElementById('pat-msg').innerText = "轮到你了！";
            pat_playing = true;
        }

        function pat_click(idx) {
            if (!pat_playing) return;

            let btn = document.getElementById(`pat-btn-${idx}`);
            btn.classList.replace('bg-slate-200', 'bg-emerald-400');
            playSound('hit');
            setTimeout(() => btn.classList.replace('bg-emerald-400', 'bg-slate-200'), 150);

            if (idx === pat_seq[pat_step]) {
                if (pat_step + 1 === pat_seq.length) {
                    pat_playing = false;
                    setTimeout(() => {
                        playSound('win');
                        document.getElementById('pat-msg').innerText = '✅ 完美复刻！';
                        document.getElementById('pat-start-btn').classList.remove('hidden');
                        document.getElementById('pat-start-btn').innerText = "挑战更难";
                    }, 300);
                } else {
                    pat_step++;
                }
            } else {
                pat_playing = false;
                playSound('error');
                document.getElementById('pat-msg').innerText = '❌ 顺序错啦！';
                document.getElementById('pat-start-btn').classList.remove('hidden');
                document.getElementById('pat-start-btn').innerText = "再试一次";
            }
        }

    </script>
</body>

</html>
