    <script>
        const familyData = [{"zh": "爷爷/外公", "en": "Grandfather", "uchi": "そふ", "soto": "おじいさん"}, {"zh": "奶奶/外婆", "en": "Grandmother", "uchi": "そぼ", "soto": "おばあさん"}, {"zh": "爸爸", "en": "Father", "uchi": "ちち", "soto": "おとうさん"}, {"zh": "妈妈", "en": "Mother", "uchi": "はは", "soto": "おかあさん"}, {"zh": "哥哥", "en": "Older Brother", "uchi": "あに", "soto": "おにいさん"}, {"zh": "姐姐", "en": "Older Sister", "uchi": "あね", "soto": "おねえさん"}, {"zh": "弟弟", "en": "Younger Brother", "uchi": "おとうと", "soto": "おとうとさん"}, {"zh": "妹妹", "en": "Younger Sister", "uchi": "いもうと", "soto": "いもうとさん"}];

你的【{zh}】...", "en": "Professor Trelawney predicts a family disaster. You worryingly think of your [{en}]..."}, {"zh": "因为夜游禁林被费尔奇抓住关禁闭，你一边擦奖杯一边想，要是你的【{zh}】知道了肯定会大发雷霆...", "en": "Serving detention with Filch, you scrub trophies and think how furious your [{en}] would be..."}, {"zh": "舞会前，你无奈地试穿包裹里寄来的老式天鹅绒礼服，这是你的【{zh}】特意为你挑选的...", "en": "Before the Yule Ball, you sigh while trying on the old-fashioned velvet robes your [{en}] picked for you..."}];
        const sotoPrompts = [{"zh": "你在国王十字车站9¾站台遇到同学，你走上前礼貌地向他的【{zh}】问好...", "en": "At Platform 9 3/4, you step forward to politely greet your classmate's [{en}]..."}, {"zh": "赫敏正在图书馆翻阅麻瓜历史书，你好奇地走过去，询问她的【{zh}】是不是也懂这些...", "en": "Hermione is devouring Muggle history books. You ask if her [{en}] also understands this stuff..."}, {"zh": "罗恩收到了一只破烂的旧猫头鹰，你安慰他，并顺便问候了他的【{zh}】...", "en": "Ron receives a battered old owl. You comfort him and ask how his [{en}] is doing..."}, {"zh": "马尔福又在走廊上大声炫耀他多有钱，你翻了一个白眼，但还是虚伪地夸奖了他的【{zh}】几句...", "en": "Malfoy brags about his wealth again. You roll your eyes but falsely praise his [{en}]..."}, {"zh": "万圣节晚宴上，你的同学分享了家里寄来的南瓜饼，你尝了一口后，让他代为感谢他的【{zh}】...", "en": "At the Halloween feast, your friend shares family-sent pumpkin pasties. You ask him to thank his [{en}]..."}, {"zh": "在对角巷的奥利凡德魔杖店，恰好遇到新生来买魔杖，你以前辈的身份微笑着向他的【{zh}】致意...", "en": "At Ollivanders, you see a new student buying a wand. You smile and greet his [{en}] as a senior..."}, {"zh": "塞德里克在三强争霸赛中表现出色，你遇到他时，称赞他的【{zh}】一定会为他感到骀傲...", "en": "You praise Cedric's Tournament performance, saying his [{en}] must be incredibly proud..."}, {"zh": "卢娜告诉你弯角鼾兽是真的存在，你微笑着附和，并问她的【{zh}】是不是也相信...", "en": "Luna says Crumple-Horned Snorkacks are real. You smile and ask if her [{en}] believes it too..."}, {"zh": "西莫在练习悬浮咒时又把羽毛炸了，你一边帮他灭火一边问，他的【{zh}】是不是也会这种“爆破魔法”...", "en": "Seamus blows up his feather. Helping him extinguish it, you ask if his [{en}] also uses 'explosion magic'..."}, {"zh": "丁·托马斯在画一张巨大的西汉姆联队海报，你问他是不是他的【{zh}】带他入坑的...", "en": "Dean is drawing a huge West Ham poster. You ask if his [{en}] got him into the team..."}, {"zh": "帕瓦蒂穿着一件非常华丽的印度传统礼服参加舞会，你赞美她，并问是不是她的【{zh}】寄来的...", "en": "Parvati wears gorgeous traditional robes to the ball. You praise them and ask if her [{en}] sent them..."}, {"zh": "在破釜酒吧遇到你的室友一家，你举起黄油啤酒，恭敬地向他的【{zh}】敬了一杯...", "en": "Running into your roommate's family at the Leaky Cauldron, you respectfully toast his [{en}] with Butterbeer..."}, {"zh": "魁地奇世界杯上，你碰巧坐在同学一家的旁边，你兴奋地和他的【{zh}】讨论起比赛的队伍...", "en": "At the Quidditch World Cup, you sit near a classmate's family and excitedly discuss teams with their [{en}]..."}, {"zh": "你的朋友因为考试不及格在公共休息室哭泣，你递上纸巾，问她的【{zh}】会不会责骂她...", "en": "Your friend cries over a failed exam. You hand her a tissue and ask if her [{en}] will blame her..."}];
        const i18n = {"zh": {"title": "东方魔咒 O.W.L.", "subtitle": "点击按钮开始测试！\n你可以自由拖拽羊皮纸！", "uchiBtn": "Uchi (内) 测试 - 称呼自己家人", "sotoBtn": "Soto (外) 测试 - 称呼别人家人", "mixedBtn": "终极 O.W.L. 综合测试", "scoreLabel": "学院加分", "progressLabel": "进度", "uchiTag": "自己家人 (Uchi)", "sotoTag": "别人家人 (Soto)", "correct": "正确！+10分", "wrong": "魔咒反弹！正确:", "resultTitle": "O.W.L. 成绩单", "finalScore": "最终得分", "gradeLabel": "综合评级", "restart": "重新参加考试", "resetNotice": "题库已重置洗牌！", "grades": {"O": {"grade": "O (优秀 Outstanding)", "msg": "太棒了！梅林的胡子，完美的魔咒收放！"}, "E": {"grade": "E (良好 Exceeds Expectations)", "msg": "干得不错！你在魔法部的社交场合绝不会出丑！"}, "A": {"grade": "A (及格 Acceptable)", "msg": "勉强及格！虽然有些磕磕绊绊，但至少没炸炉。"}, "P": {"grade": "P (差劲 Poor)", "msg": "不行，你需要花更多时间在图书馆复习内外！"}, "T": {"grade": "T (巨怪 Troll)", "msg": "哎呀！你把别人的爸爸当成自己的爸爸了吗？赶快去复习！"}}}, "en": {"title": "Eastern Charms O.W.L.", "subtitle": "Click a button to start.\nYou can freely drag the parchments!\n(Magic sounds enabled)", "uchiBtn": "Uchi Trial - Your own family", "sotoBtn": "Soto Trial - Others' family", "mixedBtn": "Ultimate O.W.L. Test (Mixed)", "scoreLabel": "House Points", "progressLabel": "Progress", "uchiTag": "Own Family (Uchi)", "sotoTag": "Others' Family (Soto)", "correct": "Correct! +10 pts", "wrong": "Spell Rebounded! Correct:", "resultTitle": "O.W.L. Results", "finalScore": "Final Score", "gradeLabel": "Overall Grade", "restart": "Retake Exam", "resetNotice": "Question pool reshuffled!", "grades": {"O": {"grade": "O (Outstanding)", "msg": "Merlin's beard! A perfect display of Charms!"}, "E": {"grade": "E (Exceeds Expectations)", "msg": "Well done! You won't embarrass yourself at the Ministry."}, "A": {"grade": "A (Acceptable)", "msg": "Barely passed! A bit stumbling, but at least nothing exploded."}, "P": {"grade": "P (Poor)", "msg": "You need more time in the library reviewing Uchi/Soto!"}, "T": {"grade": "T (Troll)", "msg": "Blimey! You called someone else's father your own! Go revise!"}}}};

        const ROUND_SIZE = 15;
        let lang = "zh";
        let currentQuestions = [];
        let currentQIndex = 0;
        let score = 0;
        let remainingPools = { uchi: [], soto: [], mixed: [] };
        let isTransitioning = false;

        function playClick() {}
        function playCorrect() {}
        function playWrong() {}

        function shuffleArray(arr) {
            const newArr = [...arr];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function buildPool(type) {
            const pool = [];
            const prompts = type === 'uchi' ? uchiPrompts : sotoPrompts;
            familyData.forEach(member => {
                prompts.forEach(prompt => {
                    const situationZh = prompt.zh.replace('{zh}', member.zh);
                    const situationEn = prompt.en.replace('{en}', member.en);
                    const correctAnswer = type === 'uchi' ? member.uchi : member.soto;
                    const trapAnswer = type === 'uchi' ? member.soto : member.uchi;
                    
                    let otherOptions = familyData.filter(d => d.zh !== member.zh).map(d => type === 'uchi' ? d.uchi : d.soto);
                    otherOptions = shuffleArray(otherOptions).slice(0, 2);
                    const options = shuffleArray([correctAnswer, trapAnswer, ...otherOptions]);
                    
                    pool.push({ type, targetZh: member.zh, targetEn: member.en, situationZh, situationEn, correctAnswer, options });
                });
            });
            return shuffleArray(pool);
        }

        function renderStart() {
            const t = i18n[lang];
            const html = `
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="bg-parchment border-4 border-[#740001] rounded-2xl p-8 max-w-md w-full shadow-2xl relative z-10 text-center">
                    <button onclick="toggleLang()" class="absolute -top-5 -right-5 bg-[#D3A625] text-[#740001] px-4 py-2 rounded-full font-bold shadow-lg hover:scale-105 transition-transform border-2 border-[#740001]">
                        ${lang === 'zh' ? 'English' : '中文'}
                    </button>
                    <h1 class="text-4xl font-serif font-bold text-[#740001] drop-shadow-sm mb-4">
                        ${t.title}
                    </h1>
                    <p class="text-gray-800 mb-6 text-sm font-medium whitespace-pre-line">
                        ${t.subtitle}
                    </p>
                    <div class="grid grid-cols-1 gap-4">
                        <button onclick="startGame('uchi')" class="bg-[#740001] text-[#D3A625] font-bold p-3 rounded-lg hover:scale-105 transition-transform shadow-md border border-[#D3A625]">
                            ${t.uchiBtn}
                        </button>
                        <button onclick="startGame('soto')" class="bg-[#740001] text-[#D3A625] font-bold p-3 rounded-lg hover:scale-105 transition-transform shadow-md border border-[#D3A625]">
                            ${t.sotoBtn}
                        </button>
                        <button onclick="startGame('mixed')" class="bg-gradient-to-r from-[#D3A625] to-[#B8860B] text-[#740001] font-bold p-3 rounded-lg hover:scale-105 transition-transform shadow-md border border-[#740001]">
                            ${t.mixedBtn}
                        </button>
                    </div>
                </div>
            </div>
        `;
            document.getElementById('app').innerHTML = html;
        }

        window.toggleLang = function() {
            lang = lang === 'zh' ? 'en' : 'zh';
            if (currentQuestions.length === 0) renderStart(); else renderPlaying();
        }

        window.startGame = function(selectedMode) {
            playClick();
            if (remainingPools[selectedMode].length < ROUND_SIZE) {
                if (selectedMode === 'mixed') {
                    remainingPools.mixed = shuffleArray([...buildPool('uchi'), ...buildPool('soto')]);
                } else {
                    remainingPools[selectedMode] = buildPool(selectedMode);
                }
                showNotice();
            }
            currentQuestions = remainingPools[selectedMode].slice(0, ROUND_SIZE);
            remainingPools[selectedMode] = remainingPools[selectedMode].slice(ROUND_SIZE);
            currentQIndex = 0;
            score = 0;
            renderPlaying();
        }

        function showNotice() {
            const el = document.createElement('div');
            el.className = "absolute top-4 left-1/2 -translate-x-1/2 bg-[#D3A625] text-[#740001] px-6 py-2 rounded-full font-bold shadow-lg z-[100] transition-opacity";
            el.innerText = i18n[lang].resetNotice;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        window.handleAnswer = function(optionIdx) {
            if (isTransitioning) return;
            isTransitioning = true;
            const q = currentQuestions[currentQIndex];
            const selected = q.options[optionIdx];
            const isCorrect = selected === q.correctAnswer;

            const optionBtns = document.getElementById('options').children;
            if (isCorrect) {
                optionBtns[optionIdx].className += " bg-green-600 border-green-400 text-white shadow-[0_0_15px_#4ade80]";
                score += 10;
                let fb = document.getElementById('feedback');
                fb.innerHTML = `<div class="absolute inset-0 flex items-center justify-center rounded-lg bg-opacity-95 backdrop-blur-sm bg-[#D3A625]/30 text-green-800"><div class="text-center font-bold text-2xl drop-shadow-md">${GreenTick} ${i18n[lang].correct}</div></div>`;
                document.getElementById('module_question').classList.add('magic-flash');
            } else {
                optionBtns[optionIdx].className += " bg-red-800 border-red-500 text-gray-300";
                let fb = document.getElementById('feedback');
                fb.innerHTML = `<div class="absolute inset-0 flex items-center justify-center rounded-lg bg-opacity-95 backdrop-blur-sm bg-red-900/90 text-red-100"><div class="text-center font-bold text-2xl drop-shadow-md">${RedCross} <span class="text-xl mb-1">${i18n[lang].wrong}</span> <span class="text-3xl">${q.correctAnswer}</span></div></div>`;
                document.getElementById('module_question').classList.add('animate-shake');
            }

            document.getElementById('scoreText').innerText = score;
            setTimeout(() => {
                isTransitioning = false;
                if (currentQIndex < currentQuestions.length - 1) {
                    currentQIndex++;
                    renderPlaying();
                } else {
                    renderResult();
                }
            }, 1500);
        }

        const GreenTick = `<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-2 text-green-700"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        const RedCross = `<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-2 text-red-300"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;

        function dragElement(elm) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elm.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                if (e.target.tagName === 'BUTTON') return;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                document.querySelectorAll('.draggable').forEach(el => el.style.zIndex = 10);
                elm.style.zIndex = 20;
            }
            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elm.style.top = (elm.offsetTop - pos2) + "px";
                elm.style.left = (elm.offsetLeft - pos1) + "px";
            }
            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

            });

            const html = `

                    ${lang === 'zh' ? 'English' : '中文'}

            <div id="module_score" class="draggable absolute cursor-move bg-parchment border-2 border-[#c19a6b] shadow-xl rounded-lg p-4 w-48 z-20" style="top: 20px">

                    <h3 class="font-bold border-b border-[#c19a6b] pb-2 mb-2">${t.scoreLabel}</h3>

                    <p class="text-xs text-gray-600 mt-2">${t.progressLabel}: ${currentQIndex + 1}/${ROUND_SIZE}</p>
                </div>
            </div>

            <div id="module_question" class="draggable absolute cursor-move bg-parchment border-2 border-[#c19a6b] shadow-xl rounded-lg p-4 w-[90vw] max-w-[400px] z-10" style="top: 150px; left: 10px;">
                <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-[#740001] text-[#D3A625] px-4 py-1 rounded-full text-xs font-bold border border-[#D3A625] shadow-md whitespace-nowrap">
                    ${q.type === 'uchi' ? t.uchiTag : t.sotoTag}
                </div>
                <p class="text-gray-900 font-serif text-xl leading-relaxed text-center mt-4 font-medium min-h-[100px] flex items-center justify-center">
                    ${lang === 'zh' ? q.situationZh : q.situationEn}
                </p>
                <div id="feedback"></div>
            </div>

            <div id="module_options" class="draggable absolute cursor-move bg-parchment border-2 border-[#c19a6b] shadow-xl rounded-lg p-4 w-[90vw] max-w-[360px] z-10" style="top: 400px; left: 10px;">
                <div id="options" class="grid grid-cols-2 gap-3">
                    ${optionsHtml}
                </div>
            </div>
        `;
            document.getElementById('app').innerHTML = html;
            if (!isMobile) {
                document.getElementById('module_score').style.left = (window.innerWidth - 250) + "px";
                document.getElementById('module_question').style.left = (window.innerWidth / 2 - 200) + "px";
                document.getElementById('module_options').style.left = (window.innerWidth / 2 - 180) + "px";
            }
            document.querySelectorAll('.draggable').forEach(dragElement);
        }

        window.renderStart = renderStart;

        function renderResult() {
            const t = i18n[lang];
            let gradeData = t.grades.T;
            if (score >= 135) gradeData = t.grades.O;
            else if (score >= 105) gradeData = t.grades.E;
            else if (score >= 75) gradeData = t.grades.A;
            else if (score >= 45) gradeData = t.grades.P;

            const html = `
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="bg-parchment text-gray-900 w-full max-w-md p-8 rounded-lg shadow-2xl border-4 border-[#D3A625] relative animate-fade-in text-center">
                    <button onclick="toggleLang()" class="absolute -top-5 -right-5 bg-[#D3A625] text-[#740001] px-4 py-2 rounded-full font-bold shadow-lg hover:scale-105 transition-transform border-2 border-[#740001]">
                        ${lang === 'zh' ? 'English' : '中文'}
                    </button>
                    <h2 class="text-3xl font-serif font-bold border-b-2 border-gray-400 pb-4 mb-4 text-[#740001]">${t.resultTitle}</h2>
                    <p class="text-lg">${t.finalScore}</p>
                    <p class="text-7xl font-bold text-[#D3A625] drop-shadow-md my-2">${score}</p>

                    <div class="bg-white/50 p-4 rounded-md mt-4 border border-[#c19a6b]">
                        <p class="text-sm text-gray-600 mb-1">${t.gradeLabel}</p>
                        <p class="text-2xl font-bold text-[#740001]">${gradeData.grade}</p>
                    </div>
                    <p class="font-serif italic mt-4 text-gray-800">"${gradeData.msg}"</p>
                    <button onclick="renderStart()" class="w-full flex justify-center items-center gap-2 bg-[#740001] text-[#D3A625] font-bold px-8 py-3 rounded-lg transition-transform hover:scale-105 mt-8 shadow-md border border-[#D3A625]">
                        ${t.restart}
                    </button>
                </div>
            </div>
        `;
            document.getElementById('app').innerHTML = html;
        }

        window.onload = renderStart;
    </script>
</body>
</html>
