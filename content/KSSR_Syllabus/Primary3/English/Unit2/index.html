            }
        }
        function playTone(freq, type, duration, vol = 0.1, startTimeOffset = 0) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTimeOffset);

            gain.gain.setValueAtTime(vol, audioCtx.currentTime + startTimeOffset);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + startTimeOffset + duration);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + startTimeOffset);
            osc.stop(audioCtx.currentTime + startTimeOffset + duration);
        }

            initAudio();

                {
                    qEn: "4. What tools will you be using?", qZh: "你会使用什么工具？",
                    options: [
                        { text: "I will use a sketchbook, computers, and tools.", zhText: "我将使用素描本、电脑和工具。", emoji: "💻", requires: 0 },
                        { text: "I will use food buckets, hoses, and medical kits.", zhText: "我将使用食物桶、水管和医疗箱。", emoji: "🪣", requires: 1 },
                        { text: "I will use a digital camera and different lenses.", zhText: "我将使用数码相机和不同的镜头。", emoji: "🔭", requires: 2 },
                        { text: "I will use sharp knives, pots, and pans.", zhText: "我将使用锋利的刀具、锅和煎锅。", emoji: "🔪", requires: 3 }
                    ]
                },
                {
                    qEn: "5. What will you be wearing to work?", qZh: "你上班会穿什么？",
                    options: [
                        { text: "I will wear a white lab coat and safety goggles.", zhText: "我将穿着白色实验袍和安全护目镜。", emoji: "🥽", requires: 0 },
                        { text: "I will wear a green uniform and strong boots.", zhText: "我将穿着绿色制服和结实的靴子。", emoji: "🥾", requires: 1 },
                        { text: "I will wear comfortable clothes and a vest.", zhText: "我将穿着舒适的衣服和背心。", emoji: "🦺", requires: 2 },
                        { text: "I will wear a white uniform and a tall chef's hat.", zhText: "我将穿着白色制服和高高的厨师帽。", emoji: "🧑‍🍳", requires: 3 }
                    ]
                },
                {
                    qEn: "6. What must you do to achieve your ambition?", qZh: "你必须怎么做才能实现理想？",
                    options: [
                        { text: "To achieve this, I must study hard and never skip classes!", zhText: "为了实现这个目标，我必须努力学习，从不逃课！", emoji: "🎓" } // 通用结尾
                    ]
                }
            ]
        };

        // --- UTILITY & NAVIGATION ---
        function updateUI() {
            document.getElementById('ui-step').innerText = currentStep;
            document.getElementById('ui-sublevel').innerText = subLevel + 1;

            // Handle Step 7 which has no sub-levels
            if (currentStep === 7) {
                document.getElementById('ui-total').innerText = "1";
                document.getElementById('ui-sublevel').innerText = "1";
            } else {
                const total = gameData[`phase${currentStep}`].length;
                document.getElementById('ui-total').innerText = total;
            }

            document.getElementById('ui-score').innerText = myCurrentScore;

            // Update Tabs (now 1 to 7)
            for (let i = 1; i <= 7; i++) {
                const tab = document.getElementById(`tab-${i}`);
                if (tab) {
                    if (i === currentStep) {
                        tab.className = "whitespace-nowrap flex-shrink-0 snap-center py-3 px-5 rounded-2xl font-black text-sm md:text-base border-b-4 transition-all bg-blue-500 text-white border-blue-700 shadow-md";
                        // Auto-scroll the active tab into the center of the view smoothly
                        tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    } else {
                        tab.className = "whitespace-nowrap flex-shrink-0 snap-center py-3 px-5 rounded-2xl font-black text-sm md:text-base border-b-4 transition-all bg-gray-100 text-gray-400 border-gray-300 hover:bg-gray-200 cursor-pointer";
                    }
                }
            }
        }

        function playConfetti() {
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = ['#fde047', '#60a5fa', '#f472b6', '#4ade80'][Math.floor(Math.random() * 4)];
                conf.style.animationDuration = (Math.random() * 2 + 1) + 's';
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 3000);
            }
        }

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Global Navigation
        function goToPhase(phase) {
            initAudio(); // Initialize audio context on first user click anywhere
            currentStep = phase;
            subLevel = 0;
            if (phase === 6) essayAnswers = []; // Reset essay if jumping to phase 6
            renderCurrentPhase();
        }

        function nextLevel() {
            initAudio();
            if (currentStep === 7) return; // End of game
            const total = gameData[`phase${currentStep}`].length;
            if (subLevel < total - 1) {
                subLevel++;
                renderCurrentPhase();
            } else if (currentStep < 7) { // Can advance up to Phase 7
                goToPhase(currentStep + 1);
            }
        }

        function prevLevel() {
            initAudio();
            if (currentStep === 7) {
                goToPhase(6);
            } else if (subLevel > 0) {
                subLevel--;
                renderCurrentPhase();
            } else if (currentStep > 1) {
                currentStep--;
                subLevel = gameData[`phase${currentStep}`].length - 1;
                renderCurrentPhase();
            }
        }

        function renderCurrentPhase() {
            updateUI();
            const content = document.getElementById('game-content');
            content.innerHTML = ''; // Clear current

            if (currentStep === 1) renderPhase1(content);
            else if (currentStep === 2) renderPhase2(content);
            else if (currentStep === 3) renderPhase3(content);
            else if (currentStep === 4) renderPhase4(content);
            else if (currentStep === 5) renderPhase5(content);
            else if (currentStep === 6) renderPhase6(content);
            else if (currentStep === 7) renderPhase7(content);
        }

        // --- PHASE RENDERING LOGIC ---

        // Phase 1: Vocab
        function renderPhase1(container) {
            const data = gameData.phase1[subLevel];
            let shuffledOptions = shuffleArray(data.options);

            container.innerHTML = `
                <div class="text-center animate-drop w-full">
                    <h2 class="text-2xl font-bold text-blue-800 mb-2">Step 1: Vocab Match</h2>
                    <p class="text-gray-500 mb-6 font-bold">听音/看意，选择正确的英文单词</p>
                    
                    <div class="bg-blue-50 rounded-3xl p-8 mb-8 inline-block border-4 border-blue-200 shadow-inner">
                        <div class="text-7xl mb-4">${data.emoji}</div>
                        <div class="text-3xl font-black text-gray-800">${data.zh}</div>
                    </div>

                    <div class="flex flex-col md:flex-row gap-4 justify-center w-full max-w-md mx-auto">
                        ${shuffledOptions.map(opt => `
                            <button onclick="handlePhase1Click('${opt}', '${data.en}', this)" 
                                class="flex-1 bg-white border-4 border-gray-200 hover:border-blue-400 hover:bg-blue-50 text-2xl font-bold py-4 px-4 rounded-2xl shadow-sm transition-all transform active:scale-95 text-gray-700">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        window.handlePhase1Click = function (selected, correct, btn) {
            initAudio();
            if (selected === correct) {
                playCorrectSound();
                btn.classList.replace('border-gray-200', 'border-green-500');
                btn.classList.replace('hover:border-blue-400', 'border-green-500');
                btn.classList.replace('text-gray-700', 'text-green-600');
                btn.classList.add('bg-green-100');
                myCurrentScore += 10;

                setTimeout(() => {
                    if (subLevel === gameData.phase1.length - 1) playConfetti();
                    nextLevel();
                }, 800);
            } else {
                playWrongSound();
                btn.classList.add('animate-shake');
                setTimeout(() => btn.classList.remove('animate-shake'), 400);
            }
        }

        // Phase 2: Spell
        let currentSpellIndex = 0;
        function renderPhase2(container) {
            const data = gameData.phase2[subLevel];
            currentSpellIndex = 0;
            while (currentSpellIndex < data.given.length && data.given[currentSpellIndex] !== "") {
                currentSpellIndex++;
            }

            container.innerHTML = `
                <div class="text-center animate-drop w-full">
                    <h2 class="text-2xl font-bold text-purple-800 mb-2">Step 2: Magic Spelling</h2>
                    <p class="text-gray-500 mb-4 font-bold">点击泡泡，补全单词 (Page 12)</p>
                    
                    <div class="bg-purple-50 rounded-2xl p-4 mb-6 border-2 border-purple-200 flex items-center justify-center gap-4 text-left">
                        <div class="text-5xl">${data.emoji}</div>
                        <div>
                            <p class="font-bold text-sm md:text-lg text-gray-800">"${data.clueEn}"</p>
                            <p class="text-xs md:text-sm text-gray-500">${data.clueZh}</p>
                        </div>
                    </div>

                    <div id="spell-slots" class="flex flex-wrap justify-center gap-1 md:gap-2 mb-8">
                        ${data.given.map((ltr, idx) => `
                            <div class="w-8 h-12 md:w-12 md:h-14 rounded-xl border-b-4 ${ltr ? 'bg-purple-100 border-purple-400 text-purple-700' : 'bg-gray-100 border-gray-300 text-gray-800'} text-xl md:text-2xl font-black flex items-center justify-center shadow-sm" id="slot-${idx}">
                                ${ltr}
                            </div>
                        `).join('')}
                    </div>

                    <div id="bubble-container" class="flex flex-wrap justify-center gap-2 max-w-lg mx-auto">
                        ${shuffleArray(data.letters).map((ltr, i) => `
                            <button onclick="handlePhase2Click('${ltr}', this)" class="w-12 h-12 md:w-14 md:h-14 bg-white border-2 border-pink-300 text-pink-600 rounded-full text-xl md:text-2xl font-black shadow-md hover:bg-pink-50 hover:scale-110 transition-transform active:scale-90">
                                ${ltr}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
            highlightCurrentSlot();
        }

        function highlightCurrentSlot() {
            document.querySelectorAll('[id^="slot-"]').forEach(el => el.classList.remove('border-pink-500', 'bg-pink-50'));
            const activeSlot = document.getElementById(`slot-${currentSpellIndex}`);
            if (activeSlot) activeSlot.classList.add('border-pink-500', 'bg-pink-50');
        }

        window.handlePhase2Click = function (letter, btn) {
            initAudio();
            const data = gameData.phase2[subLevel];
            const targetLetter = data.word[currentSpellIndex];

            if (letter === targetLetter) {
                playCorrectSound();
                const slot = document.getElementById(`slot-${currentSpellIndex}`);
                slot.innerText = letter;
                slot.className = "w-8 h-12 md:w-12 md:h-14 rounded-xl border-b-4 bg-green-100 border-green-400 text-green-700 text-xl md:text-2xl font-black flex items-center justify-center shadow-sm animate-pop";
                btn.style.visibility = 'hidden';
                myCurrentScore += 5;
                updateUI();

                do { currentSpellIndex++; }
                while (currentSpellIndex < data.word.length && data.given[currentSpellIndex] !== "");

                if (currentSpellIndex >= data.word.length) {
                    myCurrentScore += 10;
                    setTimeout(() => {
                        if (subLevel === gameData.phase2.length - 1) playConfetti();
                        nextLevel();
                    }, 1000);
                } else {
                    highlightCurrentSlot();
                }
            } else {
                playWrongSound();
                btn.classList.add('animate-shake');
                setTimeout(() => btn.classList.remove('animate-shake'), 400);
            }
        }

        // Phase 3: Train
        let currentTrainBlocks = [];
        function renderPhase3(container) {
            const data = gameData.phase3[subLevel];
            currentTrainBlocks = [];

            container.innerHTML = `
                <div class="text-center animate-drop w-full">
                    <h2 class="text-2xl font-bold text-green-800 mb-2">Step 3: Sentence Train</h2>
                    <p class="text-gray-500 mb-4 font-bold">按顺序点击方块造句 (注意时态和副词位置！)</p>
                    
                    <div class="bg-green-50 rounded-2xl p-4 mb-6 border-2 border-green-200 flex flex-col items-center">
                        <div class="text-4xl mb-2">${data.emoji}</div>
                        <div class="font-mono bg-white px-3 py-1 rounded-lg border text-gray-700 font-bold text-sm md:text-base">${data.cue}</div>
                    </div>

                    <div class="bg-gray-100 rounded-2xl p-4 mb-6 min-h-[80px] flex flex-wrap gap-2 items-center justify-start border-4 border-dashed border-gray-300" id="train-area">
                        <span class="text-gray-400 font-bold w-full text-center" id="train-placeholder">Click words below to load train! 🚂</span>
                    </div>

                    <div class="flex flex-wrap justify-center gap-2" id="block-bank">
                        ${shuffleArray(data.blocks).map(b => `
                            <button onclick="handlePhase3Move('${b.id}', this)" id="btn-${b.id}"
                                class="bg-white border-b-4 border-blue-400 text-blue-700 text-base md:text-lg font-bold py-2 px-4 rounded-xl shadow-md active:translate-y-1 transition-transform">
                                ${b.text}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        window.handlePhase3Move = function (id, btnElement) {
            initAudio();
            const trainArea = document.getElementById('train-area');
            const placeholder = document.getElementById('train-placeholder');
            const data = gameData.phase3[subLevel];
            const text = data.blocks.find(b => b.id === id).text;
            const expectedId = data.targetIds[currentTrainBlocks.length];

            if (id === expectedId) {
                playCorrectSound();
                if (placeholder) placeholder.remove();
                btnElement.style.visibility = 'hidden';

                currentTrainBlocks.push(id);
                const blockHTML = `
                    <div class="bg-blue-500 border-b-4 border-blue-700 text-white text-base md:text-lg font-bold py-2 px-3 rounded-xl shadow-md animate-pop">
                        ${text}
                    </div>
                `;
                trainArea.insertAdjacentHTML('beforeend', blockHTML);
                myCurrentScore += 10;
                updateUI();

                if (currentTrainBlocks.length === data.targetIds.length) {
                    trainArea.classList.replace('border-gray-300', 'border-green-400');
                    trainArea.classList.replace('bg-gray-100', 'bg-green-100');
                    myCurrentScore += 20;
                    updateUI();
                    setTimeout(() => {
                        if (subLevel === gameData.phase3.length - 1) playConfetti();
                        nextLevel();
                    }, 1500);
                }
            } else {
                playWrongSound();
                btnElement.classList.add('animate-shake');
                setTimeout(() => btnElement.classList.remove('animate-shake'), 400);
            }
        }

        // Phase 4: Story Reading
        function renderPhase4(container) {
            const data = gameData.phase4[subLevel];
            container.innerHTML = `
                <div class="text-center animate-drop w-full max-w-lg mx-auto">
                    <h2 class="text-2xl font-bold text-teal-800 mb-2">Step 4: Story Time</h2>
                    <p class="text-gray-500 mb-6 font-bold">读故事，点击翻译按钮了解意思 (Page 15)</p>
                    
                    <div class="bg-teal-50 rounded-2xl p-6 md:p-8 mb-8 border-4 border-teal-200 shadow-sm relative text-left">
                        <div class="text-6xl mb-4 text-center">${data.emoji}</div>
                        <p class="text-xl md:text-2xl font-bold text-gray-800 leading-relaxed mb-4">${data.en}</p>
                        
                        <div id="zh-translation" class="hidden">
                            <hr class="border-teal-200 my-4">
                            <p class="text-lg text-teal-700 font-bold">${data.zh}</p>
                        </div>
                    </div>

                    <div class="flex gap-4 justify-center">
                        <button onclick="document.getElementById('zh-translation').classList.remove('hidden'); playCorrect1();" class="flex-1 bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold py-3 px-4 rounded-xl shadow-sm active:scale-95 transition-all">
                            🪄 Translate (翻译)
                        </button>
                        <button onclick="handlePhase4Next()" class="flex-1 bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-4 rounded-xl shadow-sm active:scale-95 transition-all">
                            Next (继续) ➡️
                        </button>
                    </div>
                </div>
            `;
        }

        window.handlePhase4Next = function () {
            initAudio(); playCorrectSound();
            myCurrentScore += 5;
            nextLevel();
        }

        // Phase 5: Quiz
        function renderPhase5(container) {
            const data = gameData.phase5[subLevel];
            container.innerHTML = `
                <div class="text-center animate-drop w-full">
                    <h2 class="text-2xl font-bold text-cyan-800 mb-2">Step 5: Story Quiz</h2>
                    <p class="text-gray-500 mb-6 font-bold">根据刚才的故事回答问题 (Page 15)</p>
                    
                    <div class="bg-cyan-50 rounded-2xl p-4 md:p-6 mb-8 border-4 border-cyan-200 text-left">
                        <h3 class="text-lg md:text-xl font-black text-gray-800 mb-2">${data.qEn}</h3>
                        <p class="text-sm md:text-md text-cyan-700 font-bold">${data.qZh}</p>
                    </div>

                    <div class="flex flex-col gap-3 max-w-md mx-auto">
                        ${data.options.map((opt) => `
                            <button onclick="handlePhase5Click(${opt.isCorrect}, this)" 
                                class="flex items-center text-left bg-white border-2 border-gray-200 hover:border-cyan-400 hover:bg-cyan-50 p-3 md:p-4 rounded-2xl shadow-sm transition-all transform hover:translate-x-2 active:scale-95">
                                <span class="block text-base md:text-lg font-bold text-gray-700">${opt.text}</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        window.handlePhase5Click = function (isCorrect, btn) {
            initAudio();
            if (isCorrect) {
                playCorrectSound();
                myCurrentScore += 15;
                btn.classList.replace('border-gray-200', 'border-green-500');
                btn.classList.replace('hover:border-cyan-400', 'border-green-500');
                btn.classList.add('bg-green-100');

                setTimeout(() => {
                    if (subLevel === gameData.phase5.length - 1) playConfetti();
                    nextLevel();
                }, 800);
            } else {
                playWrongSound();
                btn.classList.add('animate-shake');
                setTimeout(() => btn.classList.remove('animate-shake'), 400);
            }
        }

        // Phase 6: Essay
        let chosenPath = -1;
        let isTranslationVisible = false;

        window.toggleTranslation = function () {
            isTranslationVisible = !isTranslationVisible;
            const zhElements = document.querySelectorAll('.zh-text');
            zhElements.forEach(el => {
                if (isTranslationVisible) {
                    el.classList.remove('hidden');
                    el.classList.add('inline-block');
                } else {
                    el.classList.add('hidden');
                    el.classList.remove('inline-block');
                }
            });
        }

        function renderPhase6(container) {
            // Safety fallback: if somehow trying to render beyond phase length, go to step 7
            if (subLevel >= gameData.phase6.length) {
                goToPhase(7);
                return;
            }

            const question = gameData.phase6[subLevel];

            // 不再過濾選項，給出所有選項來考驗學生。
            // 為了增加趣味性，將第 2~5 題的選項打亂順序，防止他們死記位置。
            let availableOptions = [...question.options];
            if (subLevel > 0 && availableOptions.length > 1) {
                availableOptions = shuffleArray(availableOptions);
            }

            container.innerHTML = `
                <div class="text-center animate-drop w-full">
                    <h2 class="text-2xl font-bold text-orange-600 mb-2">Step 6: My Dream Job Story</h2>
                    <p class="text-gray-500 mb-6 font-bold">回答问题，自动生成完整作文</p>
                    
                    <div class="bg-orange-50 rounded-2xl p-4 md:p-6 mb-8 border-4 border-orange-200">
                        <h3 class="text-lg md:text-xl font-black text-gray-800 mb-2">${question.qEn}</h3>
                        <p class="text-sm md:text-md text-orange-600 font-bold">${question.qZh}</p>
                    </div>

                    <div class="flex flex-col gap-3 max-w-md mx-auto">
                        ${availableOptions.map((opt) => `
                            <button onclick="handlePhase6Select('${opt.text.replace(/'/g, "\\'")}', '${opt.zhText}', ${opt.requires !== undefined ? opt.requires : 'undefined'}, this)" 
                                class="flex items-center text-left bg-white border-2 border-gray-200 hover:border-orange-400 hover:bg-orange-50 p-3 md:p-4 rounded-2xl shadow-sm transition-all transform hover:translate-x-2 active:scale-95">
                                <span class="text-3xl md:text-4xl mr-4">${opt.emoji}</span>
                                <div>
                                    <span class="block text-base md:text-lg font-bold text-gray-700">${opt.text}</span>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        window.handlePhase6Select = function (text, zhText, pathIdx, btnElement) {
            initAudio();

            // 將字串的 'undefined' 轉回真正的 undefined
            if (pathIdx === 'undefined') pathIdx = undefined;

            // 邏輯判斷：第一題永遠正確 / 選擇與職業匹配 / 通用結尾問題
            const isCorrect = (subLevel === 0) || (pathIdx === chosenPath) || (pathIdx === undefined);

            if (isCorrect) {
                playCorrectSound();
                if (subLevel === 0) chosenPath = pathIdx; // 鎖定選擇的職業路徑

                essayAnswers[subLevel] = { text: text, zhText: zhText };
                essayAnswers.length = subLevel + 1;

                myCurrentScore += 20;

                // 視覺反饋：變綠
                btnElement.classList.replace('border-gray-200', 'border-green-500');
                btnElement.classList.replace('hover:border-orange-400', 'border-green-500');
                btnElement.classList.add('bg-green-100');

                // 延遲一點點時間再進入下一題，讓學生看到成功的視覺效果
                setTimeout(() => {
                    nextLevel();
                }, 450);
            } else {
                // 如果選錯了不符合職業邏輯的選項
                playWrongSound();
                btnElement.classList.add('animate-shake');
                setTimeout(() => btnElement.classList.remove('animate-shake'), 400);
            }
        }

        // Phase 7: Final Copy Essay
        function renderPhase7(container) {
            // Check if they skipped straight to tab 7 without finishing tab 6
            if (essayAnswers.length < gameData.phase6.length) {
                container.innerHTML = `
                    <div class="text-center animate-drop w-full py-10">
                        <div class="text-6xl mb-4">🚧</div>
                        <h2 class="text-2xl font-bold text-gray-500 mb-2">Essay Not Finished!</h2>
                        <p class="text-gray-400 font-bold mb-6">请先完成第六关 (Step 6)，才能生成你的专属作文哦！</p>
                        <button onclick="goToPhase(6)" class="bg-orange-100 hover:bg-orange-200 text-orange-700 font-bold py-3 px-8 rounded-full shadow-sm transition-all active:scale-95">
                            ⬅️ Go to Step 6 (去写作文)
                        </button>
                    </div>
                `;
                return;
            }

            // Play celebration sounds if arriving here normally
            playConfetti();
            playCorrect1(); setTimeout(playCorrect2, 300);

            container.innerHTML = `
                <div class="text-center animate-drop w-full">
                    <h2 class="text-3xl font-black text-yellow-600 mb-2">🏆 Final Essay Ready!</h2>
                    <p class="text-gray-600 font-bold mb-4">太棒了！现在把这段完整的作文抄进你的练习本吧 (Page 16)</p>
                    
                    <div class="mb-4">
                        <button onclick="toggleTranslation()" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold py-2 px-6 rounded-full shadow-sm active:scale-95 transition-all">
                            🌐 Show/Hide Chinese Meaning (显示/隐藏中文)
                        </button>
                    </div>

                    <div class="bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjI4Ij48bGluZSB4MT0iMCIgeTE9IjI3IiB4Mj0iMTAwJSIgeTI9IjI3IiBzdHJva2U9IiNlNWU3ZWIiIHN0cm9rZS13aWR0aD0iMSIvPjwvc3ZnPg==')] bg-white rounded-xl p-8 text-left border border-gray-200 shadow-xl mb-6 relative overflow-hidden" style="line-height: 28px;">
                        <div class="absolute top-0 right-0 p-4 text-6xl opacity-10">📝</div>
                        <h3 class="text-2xl font-black text-gray-800 mb-4 text-center">My Ambition</h3>
                        <div class="text-lg font-medium text-gray-800 indent-8">
                            ${essayAnswers.map(ans => `
                                <span class="en-text">${ans.text}</span>
                                <span class="zh-text ${isTranslationVisible ? 'inline-block' : 'hidden'} text-[13px] text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded mx-1 leading-tight">${ans.zhText}</span>
                            `).join(' ')}
                        </div>
                    </div>
                </div>
            `;
        }

        // Initialize App
        window.onload = async () => {
            goToPhase(1);

            // Pillar 4: State Management (Load progress on start)
            if (typeof ProgressTracker !== 'undefined') {
                const saved = await ProgressTracker.load();
                if (saved && saved.progress_data) {
                    const p = saved.progress_data;
                    // Restore progress: go to the saved step and sub-level
                    currentStep = p.step || 1;
                    subLevel = p.subLevel || 0;
                    myCurrentScore = p.score || 0;
                    goToPhase(currentStep);
                    console.log('Unit 2 progress loaded:', p);
                }
            }
        };

        // Pillar 4: Save progress whenever the phase changes
        const _originalGoToPhase = goToPhase;
        function goToPhase(phase) {
            _originalGoToPhase(phase);
            if (typeof ProgressTracker !== 'undefined') {
                ProgressTracker.save({
                    step: currentStep,
                    subLevel: subLevel,
                    score: myCurrentScore
                });
            }
        }

    </script>
