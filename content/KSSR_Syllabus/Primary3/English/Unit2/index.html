        // --- UTILITY & NAVIGATION ---
        function updateUI() {
            document.getElementById('ui-step').innerText = currentStep;
            document.getElementById('ui-sublevel').innerText = subLevel + 1;

            // Handle Step 7 which has no sub-levels
            if (currentStep === 7) {
                document.getElementById('ui-total').innerText = "1";
                document.getElementById('ui-sublevel').innerText = "1";
            } else {
                const total = gameData[`phase${currentStep}`].length;
                document.getElementById('ui-total').innerText = total;
            }

            document.getElementById('ui-score').innerText = myCurrentScore;

            // Update Tabs (now 1 to 7)
            for (let i = 1; i <= 7; i++) {
                const tab = document.getElementById(`tab-${i}`);
                if (tab) {
                    if (i === currentStep) {
                        tab.className = "whitespace-nowrap flex-shrink-0 snap-center py-3 px-5 rounded-2xl font-black text-sm md:text-base border-b-4 transition-all bg-blue-500 text-white border-blue-700 shadow-md";
                        // Auto-scroll the active tab into the center of the view smoothly
                        tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    } else {
                        tab.className = "whitespace-nowrap flex-shrink-0 snap-center py-3 px-5 rounded-2xl font-black text-sm md:text-base border-b-4 transition-all bg-gray-100 text-gray-400 border-gray-300 hover:bg-gray-200 cursor-pointer";
                    }
                }
            }
        }

        function playConfetti() {
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = ['#fde047', '#60a5fa', '#f472b6', '#4ade80'][Math.floor(Math.random() * 4)];
                conf.style.animationDuration = (Math.random() * 2 + 1) + 's';
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 3000);
            }
        }

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Global Navigation
        function goToPhase(phase) {
            initAudio(); // Initialize audio context on first user click anywhere
            currentStep = phase;
            subLevel = 0;
            if (phase === 6) essayAnswers = []; // Reset essay if jumping to phase 6
            renderCurrentPhase();
        }

        function nextLevel() {
            initAudio();
            if (currentStep === 7) return; // End of game
            const total = gameData[`phase${currentStep}`].length;
            if (subLevel < total - 1) {
                subLevel++;
                renderCurrentPhase();
            } else if (currentStep < 7) { // Can advance up to Phase 7
                goToPhase(currentStep + 1);
            }
        }

        function prevLevel() {
            initAudio();
            if (currentStep === 7) {
                goToPhase(6);
            } else if (subLevel > 0) {
                subLevel--;
                renderCurrentPhase();
            } else if (currentStep > 1) {
                currentStep--;
                subLevel = gameData[`phase${currentStep}`].length - 1;
                renderCurrentPhase();
            }
        }

        function renderCurrentPhase() {
            updateUI();
            const content = document.getElementById('game-content');
            content.innerHTML = ''; // Clear current

            if (currentStep === 1) renderPhase1(content);
            else if (currentStep === 2) renderPhase2(content);
            else if (currentStep === 3) renderPhase3(content);
            else if (currentStep === 4) renderPhase4(content);
            else if (currentStep === 5) renderPhase5(content);
            else if (currentStep === 6) renderPhase6(content);
            else if (currentStep === 7) renderPhase7(content);

            // Pillar 4: Save progress on every render
            if (typeof ProgressTracker !== 'undefined') {
                ProgressTracker.autoSave({ step: currentStep, subLevel: subLevel, score: myCurrentScore });
            }
        }

        // --- PHASE RENDERING LOGIC ---

            let shuffledOptions = shuffleArray(data.options);

                    <div class="bg-blue-50 rounded-3xl p-8 mb-8 inline-block border-4 border-blue-200 shadow-inner">

                                class="flex-1 bg-white border-4 border-gray-200 hover:border-blue-400 hover:bg-blue-50 text-2xl font-bold py-4 px-4 rounded-2xl shadow-sm transition-all transform active:scale-95 text-gray-700">

                </div>
            `;
        }

        window.handlePhase1Click = function (selected, correct, btn) {
            initAudio();
            if (selected === correct) {
                playCorrectSound();
                btn.classList.replace('border-gray-200', 'border-green-500');
                btn.classList.replace('hover:border-blue-400', 'border-green-500');
                btn.classList.replace('text-gray-700', 'text-green-600');
                btn.classList.add('bg-green-100');
                myCurrentScore += 10;

                setTimeout(() => {
                    if (subLevel === gameData.phase1.length - 1) playConfetti();
                    nextLevel();
                }, 800);
            } else {
                playWrongSound();
                btn.classList.add('animate-shake');
                setTimeout(() => btn.classList.remove('animate-shake'), 400);
            }
        }

        let currentSpellIndex = 0;

            const data = gameData.phase2[subLevel];
            currentSpellIndex = 0;
            while (currentSpellIndex < data.given.length && data.given[currentSpellIndex] !== "") {
                currentSpellIndex++;
            }

            container.innerHTML = `
                <div class="text-center animate-drop w-full">
                    <h2 class="text-2xl font-bold text-purple-800 mb-2">Step 2: Magic Spelling</h2>
                    <p class="text-gray-500 mb-4 font-bold">йҗҗз‘°еҡ®еЁүв„ғеңәй”ӣеІғЛүйҚҸг„Ҙеҙҹз’Ү?(Page 12)</p>
                    
                    <div class="bg-purple-50 rounded-2xl p-4 mb-6 border-2 border-purple-200 flex items-center justify-center gap-4 text-left">

                        <div>

                    </div>

                    <div id="spell-slots" class="flex flex-wrap justify-center gap-1 md:gap-2 mb-8">
                        ${data.given.map((ltr, idx) => `
                            <div class="w-8 h-12 md:w-12 md:h-14 rounded-xl border-b-4 ${ltr ? 'bg-purple-100 border-purple-400 text-purple-700' : 'bg-gray-100 border-gray-300 text-gray-800'} text-xl md:text-2xl font-black flex items-center justify-center shadow-sm" id="slot-${idx}">

                        ${shuffleArray(data.letters).map((ltr, i) => `

        function highlightCurrentSlot() {
            document.querySelectorAll('[id^="slot-"]').forEach(el => el.classList.remove('border-pink-500', 'bg-pink-50'));
            const activeSlot = document.getElementById(`slot-${currentSpellIndex}`);
            if (activeSlot) activeSlot.classList.add('border-pink-500', 'bg-pink-50');
        }

        window.handlePhase2Click = function (letter, btn) {
            initAudio();
            const data = gameData.phase2[subLevel];
            const targetLetter = data.word[currentSpellIndex];

            if (letter === targetLetter) {
                playCorrectSound();
                const slot = document.getElementById(`slot-${currentSpellIndex}`);

                slot.className = "w-8 h-12 md:w-12 md:h-14 rounded-xl border-b-4 bg-green-100 border-green-400 text-green-700 text-xl md:text-2xl font-black flex items-center justify-center shadow-sm animate-pop";
                btn.style.visibility = 'hidden';
                myCurrentScore += 5;
                updateUI();

                do { currentSpellIndex++; }
                while (currentSpellIndex < data.word.length && data.given[currentSpellIndex] !== "");

                if (currentSpellIndex >= data.word.length) {
                    myCurrentScore += 10;
                    setTimeout(() => {
                        if (subLevel === gameData.phase2.length - 1) playConfetti();
                        nextLevel();
                    }, 1000);
                } else {
                    highlightCurrentSlot();
                }
            } else {
                playWrongSound();
                btn.classList.add('animate-shake');
                setTimeout(() => btn.classList.remove('animate-shake'), 400);

        // Phase 3: Train
        let currentTrainBlocks = [];
        function renderPhase3(container) {
            const data = gameData.phase3[subLevel];

                    <div class="bg-green-50 rounded-2xl p-4 mb-6 border-2 border-green-200 flex flex-col items-center">
                        <div class="text-4xl mb-2">${data.emoji}</div>

                    <div class="bg-gray-100 rounded-2xl p-4 mb-6 min-h-[80px] flex flex-wrap gap-2 items-center justify-start border-4 border-dashed border-gray-300" id="train-area">

                        `).join('')}
                    </div>
                </div>
            `;
        }

        window.handlePhase3Move = function (id, btnElement) {
            initAudio();
            const trainArea = document.getElementById('train-area');
            const placeholder = document.getElementById('train-placeholder');
            const data = gameData.phase3[subLevel];
            const text = data.blocks.find(b => b.id === id).text;

                    trainArea.classList.replace('border-gray-300', 'border-green-400');
                    trainArea.classList.replace('bg-gray-100', 'bg-green-100');
                    myCurrentScore += 20;
                    updateUI();
                    setTimeout(() => {
                        if (subLevel === gameData.phase3.length - 1) playConfetti();
                        nextLevel();
                    }, 1500);
                }
            } else {
                playWrongSound();
                btnElement.classList.add('animate-shake');
                setTimeout(() => btnElement.classList.remove('animate-shake'), 400);

        // Phase 4: Story Reading
        function renderPhase4(container) {
            const data = gameData.phase4[subLevel];

                        <button onclick="handlePhase4Next()" class="flex-1 bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-4 rounded-xl shadow-sm active:scale-95 transition-all">

                        </button>

            `;
        }

        window.handlePhase4Next = function () {

        // Phase 5: Quiz
        function renderPhase5(container) {
            const data = gameData.phase5[subLevel];

        window.handlePhase5Click = function (isCorrect, btn) {

        function renderPhase6(container) {

            // ж¶“е¶…е•Җй–¬еәўзғӨй–¬жҗҒзҲЎй”ӣеІҖйғёйҚ‘зғҳеўҚйҸҲеӨҗдј•й—Ӣе‘¬з· й‘°еҶ®оҹҙзҖӣе“Ҙж•“йҠҶ?
            // йҗҗиҪ°з°Ўжҫ§зӮІе§һз“’пҪ…жҮ—йҺ¬СҚзҙқзҒҸеӣ©оғҮ 2~5 жӨӨеІҖж®‘й–¬жҗҒзҲЎйҺөж’Із°ңй—Ӣе——з°ӯй”ӣеІ„ж§»е§қоқӯзІ¬йҚҠжҲһо„ҙз‘·жЁ№з¶…зјғоҶәвӮ¬?

        window.handlePhase6Select = function (text, zhText, pathIdx, btnElement) {

            // зҒҸеӣ§з“§ж¶“иҢ¬ж®‘ 'undefined' жқһеӨҠжҙ–йҗӘзҶёо„ңйҗЁ?undefined
            if (pathIdx === 'undefined') pathIdx = undefined;

            // й–ӯеҝҡйӣҶйҚ’гӮҶжҹ—й”ӣж°ұоғҮж¶“вӮ¬жӨӨеұҫжЎҲй–¬зҠіо„ңзә°?/ й–¬е‘Ҡжҗ°й‘ёеӣӘдј”еҰӨо…һе°®й–°?/ й–«ж°ұж•Өз»Іж„¬зҶ¬йҚҹеҝӣо”‘
            const isCorrect = (subLevel === 0) || (pathIdx === chosenPath) || (pathIdx === undefined);

            if (isCorrect) {
                playCorrectSound();
                if (subLevel === 0) chosenPath = pathIdx; // й–№ж §з•ҫй–¬е‘Ҡжҗ°йҗЁеӢ®дј”еҰӨо…ЎзҹҫеҜ°?

                essayAnswers[subLevel] = { text: text, zhText: zhText };
                essayAnswers.length = subLevel + 1;

                myCurrentScore += 20;

                // з‘•ж ¬оһҶйҚҷе¶үоҡҗй”ӣж°із•©зјҚ?
                btnElement.classList.replace('border-gray-200', 'border-green-500');
                btnElement.classList.replace('hover:border-orange-400', 'border-green-500');
                btnElement.classList.add('bg-green-100');

                // еҜӨе •дјҲж¶“вӮ¬жҰӣзӮәзІёйҸ…еӮһжһ”йҚҗе¶үвӮ¬жҸ’еҸҶж¶“е¬©з«ҙжӨӨеІӢзҙқз’Ғж’іо„ұйҗўзҶәж№…йҚ’зүҲеһҡйҚ”зҶәж®‘з‘•ж ¬оһҶйҸҒе ҹзҒү
                setTimeout(() => {
                    nextLevel();
                }, 450);
            } else {
                // жҝЎеӮӣзҒүй–¬жҗҒе°ҹжөңе—•з¬үз»—п№ҖжӮҺй‘ұй”ӢгӮӯй–ӯеҝҡйӣҶйҗЁеӢҜдј•й—Ӣ?
                playWrongSound();
                btnElement.classList.add('animate-shake');
                setTimeout(() => btnElement.classList.remove('animate-shake'), 400);

        // Phase 7: Final Copy Essay
        function renderPhase7(container) {
            // Check if they skipped straight to tab 7 without finishing tab 6
            if (essayAnswers.length < gameData.phase6.length) {
                container.innerHTML = `
                    <div class="text-center animate-drop w-full py-10">
                        <div class="text-6xl mb-4">йҰғжҜҖ</div>
                        <h2 class="text-2xl font-bold text-gray-500 mb-2">Essay Not Finished!</h2>
                        <p class="text-gray-400 font-bold mb-6">з’Үеі°еҺӣзҖ№еұҫеһҡз»—о„ҖеҸҡйҚҸ?(Step 6)й”ӣеұҫеў й‘із•Ңж•“йҺҙж„Әз¶ҳйҗЁеӢӘз¬“зҒһзӮ°з¶”йҸӮеӣ§ж‘қй”ӣ?/p>
                        <button onclick="goToPhase(6)" class="bg-orange-100 hover:bg-orange-200 text-orange-700 font-bold py-3 px-8 rounded-full shadow-sm transition-all active:scale-95">
                            зҢ¬е’ғз¬Қ Go to Step 6 (йҚҳиҜІе•“жөЈж»„жһғ)
                        </button>
                    </div>
                `;
                return;
            }

            // Play celebration sounds if arriving here normally
            playConfetti();
            playCorrect1(); setTimeout(playCorrect2, 300);

            container.innerHTML = `
                <div class="text-center animate-drop w-full">
                    <h2 class="text-3xl font-black text-yellow-600 mb-2">йҰғејі Final Essay Ready!</h2>
                    <p class="text-gray-600 font-bold mb-4">жҫ¶оҒ…о——жөңе—ӯзҙ’йҗңжқҝж№ӘйҺ¶е©…з№–еЁҲйқӣз•¬йҸҒеҜёж®‘жөЈж»„жһғйҺ¶еӢ®з№ҳжөЈзҠөж®‘зјҒеҶ§зҜ„йҸҲо„ҖжғӮ (Page 16)</p>
                    
                    <div class="mb-4">
                        <button onclick="toggleTranslation()" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold py-2 px-6 rounded-full shadow-sm active:scale-95 transition-all">

                        <div class="text-lg font-medium text-gray-800 indent-8">

        // Initialize App
        window.addEventListener('load', function() {
            goToPhase(1);

                    subLevel = p.subLevel || 0;
                    myCurrentScore = p.score || 0;

    </script>
