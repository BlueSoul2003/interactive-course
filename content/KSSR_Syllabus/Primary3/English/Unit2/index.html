            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTimeOffset);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + startTimeOffset);
            osc.stop(audioCtx.currentTime + startTimeOffset + duration);
        }

        // --- UTILITY & NAVIGATION ---
        function updateUI() {
            document.getElementById('ui-step').innerText = currentStep;
            document.getElementById('ui-sublevel').innerText = subLevel + 1;

            // Handle Step 7 which has no sub-levels
            if (currentStep === 7) {
                document.getElementById('ui-total').innerText = "1";
                document.getElementById('ui-sublevel').innerText = "1";
            } else {
                const total = gameData[`phase${currentStep}`].length;
                document.getElementById('ui-total').innerText = total;
            }

            document.getElementById('ui-score').innerText = myCurrentScore;

            // Update Tabs (now 1 to 7)
            for (let i = 1; i <= 7; i++) {
                const tab = document.getElementById(`tab-${i}`);
                if (tab) {
                    if (i === currentStep) {
                        tab.className = "whitespace-nowrap flex-shrink-0 snap-center py-3 px-5 rounded-2xl font-black text-sm md:text-base border-b-4 transition-all bg-blue-500 text-white border-blue-700 shadow-md";
                        // Auto-scroll the active tab into the center of the view smoothly
                        tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    } else {
                        tab.className = "whitespace-nowrap flex-shrink-0 snap-center py-3 px-5 rounded-2xl font-black text-sm md:text-base border-b-4 transition-all bg-gray-100 text-gray-400 border-gray-300 hover:bg-gray-200 cursor-pointer";
                    }
                }
            }
        }

        function playConfetti() {
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = ['#fde047', '#60a5fa', '#f472b6', '#4ade80'][Math.floor(Math.random() * 4)];
                conf.style.animationDuration = (Math.random() * 2 + 1) + 's';
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 3000);
            }
        }

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Global Navigation
        function goToPhase(phase) {
            initAudio(); // Initialize audio context on first user click anywhere
            currentStep = phase;
            subLevel = 0;
            if (phase === 6) essayAnswers = []; // Reset essay if jumping to phase 6
            renderCurrentPhase();
        }

        function nextLevel() {
            initAudio();
            if (currentStep === 7) return; // End of game
            const total = gameData[`phase${currentStep}`].length;
            if (subLevel < total - 1) {
                subLevel++;
                renderCurrentPhase();
            } else if (currentStep < 7) { // Can advance up to Phase 7
                goToPhase(currentStep + 1);
            }
        }

        function prevLevel() {
            initAudio();
            if (currentStep === 7) {
                goToPhase(6);
            } else if (subLevel > 0) {
                subLevel--;
                renderCurrentPhase();
            } else if (currentStep > 1) {
                currentStep--;
                subLevel = gameData[`phase${currentStep}`].length - 1;
                renderCurrentPhase();
            }
        }

        function renderCurrentPhase() {
            updateUI();
            const content = document.getElementById('game-content');
            content.innerHTML = ''; // Clear current

            if (currentStep === 1) renderPhase1(content);
            else if (currentStep === 2) renderPhase2(content);
            else if (currentStep === 3) renderPhase3(content);
            else if (currentStep === 4) renderPhase4(content);
            else if (currentStep === 5) renderPhase5(content);
            else if (currentStep === 6) renderPhase6(content);
            else if (currentStep === 7) renderPhase7(content);

            // Pillar 4: Save progress on every render
            if (typeof ProgressTracker !== 'undefined') {
                ProgressTracker.autoSave({ step: currentStep, subLevel: subLevel, score: myCurrentScore });
            }
        }

                                <span class="block text-base md:text-lg font-bold text-gray-700">${opt.text}</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        window.handlePhase5Click = function (isCorrect, btn) {
            initAudio();
            if (isCorrect) {
                playCorrectSound();
                myCurrentScore += 15;
                btn.classList.replace('border-gray-200', 'border-green-500');
                btn.classList.replace('hover:border-cyan-400', 'border-green-500');
                btn.classList.add('bg-green-100');

                setTimeout(() => {
                    if (subLevel === gameData.phase5.length - 1) playConfetti();
                    nextLevel();
                }, 800);
            } else {
                playWrongSound();
                btn.classList.add('animate-shake');
                setTimeout(() => btn.classList.remove('animate-shake'), 400);
            }
        }

        // Phase 6: Essay
        let chosenPath = -1;
        let isTranslationVisible = false;

        window.toggleTranslation = function () {
            isTranslationVisible = !isTranslationVisible;
            const zhElements = document.querySelectorAll('.zh-text');
            zhElements.forEach(el => {
                if (isTranslationVisible) {
                    el.classList.remove('hidden');
                    el.classList.add('inline-block');
                } else {
                    el.classList.add('hidden');
                    el.classList.remove('inline-block');
                }
            });
        }

        function renderPhase6(container) {
            // Safety fallback: if somehow trying to render beyond phase length, go to step 7
            if (subLevel >= gameData.phase6.length) {
                goToPhase(7);
                return;
            }

            const question = gameData.phase6[subLevel];

            // 涓嶅啀閬庢烤閬搁爡锛岀郸鍑烘墍鏈夐伕闋呬締鑰冮瀛哥敓銆?
            // 鐐轰簡澧炲姞瓒ｅ懗鎬э紝灏囩 2~5 椤岀殑閬搁爡鎵撲簜闋嗗簭锛岄槻姝粬鍊戞瑷樹綅缃€?
            let availableOptions = [...question.options];
            if (subLevel > 0 && availableOptions.length > 1) {
                availableOptions = shuffleArray(availableOptions);
            }

            container.innerHTML = `
                <div class="text-center animate-drop w-full">
                    <h2 class="text-2xl font-bold text-orange-600 mb-2">Step 6: My Dream Job Story</h2>
                    <p class="text-gray-500 mb-6 font-bold">鍥炵瓟闂锛岃嚜鍔ㄧ敓鎴愬畬鏁翠綔鏂?/p>
                    
                    <div class="bg-orange-50 rounded-2xl p-4 md:p-6 mb-8 border-4 border-orange-200">
                        <h3 class="text-lg md:text-xl font-black text-gray-800 mb-2">${question.qEn}</h3>
                        <p class="text-sm md:text-md text-orange-600 font-bold">${question.qZh}</p>
                    </div>

                    <div class="flex flex-col gap-3 max-w-md mx-auto">
                        ${availableOptions.map((opt) => `
                            <button onclick="handlePhase6Select('${opt.text.replace(/'/g, "\\'")}', '${opt.zhText}', ${opt.requires !== undefined ? opt.requires : 'undefined'}, this)" 
                                class="flex items-center text-left bg-white border-2 border-gray-200 hover:border-orange-400 hover:bg-orange-50 p-3 md:p-4 rounded-2xl shadow-sm transition-all transform hover:translate-x-2 active:scale-95">
                                <span class="text-3xl md:text-4xl mr-4">${opt.emoji}</span>
                                <div>
                                    <span class="block text-base md:text-lg font-bold text-gray-700">${opt.text}</span>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        window.handlePhase6Select = function (text, zhText, pathIdx, btnElement) {
            initAudio();

            // 灏囧瓧涓茬殑 'undefined' 杞夊洖鐪熸鐨?undefined
            if (pathIdx === 'undefined') pathIdx = undefined;

            // 閭忚集鍒ゆ柗锛氱涓€椤屾案閬犳纰?/ 閬告搰鑸囪伔妤尮閰?/ 閫氱敤绲愬熬鍟忛
            const isCorrect = (subLevel === 0) || (pathIdx === chosenPath) || (pathIdx === undefined);

            if (isCorrect) {
                playCorrectSound();
                if (subLevel === 0) chosenPath = pathIdx; // 閹栧畾閬告搰鐨勮伔妤矾寰?

                essayAnswers[subLevel] = { text: text, zhText: zhText };
                essayAnswers.length = subLevel + 1;

                myCurrentScore += 20;

                // 瑕栬鍙嶉锛氳畩缍?
                btnElement.classList.replace('border-gray-200', 'border-green-500');
                btnElement.classList.replace('hover:border-orange-400', 'border-green-500');
                btnElement.classList.add('bg-green-100');

                // 寤堕伈涓€榛為粸鏅傞枔鍐嶉€插叆涓嬩竴椤岋紝璁撳鐢熺湅鍒版垚鍔熺殑瑕栬鏁堟灉
                setTimeout(() => {
                    nextLevel();
                }, 450);
            } else {
                // 濡傛灉閬搁尟浜嗕笉绗﹀悎鑱锋キ閭忚集鐨勯伕闋?
                playWrongSound();
                btnElement.classList.add('animate-shake');
                setTimeout(() => btnElement.classList.remove('animate-shake'), 400);
            }
        }

        // Phase 7: Final Copy Essay
        function renderPhase7(container) {
            // Check if they skipped straight to tab 7 without finishing tab 6
            if (essayAnswers.length < gameData.phase6.length) {
                container.innerHTML = `
                    <div class="text-center animate-drop w-full py-10">
                        <div class="text-6xl mb-4">馃毀</div>
                        <h2 class="text-2xl font-bold text-gray-500 mb-2">Essay Not Finished!</h2>
                        <p class="text-gray-400 font-bold mb-6">璇峰厛瀹屾垚绗叚鍏?(Step 6)锛屾墠鑳界敓鎴愪綘鐨勪笓灞炰綔鏂囧摝锛?/p>
                        <button onclick="goToPhase(6)" class="bg-orange-100 hover:bg-orange-200 text-orange-700 font-bold py-3 px-8 rounded-full shadow-sm transition-all active:scale-95">
                            猬咃笍 Go to Step 6 (鍘诲啓浣滄枃)
                        </button>
                    </div>
                `;
                return;
            }

            // Play celebration sounds if arriving here normally
            playConfetti();
            playCorrect1(); setTimeout(playCorrect2, 300);

            container.innerHTML = `
                <div class="text-center animate-drop w-full">
                    <h2 class="text-3xl font-black text-yellow-600 mb-2">馃弳 Final Essay Ready!</h2>
                    <p class="text-gray-600 font-bold mb-4">澶浜嗭紒鐜板湪鎶婅繖娈靛畬鏁寸殑浣滄枃鎶勮繘浣犵殑缁冧範鏈惂 (Page 16)</p>
                    
                    <div class="mb-4">
                        <button onclick="toggleTranslation()" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold py-2 px-6 rounded-full shadow-sm active:scale-95 transition-all">
                            馃寪 Show/Hide Chinese Meaning (鏄剧ず/闅愯棌涓枃)
                        </button>
                    </div>

                    <div class="bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjI4Ij48bGluZSB4MT0iMCIgeTE9IjI3IiB4Mj0iMTAwJSIgeTI9IjI3IiBzdHJva2U9IiNlNWU3ZWIiIHN0cm9rZS13aWR0aD0iMSIvPjwvc3ZnPg==')] bg-white rounded-xl p-8 text-left border border-gray-200 shadow-xl mb-6 relative overflow-hidden" style="line-height: 28px;">
                        <div class="absolute top-0 right-0 p-4 text-6xl opacity-10">馃摑</div>
                        <h3 class="text-2xl font-black text-gray-800 mb-4 text-center">My Ambition</h3>
                        <div class="text-lg font-medium text-gray-800 indent-8">
                            ${essayAnswers.map(ans => `
                                <span class="en-text">${ans.text}</span>
                                <span class="zh-text ${isTranslationVisible ? 'inline-block' : 'hidden'} text-[13px] text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded mx-1 leading-tight">${ans.zhText}</span>
                            `).join(' ')}
                        </div>
                    </div>
                </div>
            `;
        }

        // Initialize App
        window.addEventListener('load', function() {
            goToPhase(1);
            // Pillar 4: State Management (Load saved progress on start)
            if (typeof ProgressTracker !== 'undefined') {
                ProgressTracker.init(async function(tracker) {
                    const saved = await tracker.load();
                    if (saved) {

                    const p = saved;
                    currentStep = p.step || 1;
                    subLevel = p.subLevel || 0;
                    myCurrentScore = p.score || 0;
                    renderCurrentPhase();
                    console.log('Unit 2 progress loaded:', p);
                    }
                });
            }
        });

    </script>
