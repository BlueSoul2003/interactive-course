<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPM BM Kesalahan Ejaan Dashboard</title>
    <!-- React & Tailwind via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="../../../../../js/progress-tracker.js" 
            data-module-id="SPM_BM_Kesalahan_Ejaan"
            data-module-name="SPM BM Kesalahan Ejaan"
            data-module-url="content/SPM_Syllabus/Form5/BM/Kesalahan_Ejaan/index.html"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .perspective-1000 { perspective: 1000px; }
        .animate-bounce-in { animation: bounce-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes bounce-in { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1.03); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .home-btn-fixed {
            position: fixed; bottom: 24px; left: 24px; z-index: 99999;
            background: linear-gradient(135deg, #1e3a8a, #764ba2);
            color: #fff; border: none; padding: 11px 20px; border-radius: 50px;
            font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.45);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root" class="min-h-screen flex items-center justify-center">
        <div class="text-slate-400 font-bold animate-pulse text-xl">Memuatkan 특訓 System...</div>
    </div>

    <a href="../../../../../index.html" class="home-btn-fixed">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="3"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
    </a>

    <script type="text/babel">
        const { useState, useEffect, useMemo, Fragment } = React;
        
        // --- Shared Icon Component ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                Bug: <path d="m8 2 1.88 1.88M14.12 3.88 16 2M9 7.13v-1M15 7.13v-1M12 11v1M12 17v1M6.53 10.64a2 2 0 0 1 1 3.5 2.11 2.11 0 0 1-1 3.5M17.47 10.64a2 2 0 0 0-1-3.5 2.11 2.11 0 0 0 1 3.5M20 9.2a2 2 0 0 0-1.8-1.5 5 5 0 0 0-12.4 0e 2 2 0 0 0-1.8 1.5 5.06 5.06 0 0 0 1.5 5.7 6.3 6.3 0 0 0 1.5 9.1M10 22h4" />,
                Zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />,
                Target: <Fragment><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></Fragment>,
                X: <path d="M18 6 6 18M6 6l12 12" />,
                CheckCircle2: <Fragment><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></Fragment>,
                BrainCircuit: <Fragment><path d="M12 4.5V2M15 7.5h2.5M12 19.5V22M6.5 7.5H4M15 16.5h2.5M6.5 16.5H4M16 12h2M8 12h-2M15 12H9m3 3V9" /><circle cx="12" cy="12" r="3" /></Fragment>
            };
            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="2" />}
                </svg>
            );
        };

        const allSwipeData = [
            { id: 's1', word: 'gambarajah', isCorrect: false, correction: 'gambar rajah', meaning: 'Diagram/Rajah' },
            { id: 's2', word: 'atur cara', isCorrect: true, correction: '', meaning: 'Program' },
            { id: 's3', word: 'keretapi', isCorrect: false, correction: 'kereta api', meaning: 'Train' },
            { id: 's4', word: 'lebuh raya', isCorrect: true, correction: '', meaning: 'Highway' },
            { id: 's5', word: 'tengahari', isCorrect: false, correction: 'tengah hari', meaning: 'Noon' },
            { id: 's6', word: 'tanggungjawab', isCorrect: true, correction: '', meaning: 'Responsibility' }
        ];

        const allEjaanData = [
            { id: 'e1', wrong: 'walaubagaimanapun', right: 'walau bagaimanapun', meaning: 'However' },
            { id: 'e2', wrong: 'diantara', right: 'di antara', meaning: 'Between' },
            { id: 'e3', wrong: 'samada', right: 'sama ada', meaning: 'Whether' }
        ];

        function BugHunterApp() {
            const [score, setScore] = useState(0);
            const [currentMode, setCurrentMode] = useState('dashboard');
            const [masteredIds, setMasteredIds] = useState([]);
            
            // Mode States
            const [swipeIndex, setSwipeIndex] = useState(0);
            const [feedback, setFeedback] = useState(null);

            // Load Progress
            useEffect(() => {
                if (typeof ProgressTracker !== 'undefined') {
                    ProgressTracker.load().then(saved => {
                        if (saved && saved.progress_data) {
                            setScore(saved.progress_data.score || 0);
                            setMasteredIds(saved.progress_data.masteredIds || []);
                        }
                    });
                }
            }, []);

            // Save Progress
            useEffect(() => {
                if (typeof ProgressTracker !== 'undefined' && (score > 0 || masteredIds.length > 0)) {
                    ProgressTracker.save({ score, masteredIds });
                }
            }, [score, masteredIds]);

            const handleSwipe = (isBetul) => {
                if (feedback) return;
                const item = allSwipeData[swipeIndex];
                const correct = isBetul === item.isCorrect;
                
                if (correct) {
                    setScore(s => s + 10);
                    setFeedback({ type: 'success', text: 'TEPAT!' });
                    if (!masteredIds.includes(item.id)) setMasteredIds([...masteredIds, item.id]);
                } else {
                    setFeedback({ type: 'error', text: `SALAH! Seharusnya: ${item.correction || 'BETUL'}` });
                }

                setTimeout(() => {
                    setFeedback(null);
                    setSwipeIndex((swipeIndex + 1) % allSwipeData.length);
                }, 1500);
            };

            const renderDashboard = () => (
                <div className="max-w-4xl mx-auto py-12 px-6 animate-bounce-in">
                    <div className="bg-white rounded-[2.5rem] shadow-2xl p-10 mb-8 border border-slate-100 text-center">
                        <Icon name="BrainCircuit" className="w-16 h-16 mx-auto mb-6 text-blue-600" />
                        <h1 className="text-4xl font-black text-slate-800 mb-2">SPM Sistem 특訓</h1>
                        <p className="text-slate-500 mb-10">Pilih modul untuk memulakan latihan interaktif.</p>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                            <div onClick={() => setCurrentMode('swipe')} className="p-8 border-4 border-slate-50 rounded-3xl hover:border-blue-400 transition-all cursor-pointer group bg-slate-50">
                                <Icon name="Zap" className="text-blue-600 mb-4 group-hover:scale-125 transition-transform" />
                                <h3 className="text-2xl font-black mb-2">Swipe 특訓</h3>
                                <p className="text-slate-500">Tentukan ejaan betul/salah secara pantas.</p>
                            </div>
                            <div className="p-8 border-4 border-slate-50 rounded-3xl opacity-50 bg-slate-50 cursor-not-allowed">
                                <Icon name="Target" className="text-slate-400 mb-4" />
                                <h3 className="text-2xl font-black mb-2">Arena Boss</h3>
                                <p className="text-slate-500">Akan datang: Debug teks penuh.</p>
                            </div>
                        </div>

                        <div className="mt-12 bg-blue-600 text-white p-6 rounded-3xl flex justify-between items-center shadow-lg shadow-blue-200">
                             <div className="text-left">
                                <p className="font-bold opacity-80 uppercase text-xs tracking-widest">Markah Terkumpul</p>
                                <p className="text-4xl font-black">{score}</p>
                             </div>
                             <div className="text-right">
                                <p className="font-bold opacity-80 uppercase text-xs tracking-widest">Mastered</p>
                                <p className="text-4xl font-black">{masteredIds.length}</p>
                             </div>
                        </div>
                    </div>
                </div>
            );

            const renderSwipe = () => {
                const item = allSwipeData[swipeIndex];
                return (
                    <div className="max-w-md mx-auto mt-12 px-6 text-center animate-bounce-in">
                        <div className="bg-white rounded-[3rem] shadow-2xl p-12 mb-10 border-4 border-white relative overflow-hidden">
                            <span className="text-xs font-black uppercase tracking-widest text-blue-500 mb-4 block">EJAAN INI...</span>
                            <h2 className="text-5xl font-black text-slate-800 mb-6">{item.word}</h2>
                            <p className="text-slate-400 italic">Maksud: {item.meaning}</p>
                            
                            {feedback && (
                                <div className={`absolute inset-0 flex items-center justify-center text-4xl font-black ${feedback.type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'} animate-bounce-in`}>
                                    {feedback.text}
                                </div>
                            )}
                        </div>

                        <div className="flex justify-center gap-8">
                            <button onClick={() => handleSwipe(false)} className="w-24 h-24 bg-white rounded-full flex items-center justify-center text-red-500 shadow-xl hover:bg-red-500 hover:text-white transition-all"><Icon name="X" /></button>
                            <button onClick={() => handleSwipe(true)} className="w-24 h-24 bg-white rounded-full flex items-center justify-center text-green-500 shadow-xl hover:bg-green-500 hover:text-white transition-all"><Icon name="CheckCircle2" /></button>
                        </div>
                        
                        <button onClick={() => setCurrentMode('dashboard')} className="mt-12 text-slate-400 font-bold hover:text-slate-800 underline">KEMBALI KE PANEL</button>
                    </div>
                );
            };

            return (
                <div className="min-h-screen py-10">
                    {currentMode === 'dashboard' ? renderDashboard() : renderSwipe()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BugHunterApp />);
    </script>
</body>
</html>
