            toast.innerHTML = isSuccess

            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';

                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);

                            <h2 class="text-xl font-bold text-slate-800 border-l-4 border-cyan-500 pl-3 mb-6 print-text-black print-border-black flex items-center"><i class="ph-fill ph-book-open-text mr-2 text-cyan-500"></i> 全马 SPM 小说万能答案 (Novel Zon 1-4)</h2>
                            
                            ${mod3Novels.map(novel => `
                                <div class="mb-10">
                                    <h3 class="text-sm font-bold text-slate-700 bg-slate-100 inline-block px-3 py-1.5 rounded-lg mb-4 print-text-black print-bg-transparent border print-border-black"><i class="ph-bold ph-book mr-1"></i> ${novel.title}</h3>
                                    <div class="space-y-3">
                                        ${novel.data.map((item, idx) => `
                                            <div class="border border-slate-200 p-4 rounded-xl print-border-black bg-white">
                                                <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-3 border-b border-slate-100 pb-2 print-border-black">
                                                    <p class="font-black text-base text-cyan-700 print-text-black">${item.nilai} <span class="text-xs font-semibold text-slate-400 ml-2">(${item.nilaiEn} | ${item.nilaiZh})</span></p>
                                                    <p class="text-sm font-bold text-slate-600 print-text-black mt-1 sm:mt-0"><span class="bg-slate-100 px-2 py-0.5 rounded text-xs mr-1">Watak:</span> ${item.watak}</p>
                                                </div>
                                                <p class="text-slate-700 font-medium text-sm print-text-black leading-relaxed">${item.huraian}</p>
                                                <div class="mt-2 text-xs text-slate-500 print-text-black space-y-0.5">
                                                    <p><span class="font-bold text-slate-400">EN:</span> ${item.huraianEn}</p>
                                                    <p><span class="font-bold text-slate-400">ZH:</span> ${item.huraianZh}</p>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
            }

            html += `</div>`; // Close pt-20 spacer
            app.innerHTML = html;
        }

        // Init
        render();

        window.addEventListener('load', async () => {
            if (typeof ProgressTracker !== 'undefined') {
                const saved = await ProgressTracker.load();
                if (saved && saved.progress_data) {
                    const p = saved.progress_data;
                    if (p.score !== undefined) state.score = p.score;
                    if (p.m1Level !== undefined) state.m1Level = p.m1Level;
                    if (p.m1Progress) state.m1Progress = p.m1Progress;
                    if (p.bossLevel !== undefined) state.bossLevel = p.bossLevel;
                    if (p.bossProgress) state.bossProgress = p.bossProgress;
                    render();
                }
            }
        });

        const originalShowToast = showToast;
        showToast = function (msg, isSuccess = true) {
            originalShowToast(msg, isSuccess);
            if (isSuccess && typeof ProgressTracker !== 'undefined') {
                ProgressTracker.save({
                    score: state.score,
                    m1Level: state.m1Level,
                    m1Progress: state.m1Progress,
                    bossLevel: state.bossLevel,
                    bossProgress: state.bossProgress
                });
            }
        };

        const originalClearData = window.clearData;
        window.clearData = function () {
            originalClearData();
            if (typeof ProgressTracker !== 'undefined') {
                ProgressTracker.save({
                    score: 0,
                    m1Level: 0,
                    m1Progress: {},
                    m2Type: null,
                    m2SelectedIsi: [],
                    bossLevel: 0,
                    bossProgress: {}
                });
            }
        };
    </script>
    <script src="../../../../../js/progress-tracker.js" data-module-id="spm-f5-bm-reading"
        data-module-name="SPM Reading Hacker"
        data-module-url="content/SPM_Syllabus/Form5/BM/Reading_Comprehension/index.html">
        </script>
</body>
