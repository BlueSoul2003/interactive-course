<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon: Fraction Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #2d3436;
            color: white;
            user-select: none;
        }

        /* Custom UI Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #2d3436;
        }

        ::-webkit-scrollbar-thumb {
            background: #74b9ff;
            border-radius: 5px;
        }

        /* Fraction CSS Styling */
        .math-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.6rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            margin: 0 8px;
        }

        .frac-block {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
            margin: 0 6px;
        }

        .frac-num {
            border-bottom: 3px solid white;
            padding: 0 6px;
            line-height: 1.2;
        }

        .frac-den {
            padding: 0 6px;
            line-height: 1.2;
        }

        .mixed-whole {
            margin-right: 4px;
            font-size: 1.4rem;
        }

        /* Inputs */
        .q-input {
            background: rgba(255, 255, 255, 0.1);
            color: #ffeaa7;
            text-align: center;
            border: 2px dashed #74b9ff;
            font-family: 'Press Start 2P';
            font-size: 1.2rem;
            outline: none;
        }

        .q-input:focus {
            border: 2px solid #ffeaa7;
            background: rgba(255, 255, 255, 0.2);
        }

        .q-input.correct {
            border: 3px solid #55efc4 !important;
            color: #55efc4 !important;
            background: rgba(85, 239, 196, 0.1) !important;
            pointer-events: none;
        }

        .q-input.wrong {
            border: 3px solid #ff7675 !important;
            animation: shake 0.3s;
        }

        /* Sizes for inputs */
        .w-in {
            width: 65px;
            height: 45px;
            margin-right: 8px;
        }

        .n-in {
            width: 60px;
            height: 40px;
            border-bottom: 3px solid white !important;
        }

        .d-in {
            width: 60px;
            height: 40px;
        }

        .i-in {
            width: 90px;
            height: 45px;
            margin: 0 8px;
        }

        /* Animations */
        @keyframes movQ { 0%, 50% { transform: translate(0,0); opacity:1; } 100% { transform: translate(110px, 30px); opacity:0; } }
        @keyframes movR { 0%, 50% { transform: translate(0,0); opacity:1; } 100% { transform: translate(150px, -15px); opacity:0; } }
        @keyframes movD { 0%, 50% { transform: translate(0,0); opacity:1; } 100% { transform: translate(150px, 35px); opacity:0; } }
        @keyframes fadeAns { 0%, 80% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 20px rgba(255,255,0,0.8); } }
        
        .anim-mov-q { animation: movQ 3.5s infinite; }
        .anim-mov-r { animation: movR 3.5s infinite; }
        .anim-mov-d { animation: movD 3.5s infinite; }
        .anim-fade-ans { animation: fadeAns 3.5s infinite; border-radius: 8px; }

        @keyframes strikeAnim { 0% { width: 0; } 100% { width: 100%; } }
        @keyframes popAnim { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .anim-strike { position: relative; display: inline-block; }
        .anim-strike::after { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 4px; background-color: red; animation: strikeAnim 0.5s ease forwards; animation-delay: 1s; }
        .anim-pop { animation: popAnim 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; animation-delay: 1.5s; display: inline-block; }
        .anim-pop-text { animation: popAnim 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; animation-delay: 0.5s; display: inline-block; color: #ff9f43; margin: 0 10px; font-weight: bold; }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            50% {
                transform: translateX(5px);
            }

            75% {
                transform: translateX(-5px);
            }
        }

        @keyframes slash {
            0% {
                transform: scale(1) rotate(0deg);
                filter: brightness(1);
            }

            50% {
                transform: scale(0.9) rotate(-5deg) translateX(-10px);
                filter: brightness(2) drop-shadow(0 0 10px red);
            }

            100% {
                transform: scale(1) rotate(0deg);
                filter: brightness(1);
            }
        }

        .slash-anim {
            animation: slash 0.3s ease-in-out;
        }

        /* Map Paths */
        .fraction-vis-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .frac-shape {
            display: flex;
            border: 2px solid white;
            background: rgba(255, 255, 255, 0.1);
        }

        .frac-rect {
            width: 80px;
            height: 30px;
        }

        .frac-rect-part {
            flex: 1;
            border-right: 1px solid rgba(255, 255, 255, 0.5);
            height: 100%;
        }

        .frac-rect-part:last-child {
            border-right: none;
        }

        .frac-rect-part.filled {
            background-color: #55efc4;
        }

        .frac-circ {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid white;
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .frac-circ.whole {
            background-color: #55efc4;
        }

        .frac-circ svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .frac-slice {
            fill: transparent;
            stroke: #55efc4;
            stroke-width: 25;
            /* Half the radius */
        }

        .frac-line {
            stroke: rgba(255, 255, 255, 0.5);
            stroke-width: 1;
        }

        /* Number Line Vis */
        .number-line-container {
            width: 100%;
            max-width: 800px;
            margin: 40px auto;
            position: relative;
        }

        .nline-svg {
            width: 100%;
            height: 30px;
            overflow: visible;
        }

        .nline-axis {
            stroke: rgba(255, 255, 255, 0.8);
            stroke-width: 3;
        }

        .nline-tick-major {
            stroke: rgba(255, 255, 255, 0.8);
            stroke-width: 3;
        }

        .nline-tick-minor {
            stroke: rgba(255, 255, 255, 0.4);
            stroke-width: 2;
        }

        .nline-labels {
            position: relative;
            width: 100%;
            height: 60px;
            /* Space for fractions/inputs */
            margin-top: 10px;
        }

        .nline-label {
            position: absolute;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Tweak input sizes specifically for number lines so they fit */
        .nline-label .q-input {
            margin: 0 !important;
        }

        .nline-label .w-in,
        .nline-label .i-in {
            width: 50px;
            height: 35px;
        }

        .nline-label .frac-block {
            margin: 0;
        }

        .nline-label .n-in,
        .nline-label .d-in {
            width: 40px;
            height: 30px;
        }

        .map-node {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid white;
            background: #e74c3c;
            transition: all 0.2s;
            position: absolute;
            z-index: 10;
            transform: translate(-50%, -50%);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.6);
        }

        .map-node.completed {
            background: #3498db;
            border-color: #ecf0f1;
        }

        .map-node.locked {
            background: #7f8c8d;
            border-color: #bdc3c7;
            cursor: not-allowed;
        }

        .map-node.unlocked:not(.completed) {
            animation: pulse-node 1.5s infinite;
        }

        @keyframes pulse-node {
            0% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(231, 76, 60, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0);
            }
        }

        .map-node:hover:not(.locked) {
            transform: translate(-50%, -50%) scale(1.3);
            z-index: 20;
        }

        .node-label {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            white-space: nowrap;
            pointer-events: none;
            border: 1px solid #555;
        }

        /* Health Bar */
        .hp-bar-container {
            width: 100%;
            background: #2d3436;
            border: 2px solid white;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
        }

        .hp-bar {
            height: 100%;
            background: #55efc4;
            width: 100%;
            transition: width 0.3s, background-color 0.3s;
        }

        .hp-bar.med {
            background: #fdcb6e;
        }

        .hp-bar.low {
            background: #ff7675;
        }

        .pixel-box {
            border: 4px solid #fff;
            background: #000;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 4px 4px 0px #888;
        }

        .sprite-img {
            image-rendering: pixelated;
            width: 150px;
            height: 150px;
            object-fit: contain;
        }

        /* Tactical Board */
        #tactics-btn {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .tactic-step {
            opacity: 0;
            transform: translateX(-20px);
            animation: slideIn 0.3s forwards;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Question Animations */
        .slide-in-right {
            animation: slideInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideInRight {
            0% {
                opacity: 0;
                transform: translateX(100px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .q-container {
            transition: opacity 0.3s;
        }

        .q-container:not(.active-q) {
            opacity: 0.6;
            pointer-events: none;
        }

        /* --- Home Button --- */
        .home-btn-fixed {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 99999;
            background: linear-gradient(135deg, #1e3a8a, #764ba2);
            color: #fff;
            border: none;
            padding: 11px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.45);
            transition: all 0.3s ease;
            font-family: "Segoe UI", sans-serif;
            letter-spacing: 0.5px;
        }

        .home-btn-fixed:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.55);
            color: #fff;
        }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden flex flex-col">

    <!-- Header -->
    <header class="bg-red-600 border-b-4 border-red-800 p-4 flex justify-between items-center shadow-lg z-20">
        <h1 class="text-xl text-white shadow-black drop-shadow-md tracking-wider">Fraction Quest</h1>
        <div class="flex items-center space-x-4">
            <div class="group relative">
                <button onclick="toggleBGM()" id="bgm-btn"
                    class="bg-purple-500 hover:bg-purple-400 border-2 border-white px-4 py-2 rounded text-xs transition-colors shadow-md">🎵
                    BGM: OFF</button>
                <!-- Hidden Volume Slider -->
                <div
                    class="absolute top-full left-1/2 -translate-x-1/2 mt-2 bg-gray-900 border-2 border-white p-2 rounded shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-[9999] flex flex-col items-center w-32">
                    <label for="bgm-volume" class="text-[8px] text-yellow-300 mb-1 font-bold tracking-wider">VOLUME:
                        <span id="vol-display">25%</span></label>
                    <input type="range" id="bgm-volume" min="0" max="100" value="25"
                        class="w-full h-2 rounded-lg accent-purple-500 cursor-pointer"
                        oninput="changeVolume(this.value)">
                </div>
            </div>
            <button onclick="switchView('map')"
                class="bg-blue-500 hover:bg-blue-400 border-2 border-white px-4 py-2 rounded text-xs transition-colors shadow-md">MAP</button>
            <button onclick="switchView('pokedex')"
                class="bg-green-500 hover:bg-green-400 border-2 border-white px-4 py-2 rounded text-xs transition-colors shadow-md">POKÉDEX</button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main
        class="flex-grow relative overflow-hidden bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-gray-800">

        <!-- Local BGM Audio Element -->
        <audio id="bgm-player"></audio>

        <!-- MAP VIEW -->
        <div id="view-map" class="absolute inset-0 p-8 overflow-y-auto hidden">
            <h2 class="text-center text-yellow-300 mb-6 text-2xl shadow-black drop-shadow-md tracking-wider">Select a
                Location</h2>
            <div id="map-container"
                class="relative w-full max-w-4xl mx-auto h-[600px] border-8 border-gray-900 rounded-xl overflow-hidden shadow-[0_0_20px_rgba(0,0,0,0.8)]">
                <!-- Base Grass Pattern -->
                <div class="absolute inset-0 bg-[#78C850]"
                    style="background-image: linear-gradient(45deg, #68A048 25%, transparent 25%, transparent 75%, #68A048 75%, #68A048), linear-gradient(45deg, #68A048 25%, transparent 25%, transparent 75%, #68A048 75%, #68A048); background-size: 32px 32px; background-position: 0 0, 16px 16px;">
                </div>

                <!-- Terrains -->
                <div
                    class="absolute top-[30%] left-[-10%] w-[40%] h-[40%] bg-[#208030] rounded-full opacity-90 border-4 border-[#186020]">
                </div> <!-- Forest -->
                <div
                    class="absolute top-[-20%] left-[20%] w-[50%] h-[50%] bg-[#B8A038] rounded-full opacity-90 border-4 border-[#8B782A]">
                </div> <!-- Mountain -->
                <div
                    class="absolute top-[-10%] right-[-10%] w-[40%] h-[60%] bg-[#3890E8] rounded-full opacity-90 border-4 border-[#2A6Cae]">
                </div> <!-- Water -->
                <div
                    class="absolute top-[50%] left-[35%] w-[30%] h-[30%] bg-[#E0C068] rounded-full opacity-90 border-4 border-[#A8904E]">
                </div> <!-- Elite Island -->

                <!-- SVG Paths -->
                <svg id="map-paths" class="absolute inset-0 w-full h-full pointer-events-none drop-shadow-md"></svg>

                <!-- Nodes -->
                <div id="map-nodes" class="absolute inset-0"></div>
            </div>
        </div>

        <!-- BATTLE VIEW -->
        <div id="view-battle" class="absolute inset-0 flex flex-col hidden">
            <!-- Top: Encounter Info, Timer & Pokemon Stage -->
            <div
                class="bg-gray-900 border-b-4 border-gray-700 p-3 flex justify-center flex-shrink-0 shadow-lg z-10 w-full relative">
                <div class="w-full max-w-4xl flex flex-col sm:flex-row items-center justify-between gap-4">

                    <!-- Timer Box -->
                    <div
                        class="flex-1 pixel-box bg-gray-800 text-white p-2 border-2 border-gray-600 rounded flex flex-col justify-center w-full">
                        <div class="flex justify-between items-end mb-1">
                            <div class="text-[0.6rem] md:text-xs text-yellow-300 tracking-wider" id="battle-loc-name">
                                Route 1</div>
                            <div class="text-[0.6rem] md:text-xs flex items-center">
                                <span class="mr-1">TIME:</span>
                                <span id="timer-text" class="text-xs md:text-sm font-bold">05:00</span>
                            </div>
                        </div>
                        <div class="w-full bg-gray-700 h-2 md:h-3 rounded border border-gray-500 overflow-hidden">
                            <div id="timer-bar"
                                class="h-full bg-blue-400 rounded w-full transition-all duration-1000 linear"></div>
                        </div>
                    </div>

                    <!-- Pokemon Box -->
                    <div
                        class="flex-1 pixel-box bg-white text-black p-2 flex items-center justify-between border-2 border-white rounded w-full">
                        <img id="poke-sprite" src="" class="sprite-img object-contain mr-3"
                            style="width: 64px; height: 64px;" alt="Pokemon">
                        <div class="flex-1 text-right">
                            <h3 class="text-xs md:text-sm uppercase font-bold mb-1" id="poke-name">RAYQUAZA</h3>
                            <div class="flex justify-end items-center gap-2">
                                <div class="text-[0.55rem] font-bold">HP</div>
                                <div class="hp-bar-container border border-black bg-gray-800"
                                    style="height: 10px; width: 80%; border-radius: 4px; overflow: hidden;">
                                    <div id="poke-hp" class="hp-bar h-full transition-all duration-300"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Bottom: Questions & Controls -->
            <div class="flex-grow flex flex-col items-center justify-center p-4">
                <div id="questions-container" class="w-full max-w-5xl pb-16">
                    <!-- Questions injected here -->
                </div>
            </div>

            <!-- Attack Bar Fixed Bottom & Pagination -->
            <div
                class="absolute bottom-0 w-full bg-gray-900 border-t-4 border-gray-700 p-3 flex flex-col items-center z-20 shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
                <!-- Pagination (Progress) Bar -->
                <div id="q-pagination"
                    class="flex flex-wrap justify-center gap-2 mb-3 max-h-24 overflow-y-auto w-full max-w-4xl custom-scrollbar">
                    <!-- Pagination buttons injected here -->
                </div>
                <button onclick="attack()"
                    class="bg-red-500 hover:bg-red-400 text-white border-4 border-red-200 px-8 py-2 text-sm md:text-lg font-bold rounded shadow-[0_0_15px_rgba(255,0,0,0.5)] active:scale-95 transition-transform">
                    ⚔️ ATTACK! ⚔️
                </button>
            </div>

            <!-- Tactical Board Button (Floating Bottom Right) -->
            <div id="tactics-btn"
                class="fixed bottom-24 right-8 z-40 cursor-pointer hover:scale-110 transition-transform"
                onclick="openTacticsBoard()">
                <div
                    class="bg-yellow-400 border-4 border-white text-black rounded-full w-16 h-16 flex items-center justify-center shadow-[0_0_15px_rgba(255,255,0,0.5)]">
                    <span class="text-3xl">📋</span>
                </div>
                <div
                    class="absolute -top-2 -left-4 bg-red-500 text-white text-[10px] px-2 py-1 rounded border border-white pulse-node">
                    TACTICS!</div>
            </div>
        </div>

        <!-- POKEDEX VIEW -->
        <div id="view-pokedex" class="absolute inset-0 p-8 overflow-y-auto hidden">
            <div class="max-w-4xl mx-auto pixel-box bg-red-600/90 min-h-[500px]">
                <h2 class="text-center text-white mb-8 text-2xl border-b-4 border-white pb-4">Pokédex Collection</h2>
                <div id="pokedex-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    <!-- Caught Pokemon injected here -->
                </div>
                <p id="pokedex-empty" class="text-center text-white mt-10">No Pokémon caught yet. Go explore the map!
                </p>
            </div>
        </div>

    </main>

    <!-- Modal (Alerts/Fleeing) -->
    <div id="modal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden">
        <div class="pixel-box bg-blue-900 text-white max-w-lg w-full text-center flex flex-col items-center">
            <img id="modal-img" src="" class="w-32 h-32 object-contain mb-4 pixelated hidden">
            <p id="modal-text" class="text-lg leading-loose mb-6">Text</p>
            <button id="modal-btn"
                class="bg-yellow-400 text-black px-6 py-3 border-2 border-white hover:bg-yellow-300">Continue</button>
        </div>
    </div>

    <!-- TACTICAL BOARD MODAL -->
    <div id="tactics-modal" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center hidden">
        <div
            class="pixel-box bg-[#1e272e] border-[#0be881] text-white w-full h-full max-w-full max-h-screen border-none rounded-none flex flex-col relative shadow-[0_0_30px_rgba(11,232,129,0.3)]">
            <button onclick="closeTactics()"
                class="absolute top-2 right-2 text-red-500 text-xl font-bold hover:text-red-400">X</button>
            <h2 class="text-[#0be881] text-center mb-4 text-xl border-b-2 border-[#0be881] pb-2">📋 COACH'S BOARD</h2>
            <div id="tactics-q-text"
                class="mb-4 text-yellow-300 bg-black/50 p-3 rounded text-sm leading-loose border border-gray-600"></div>
            <div id="tactics-steps-container" class="space-y-4 overflow-y-auto flex-grow pr-2 mb-4">
                <!-- Steps injected here -->
            </div>
            <div class="mt-2 flex justify-center border-t-2 border-gray-700 pt-4">
                <button onclick="checkTacticsStep()"
                    class="bg-[#0be881] text-black px-6 py-3 border-2 border-white hover:bg-[#05c46b] active:scale-95 transition-transform font-bold w-full">CHECK
                    STEP</button>
            </div>
        </div>
    </div>

    <script>
        /* --- 1. AUDIO SYNTHESIZER (NO EXTERNAL ASSETS NEEDED) --- */
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol = 0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }
        function sndAttack() {
            playTone(150, 'sawtooth', 0.1, 0.2);
            setTimeout(() => playTone(100, 'square', 0.2, 0.2), 50);
        }
        function sndCorrect() {
            playTone(400, 'sine', 0.1);
            setTimeout(() => playTone(600, 'sine', 0.15), 100);
        }
        function sndWrong() {

            {

                handler: (m) => {

                    return arr;
                }
            },
            // Type 7/8: Add/Subtract fractions -> Fraction
            {
                regex: /\{(\d+)\/(\d+)\}\s*([\+\-])\s*\{(\d+)\/(\d+)\}\s*=\s*\[F:(\d+)\/(\d+)\]/,
                handler: (m) => {
                    let d1 = parseInt(m[2]); let d2 = parseInt(m[5]);
                    let calcDenom = Math.max(d1, d2);
                    if (calcDenom % Math.min(d1, d2) !== 0) calcDenom = d1 * d2;

                    let n1 = m[1] * (calcDenom/d1);
                    let n2 = m[4] * (calcDenom/d2);
                    let top = m[3] === '+' ? n1 + n2 : n1 - n2;
                    let arr = [
                        `Concept: To add or subtract fractions, you need a common denominator!`,
                        `Step 1: The common denominator is [I:${calcDenom}].`,
                        `Step 2: Rewrite the fractions.<br><br><span class="math-text">[F:${n1}/${calcDenom}] ${m[3]} [F:${n2}/${calcDenom}]</span>`,
                        `Step 3: ${m[3]==='+'?'Add':'Subtract'} the fractions.<br><br><span class="math-text">[F:${n1}/${calcDenom}] ${m[3]} [F:${n2}/${calcDenom}] = [F:${top}/${calcDenom}]</span>`,
                        `Step 4: Write the calculated fraction.<br><br><span class="math-text">[F:${top}/${calcDenom}]</span>`
                    ];
                    let sim = genSimplifyStep(top, calcDenom, m[6], m[7], 5);
                    if (sim) arr.push(sim);
                    return arr;
                }
            },
            // Type 1: Whole + Fraction (e.g., 3 + {1/2} = [M:3 1/2] OR {5/8} + 4 = [M:4 5/8])
            {
                regex: /(\d+)\s*\+\s*\{(\d+)\/(\d+)\}\s*=\s*\[M:(\d+)\s+(\d+)\/(\d+)\]/,
                handler: (m) => [
                    `Concept: Combine a whole number and a fraction into a Mixed Number!`,
                    `Step 1: Bring down the whole number.<br><br><span class="math-text">Whole: [I:${m[1]}]</span>`,
                    `Step 2: Bring down the fraction.<br><br><span class="math-text">Fraction: [F:${m[2]}/${m[3]}]</span>`,
                    `Step 3: Combine them into a mixed number!<br><br><span class="math-text">[M:${m[4]} ${m[5]}/${m[6]}]</span>`
                ]
            },
            {
                regex: /\{(\d+)\/(\d+)\}\s*\+\s*(\d+)\s*=\s*\[M:(\d+)\s+(\d+)\/(\d+)\]/,
                handler: (m) => [
                    `Concept: Combine a whole number and a fraction into a Mixed Number!`,
                    `Step 1: Bring down the whole number.<br><br><span class="math-text">Whole: [I:${m[3]}]</span>`,
                    `Step 2: Bring down the fraction.<br><br><span class="math-text">Fraction: [F:${m[1]}/${m[2]}]</span>`,
                    `Step 3: Combine them into a mixed number!<br><br><span class="math-text">[M:${m[4]} ${m[5]}/${m[6]}]</span>`
                ]
            },
            // Type 2: Wholes and Parts (e.g., [W:2] wholes and [W:3] fifths = [M:2 3/5])
            {
                regex: /\[W:(\d+)\] wholes and \[W:(\d+)\] (\w+) = \[M:(\d+)\s+(\d+)\/(\d+)\]/,
                handler: (m) => [
                    `Concept: Convert the word problem into a mixed number.`,
                    `Step 1: Identify the whole number.<br><br><span class="math-text">Whole: [I:${m[1]}]</span>`,
                    `Step 2: Identify the numerator (parts).<br><br><span class="math-text">Numerator: [I:${m[2]}]</span>`,
                    `Step 3: What is the denominator based on the word "${m[3]}"?<br><br><span class="math-text">Denominator: [I:${m[6]}]</span>`,
                    `Step 4: Write the mixed number.<br><br><span class="math-text">[M:${m[4]} ${m[5]}/${m[6]}]</span>`
                ]
            },
            // Type 3: Whole to Pieces Conversion (e.g. There are [I:19] quarters in 4 {3/4})
            {
                regex: /There are \[I:(\d+)\] (\w+) in (\d+)\s*\{(\d+)\/(\d+)\}/,
                handler: (m) => [
                    `Concept: Change a mixed number into an improper fraction.`,
                    `Step 1: Multiply the whole number by the denominator.<br><br><span class="math-text">[I:${m[3]}] × [I:${m[5]}] = [I:${m[3] * m[5]}]</span>`,
                    `Step 2: Add the extra numerator.<br><br><span class="math-text">[I:${m[3] * m[5]}] + [I:${m[4]}] = [I:${m[1]}]</span>`
                ]
            },
            // Type 3.5: Whole to Pieces (e.g. 2 = [I:4] halves)
            {
                regex: /(\d+)\s*=\s*\[I:(\d+)\]\s+(\w+)/,
                handler: (m) => {
                    let den = parseInt(m[2]) / parseInt(m[1]);
                    return [
                        `Concept: Find how many pieces make up the whole numbers!`,
                        `Step 1: Based on "${m[3]}", what is the denominator?<br><br><span class="math-text">Denominator: [I:${den}]</span>`,
                        `Step 2: Multiply the whole number by the denominator.<br><br><span class="math-text">[I:${m[1]}] × [I:${den}] = [I:${m[2]}]</span>`
                    ];
                }
            },
            {
                regex: /(\d+)\s*\{(\d+)\/(\d+)\}\s*=\s*\[I:(\d+)\]\s+(\w+)/,
                handler: (m) => [
                    `Concept: Change a mixed number into pieces (improper fraction).`,
                    `Step 1: Multiply the whole number by the denominator.<br><br><span class="math-text">[I:${m[1]}] × [I:${m[3]}] = [I:${m[1] * m[3]}]</span>`,
                    `Step 2: Add the extra ${m[2]} parts!<br><br><span class="math-text">[I:${m[1] * m[3]}] + [I:${m[2]}] = [I:${m[4]}]</span>`
                ]
            },
            // Type 4: Mixed to Improper
            {
                regex: /(\d+)\s*\{(\d+)\/(\d+)\}\s*=\s*\[F:(\d+)\/(\d+)\]/,
                handler: (m) => [
                    `Concept: Let's convert ${m[1]} ${m[2]}/${m[3]} to an improper fraction!`,
                    `Step 1: Multiply the whole number by the denominator.<br><br><span class="math-text">[I:${m[1]}] × [I:${m[3]}] = [I:${m[1] * m[3]}]</span>`,
                    `Step 2: Add the result to the numerator.<br><br><span class="math-text">[I:${m[1] * m[3]}] + [I:${m[2]}] = [I:${m[4]}]</span>`,
                    `Step 3: Fill in the final answer of improper fraction.<br><br><span class="math-text">[F:${m[4]}/${m[5]}]</span>`
                ]
            },
            // Type 5: Improper to Mixed
            {
                regex: /\{(\d+)\/(\d+)\}\s*=\s*\[M:(\d+)\s+(\d+)\/(\d+)\]/,
                handler: (m) => [
                    `Concept: Change the improper fraction ${m[1]}/${m[2]} into a mixed number using division!`,
                    `Step 1: Show division in column format. Divide ${m[1]} by ${m[2]}.<br><br>
                    <div class="flex flex-col items-center text-2xl font-mono mx-auto w-max mb-6">
                        <div class="flex px-2 border-b-2 border-white mb-2">
                            <div class="w-8"></div>
                            <div class="px-2 text-yellow-300">[I:${m[3]}]</div>
                        </div>
                        <div class="flex items-center">
                            <div class="w-8 text-right pr-2">${m[2]}</div>
                            <div class="border-l-2 border-white px-2">${m[1]}</div>
                        </div>
                    </div>`,
                    `Step 2: Guide step by step until get the remainder.<br><br>
                    <div class="flex flex-col items-center text-2xl font-mono mx-auto w-max mb-6">
                        <div class="flex px-2 border-b-2 border-white mb-2">
                            <div class="w-8"></div>
                            <div class="px-2 text-yellow-300">${m[3]}</div>
                        </div>
                        <div class="flex items-center">
                            <div class="w-8 text-right pr-2">${m[2]}</div>
                            <div class="border-l-2 border-white px-2">${m[1]}</div>
                        </div>
                        <div class="flex px-2 mt-2">
                            <div class="w-8 text-right">-</div>
                            <div class="px-2 text-red-400">[I:${m[3] * m[2]}]</div>
                        </div>
                        <div class="flex px-2 border-t-2 border-white mt-1 pt-2">
                            <div class="w-8"></div>
                            <div class="px-2 text-cyan-300">[I:${m[4]}]</div>
                        </div>
                    </div>`,
                    `Step 3: Move the answer to whole number, remainder to numerator and divider to denominator.<br><br>
                    <div class="relative h-48 w-full flex justify-center items-center mt-4 bg-black/40 rounded border border-gray-600 overflow-hidden">
                        <div class="flex flex-col justify-center items-start gap-4 absolute left-10 md:left-24">
                            <div class="text-yellow-300 text-xl font-bold flex items-center anim-mov-q">Quotient: ${m[3]}</div>
                            <div class="text-cyan-300 text-xl font-bold flex items-center anim-mov-r">Remainder: ${m[4]}</div>
                            <div class="text-white text-xl font-bold flex items-center anim-mov-d">Divisor: ${m[2]}</div>
                        </div>
                        <div class="p-4 bg-gray-800 border-2 border-green-400 text-3xl anim-fade-ans ml-48 z-10 font-mono flex items-center">
                            <span class="mr-2 text-yellow-300">${m[3]}</span>
                            <span class="frac-block">
                                <span class="frac-num text-cyan-300">${m[4]}</span>
                                <span class="frac-den text-white">${m[5]}</span>
                            </span>
                        </div>
                    </div><br>Fill in the final answer below:<br><br><span class="math-text">[M:${m[3]} ${m[4]}/${m[5]}]</span>`
                ]
            },
            // Type 6: Improper to Whole
            {
                regex: /\{(\d+)\/(\d+)\}\s*=\s*\[W:(\d+)\]/,
                handler: (m) => [
                    `Concept: A fraction line is basically a division sign!`,
                    `Step 1: Divide the top by the bottom.<br><br><span class="math-text">[I:${m[1]}] ÷ [I:${m[2]}]</span>`,
                    `Step 2: Write the final whole number.<br><br><span class="math-text">[I:${m[3]}]</span>`
                ]
            },
            // Type 11: Fraction of set: (e.g., {2/3} of 21 = [I:14])
            {
                regex: /\{(\d+)\/(\d+)\}\s*(?:of|×)\s*(\d+)\s*=\s*\[I:(\d+)\]/,
                handler: (m) => [
                    `Concept: Finding ${m[1]}/${m[2]} of ${m[3]} means splitting ${m[3]} into ${m[2]} equal groups.`,
                    `Step 1: Divide by the denominator to find out how much is in 1 group.<br><br><span class="math-text">[I:${m[3]}] ÷ [I:${m[2]}] = [I:${parseInt(m[3]) / parseInt(m[2])}]</span>`,
                    `Step 2: Multiply by the numerator to get the total for ${m[1]} groups.<br><br><span class="math-text">[I:${parseInt(m[3]) / parseInt(m[2])}] × [I:${m[1]}] = [I:${m[4]}]</span>`
                ]
            },
            // Type 13: Fallback for word problems & uncaught formats
            {
                regex: /(.*)/,
                handler: (m, raw) => {
                    let matches = [...raw.matchAll(/\[([MFWI]):(.*?)\]/g)];
                    let stepText = matches.map((match, i) => `Final Answer: [${match[1]}:${match[2]}]`).join('<br><br>');
                    return [
                        `Step 1: Read the problem carefully and identify the key numbers.`,
                        `Step 2: Determine if you should Add, Subtract, Multiply, or Divide.`,
                        `Step 3: Solve the math and fill out the answer below.<br><br><span class="math-text">${stepText}</span>`
                    ];
                }
            }
        ];

        /* --- 4. GAME ENGINE LOGIC --- */

        function switchView(viewName) {
            document.getElementById('view-map').classList.add('hidden');
            document.getElementById('view-battle').classList.add('hidden');
            document.getElementById('view-pokedex').classList.add('hidden');
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
            state.view = viewName;

            if (viewName === 'map') renderMap();
            if (viewName === 'pokedex') renderPokedex();

            if (window.ProgressTracker) {
                window.ProgressTracker.autoSave({ unlocked: state.unlocked, completed: state.completed, pokedex: state.pokedex });
            }
        }

        function getSpriteUrl(name) {
            return `https://img.pokemondb.net/sprites/black-white/anim/normal/${name}.gif`;
        }
        function getStaticSpriteUrl(name) {
            // fallback if gif fails
            return `https://img.pokemondb.net/sprites/black-white/normal/${name}.png`;
        }

        /* MAP RENDERING */
        function renderMap() {
            const nodesContainer = document.getElementById('map-nodes');
            const pathsContainer = document.getElementById('map-paths');
            nodesContainer.innerHTML = '';
            pathsContainer.innerHTML = '';

            MAP_DATA.forEach((stage, idx) => {
                const isCompleted = state.completed.includes(idx);
                const isUnlocked = state.unlocked.includes(idx) || isCompleted;

                const node = document.createElement('div');
                node.className = `map-node text-xs font-bold ${isCompleted ? 'completed' : isUnlocked ? 'unlocked' : 'locked'}`;
                node.style.left = `${stage.pos.x}%`;
                node.style.top = `${stage.pos.y}%`;

                // Label
                const label = document.createElement('div');
                label.className = "node-label";
                label.innerText = `${idx + 1}. ${stage.name}`;
                node.appendChild(label);

                // --- GLOBALLY UNLOCKED FOR TEACHER NAVIGATION ---
                node.onclick = () => initBattle(idx);
                nodesContainer.appendChild(node);

                // Draw lines to next node using SVG
                if (idx < MAP_DATA.length - 1) {
                    const next = MAP_DATA[idx + 1];
                    const nextUnlocked = true; // Temporary bypass so we can click around

                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", `${stage.pos.x}%`);
                    line.setAttribute("y1", `${stage.pos.y}%`);
                    line.setAttribute("x2", `${next.pos.x}%`);
                    line.setAttribute("y2", `${next.pos.y}%`);
                    line.setAttribute("stroke", nextUnlocked ? "#ffeaa7" : "#7f8c8d");
                    line.setAttribute("stroke-width", "4");
                    line.setAttribute("stroke-dasharray", "8, 8");
                    pathsContainer.appendChild(line);
                }
            });
        }

        /* PARSER ENGINE */
        function parseQuestionText(text) {
            let html = text;
            let visuals = '';

            // 1. Draw Rectangles: [DRAW_RECT:wholes:part:total]
            html = html.replace(/\[DRAW_RECT:(\d+):(\d+):(\d+)\]/g, (match, wStr, pStr, tStr) => {
                const wholes = parseInt(wStr);
                const parts = parseInt(pStr);
                const total = parseInt(tStr);

                let visHtml = '<div class="fraction-vis-container">';
                for (let i = 0; i < wholes; i++) {
                    visHtml += `<div class="frac-shape frac-rect" style="background-color: #55efc4;"></div>`;
                }
                let partialHtml = `<div class="frac-shape frac-rect">`;
                for (let i = 0; i < total; i++) {
                    partialHtml += `<div class="frac-rect-part ${i < parts ? 'filled' : ''}"></div>`;
                }
                partialHtml += `</div>`;
                visHtml += partialHtml + '</div>';

                visuals += visHtml;
                return ''; // remove from main math text
            });

            // 2. Draw Circles: [DRAW_CIRC:wholes:part:total]
            html = html.replace(/\[DRAW_CIRC:(\d+):(\d+):(\d+)\]/g, (match, wStr, pStr, tStr) => {
                const wholes = parseInt(wStr);
                const parts = parseInt(pStr);
                const total = parseInt(tStr);

                let visHtml = '<div class="fraction-vis-container">';
                for (let i = 0; i < wholes; i++) {
                    visHtml += `<div class="frac-circ whole"></div>`;
                }

                const circumference = 78.5398;
                const dashLen = (parts / total) * circumference;

                let svgLines = '';
                for (let i = 0; i < total; i++) {
                    let angle = (i * 360) / total;
                    svgLines += `<line x1="25" y1="25" x2="25" y2="0" class="frac-line" transform="rotate(${angle} 25 25)"/>`;
                }

                visHtml += `
                    <div class="frac-circ">
                        <svg viewBox="0 0 50 50">
                            <circle cx="25" cy="25" r="12.5" class="frac-slice" stroke-dasharray="${dashLen} ${circumference}"></circle>
                            ${svgLines}
                        </svg>
                    </div></div>`;

                visuals += visHtml;
                return ''; // remove from main math text
            });

            // 3. Number Lines: [NUMBER_LINE:start:totalTicks:ticksPerWhole:marks]
            // Marks format uses curly braces: whole:{n/d}={F:n/d} OR ={M:w n/d} OR ={static n/d}
            html = html.replace(/\[NUMBER_LINE:(\d+):(\d+):(\d+):(.*?)\]/g, (match, startStr, totalStr, ticksStr, marksStr) => {
                const start = parseInt(startStr);
                const totalTicks = parseInt(totalStr);
                const ticksPerWhole = parseInt(ticksStr);

                const parseValue = (valStr) => {
                    if (!valStr) return '';
                    let v = valStr.trim();
                    // {M:w n/d} → mixed number inputs (MUST come before generic {n/d})
                    v = v.replace(/\{M:(\d+)\s+(\d+)\/(\d+)\}/g,
                        '<span class="math-text inline-flex items-center gap-1"><input type="number" class="q-input w-in" data-ans="$1"><span class="frac-block"><input type="number" class="q-input n-in" data-ans="$2"><input type="number" class="q-input d-in" data-ans="$3"></span></span>');
                    // {F:n/d} → fraction inputs
                    v = v.replace(/\{F:(\d+)\/(\d+)\}/g,
                        '<span class="math-text frac-block"><input type="number" class="q-input n-in" data-ans="$1"><input type="number" class="q-input d-in" data-ans="$2"></span>');
                    // {n/d} → static fraction label
                    v = v.replace(/\{(\d+)\/(\d+)\}/g,
                        '<span class="frac-block"><span class="frac-num text-base">$1</span><span class="frac-den text-base">$2</span></span>');
                    return v;
                };

                let marksData = {};
                if (marksStr && marksStr.length > 0) {
                    // Split by ',' but carefully join back pairs split badly  
                    marksStr.split(',').forEach(chunk => {
                        const eqIdx = chunk.indexOf('=');
                        if (eqIdx > -1) {
                            const pos = chunk.substring(0, eqIdx).trim();
                            const val = chunk.substring(eqIdx + 1).trim();
                            marksData[pos] = parseValue(val);
                        }
                    });
                }

                const startXPct = 5;
                const endXPct = 95;
                const usableWidth = endXPct - startXPct;
                const tickSpacing = usableWidth / totalTicks;

                let svgTicks = '';
                let labelsHtml = '<div class="nline-labels" style="height:70px;">';

                for (let i = 0; i <= totalTicks; i++) {
                    const isMajor = (i % ticksPerWhole) === 0;
                    const xPos = (startXPct + i * tickSpacing).toFixed(2);
                    const wholeVal = start + Math.floor(i / ticksPerWhole);
                    const numVal = i % ticksPerWhole;
                    const posKey = `${wholeVal}:{${numVal}/${ticksPerWhole}}`;
                    const hasMark = !!marksData[posKey];

                    if (isMajor) {
                        svgTicks += `<line x1="${xPos}%" y1="5" x2="${xPos}%" y2="25" class="nline-tick-major" />`;
                        if (hasMark) {
                            // Replace integer label with the input/label mark
                            labelsHtml += `<div class="nline-label" style="left:${xPos}%;">${marksData[posKey]}</div>`;
                        } else {
                            labelsHtml += `<div class="nline-label font-bold" style="left:${xPos}%;font-size:1rem;">${wholeVal}</div>`;
                        }
                    } else {
                        svgTicks += `<line x1="${xPos}%" y1="10" x2="${xPos}%" y2="20" class="nline-tick-minor" />`;
                        if (hasMark) {
                            labelsHtml += `<div class="nline-label" style="left:${xPos}%;">${marksData[posKey]}</div>`;
                        }
                    }
                }

                labelsHtml += '</div>';

                const visHtml = `
                    <div class="number-line-container">
                        <svg class="nline-svg" viewBox="0 0 1000 30" preserveAspectRatio="none">
                            <line x1="${startXPct}%" y1="15" x2="${endXPct}%" y2="15" class="nline-axis" />
                            ${svgTicks}
                        </svg>
                        ${labelsHtml}
                    </div>`;

                visuals += visHtml;
                return ''; // strip from text
            });

            // 4. Static fractions: {1/2}
            html = html.replace(/\{(\d+)\/(\d+)\}/g, '<span class="frac-block"><span class="frac-num">$1</span><span class="frac-den">$2</span></span>');

            // 4. Input Mixed: [M:w n/d]
            html = html.replace(/\[M:(\d+)\s+(\d+)\/(\d+)\]/g, (match, w, n, d) => {
                return `<span class="math-text">
                    <input type="number" class="q-input w-in" data-ans="${w}">
                    <span class="frac-block">
                        <input type="number" class="q-input n-in" data-ans="${n}">
                        <input type="number" class="q-input d-in" data-ans="${d}">
                    </span>
                </span>`;
            });

            // 5. Input Fraction: [F:n/d]
            html = html.replace(/\[F:(\d+)\/(\d+)\]/g, (match, n, d) => {
                return `<span class="math-text frac-block">
                    <input type="number" class="q-input n-in" data-ans="${n}">
                    <input type="number" class="q-input d-in" data-ans="${d}">
                </span>`;
            });

            // 6. Input Whole: [W:ans]
            html = html.replace(/\[W:(\d+)\]/g, (match, ans) => {
                return `<input type="number" class="q-input w-in" data-ans="${ans}">`;
            });

            // 7. Input Standard: [I:ans]
            html = html.replace(/\[I:(\d+)\]/g, (match, ans) => {
                return `<input type="number" class="q-input i-in" data-ans="${ans}">`;
            });

            return `
                <div class="w-full flex flex-col items-center justify-center gap-6 pt-4 pb-2">
                    ${visuals}
                    <div class="math-text text-sm md:text-xl leading-loose text-center" style="white-space: normal;">
                        ${html}
                    </div>
                </div>`;
        }

        /* BATTLE LOGIC */
        function initBattle(stageIdx) {
            state.currentStage = MAP_DATA[stageIdx];
            state.tier = 0;
            state.currentStageQIdx = 0; // Reset question index for new battle

            startEncounterModal(() => {
                switchView('battle');
                setupBattleUI();
            });
        }

        function setupBattleUI() {
            const stage = state.currentStage;
            const pokeName = stage.pokemon[state.tier];

            document.getElementById('battle-loc-name').innerText = stage.name;
            document.getElementById('poke-name').innerText = pokeName;

            const sprite = document.getElementById('poke-sprite');
            sprite.src = getSpriteUrl(pokeName);
            sprite.onerror = () => { sprite.src = getStaticSpriteUrl(pokeName); };

            // Initialize Battle Answers State
            state.battleAnswers = Array(stage.questions.length).fill(null).map(() => ({
                isCorrect: false,
                inputs: []
            }));

            // Clear questions and render ONLY the first one
            renderPagination();
            renderNextQuestion();

            // Start Timer
            startTimer();
            updateHPBar();
        }

        function saveCurrentInputs() {
            const activeQ = document.querySelector('.active-q');
            if (activeQ) {
                const idx = parseInt(activeQ.getAttribute('data-idx'));
                const inputs = Array.from(activeQ.querySelectorAll('.q-input'));
                state.battleAnswers[idx].inputs = inputs.map(i => i.value);
            }
        }

        function renderPagination() {
            const pag = document.getElementById('q-pagination');
            pag.innerHTML = '';
            for (let i = 0; i < state.currentStage.questions.length; i++) {
                const btn = document.createElement('button');
                const isCurrent = state.currentStageQIdx === i;
                const isDone = state.battleAnswers[i].isCorrect;

                btn.className = `w-8 h-8 md:w-10 md:h-10 text-xs md:text-sm font-bold border-2 rounded shrink-0 transition-colors ${isCurrent
                        ? 'bg-yellow-400 border-white text-black shadow-[0_0_10px_rgba(255,255,0,0.8)] scale-110'
                        : isDone
                            ? 'bg-green-500 border-green-200 text-white opacity-80'
                            : 'bg-gray-700 border-gray-500 text-white hover:bg-gray-600'
                    }`;
                btn.innerText = i + 1;
                btn.onclick = () => {
                    saveCurrentInputs();
                    state.currentStageQIdx = i;
                    renderNextQuestion();
                };
                pag.appendChild(btn);
            }
        }

        function renderNextQuestion() {
            const stage = state.currentStage;
            if (state.currentStageQIdx >= stage.questions.length) return;

            const qText = stage.questions[state.currentStageQIdx];
            const qContainer = document.getElementById('questions-container');
            qContainer.innerHTML = ''; // Clear container to enforce Flashcard View

            const qDiv = document.createElement('div');
            // Add slide-in animation and active-q marker
            qDiv.className = "pixel-box bg-gray-800 p-4 min-h-[150px] w-full q-container active-q slide-in-right mb-6 flex items-center justify-center";
            qDiv.setAttribute('data-idx', state.currentStageQIdx);
            qDiv.setAttribute('data-raw', qText);
            qDiv.innerHTML = parseQuestionText(qText);

            const answerState = state.battleAnswers[state.currentStageQIdx];
            const inputs = qDiv.querySelectorAll('.q-input');

            // Restore any saved inputs
            if (answerState.inputs.length > 0) {
                inputs.forEach((input, i) => {
                    input.value = answerState.inputs[i] || '';
                });
            }

            // Lock if already correct
            if (answerState.isCorrect) {
                qDiv.classList.remove('active-q');
                inputs.forEach(input => {
                    input.classList.add('correct');
                    input.setAttribute('disabled', 'true');
                });
            } else {
                // --- AUTO CHECK LOGIC ---
                inputs.forEach(input => {
                    input.addEventListener('input', () => {
                        let allCorrect = true;
                        inputs.forEach(inp => {
                            if (inp.value.trim() !== inp.getAttribute('data-ans')) allCorrect = false;
                        });
                        // If all fields are filled out correctly, wait a split second then attack!
                        if (allCorrect) setTimeout(attack, 300);
                    });
                    // Allow pressing 'Enter' to submit immediately
                    input.addEventListener('keyup', (e) => {
                        if (e.key === 'Enter') checkSubmission();
                    });

                    // Allow Arrow Keys navigation
                    input.addEventListener('keydown', (e) => {
                        if (['ArrowRight', 'ArrowDown'].includes(e.key)) {
                            e.preventDefault();
                            const allInputs = Array.from(qDiv.querySelectorAll('.q-input:not(.correct)'));
                            const idx = allInputs.indexOf(input);
                            if (idx > -1 && idx < allInputs.length - 1) allInputs[idx + 1].focus();
                        } else if (['ArrowLeft', 'ArrowUp'].includes(e.key)) {
                            e.preventDefault();
                            const allInputs = Array.from(qDiv.querySelectorAll('.q-input:not(.correct)'));
                            const idx = allInputs.indexOf(input);
                            if (idx > 0) allInputs[idx - 1].focus();
                        }
                    });
                });
            }

            qContainer.appendChild(qDiv);

            // Re-render pagination to update active state
            renderPagination();

            setTimeout(() => {
                // Auto focus first input
                const firstInput = qDiv.querySelector('.q-input:not(.correct)');
                if (firstInput) firstInput.focus();
            }, 50);
        }

        function checkSubmission() {
            // Evaluates current box if user explicitly hits enter to show wrong anim
            const activeQ = document.querySelector('.active-q');
            if (activeQ) attack();
        }

        function updateHPBar() {
            if (!state.currentStage) return;
            const total = state.battleAnswers.length;
            const correctCount = state.battleAnswers.filter(a => a.isCorrect).length;
            const hpPercent = 100 - ((correctCount / total) * 100);

            const hpBar = document.getElementById('poke-hp');
            hpBar.style.width = `${hpPercent}%`;

            hpBar.className = 'hp-bar transition-all duration-300';
            if (hpPercent <= 50) hpBar.classList.add('med');
            if (hpPercent <= 20) hpBar.classList.add('low');
        }

        function attack() {
            sndAttack();
            let allCorrect = true;
            let checkCount = 0;

            // ONLY check the currently active question
            const activeQ = document.querySelector('.active-q');
            if (!activeQ) return;

            const inputs = activeQ.querySelectorAll('.q-input');

            inputs.forEach(input => {
                checkCount++;
                const ans = input.getAttribute('data-ans');
                const val = input.value.trim();

                if (val === ans) {
                    input.classList.add('correct');
                    input.classList.remove('wrong');
                } else if (val !== '') {
                    input.classList.add('wrong');
                    allCorrect = false;
                    setTimeout(() => input.classList.remove('wrong'), 400);
                } else {
                    allCorrect = false;
                }
            });

            if (allCorrect) {
                sndCorrect();

                // Lock question and update state
                activeQ.classList.remove('active-q');
                state.battleAnswers[state.currentStageQIdx].isCorrect = true;
                saveCurrentInputs();

                const sprite = document.getElementById('poke-sprite');
                sprite.classList.add('slash-anim');
                setTimeout(() => sprite.classList.remove('slash-anim'), 300);

                updateHPBar();

                // Check Win Condition: ALL questions correct
                const win = state.battleAnswers.every(ans => ans.isCorrect);

                if (win) {
                    clearInterval(state.interval);
                    setTimeout(catchPokemon, 600);
                } else {
                    // Try to auto-progress to the next unfinished question
                    let nextIdx = state.currentStageQIdx + 1;
                    while (nextIdx < state.currentStage.questions.length && state.battleAnswers[nextIdx].isCorrect) {
                        nextIdx++;
                    }
                    if (nextIdx < state.currentStage.questions.length) {
                        state.currentStageQIdx = nextIdx;
                    } else {
                        // Loop back from start to find any remaining unanswered
                        state.currentStageQIdx = state.battleAnswers.findIndex(ans => !ans.isCorrect);
                    }
                    setTimeout(renderNextQuestion, 400);
                }
            } else if (checkCount > 0) {
                sndWrong();
            }
        }

        /* TIMER LOGIC */
        function startTimer() {
            clearInterval(state.interval);
            const timeLimit = state.currentStage.timeLimit[state.tier];

            if (timeLimit === -1) {
                document.getElementById('timer-text').innerText = "∞";
                document.getElementById('timer-bar').style.width = "100%";
                return;
            }

            state.timer = timeLimit;
            updateTimerUI(timeLimit);

            state.interval = setInterval(() => {
                state.timer--;
                updateTimerUI(timeLimit);

                if (state.timer <= 0) {
                    clearInterval(state.interval);
                    handleFlee();
                }
            }, 1000);
        }

        function updateTimerUI(maxTime) {
            if (maxTime === -1) return;
            const min = Math.floor(state.timer / 60).toString().padStart(2, '0');
            const sec = (state.timer % 60).toString().padStart(2, '0');
            document.getElementById('timer-text').innerText = `${min}:${sec}`;

            const pct = (state.timer / maxTime) * 100;
            document.getElementById('timer-bar').style.width = `${pct}%`;
            if (pct < 25) document.getElementById('timer-bar').style.backgroundColor = '#ff7675';
            else document.getElementById('timer-bar').style.backgroundColor = '#74b9ff';
        }

        function handleFlee() {
            sndWrong();
            closeTactics(); // Close board if timer runs out!
            const oldPoke = state.currentStage.pokemon[state.tier];
            state.tier++;
            const newPoke = state.currentStage.pokemon[state.tier];

            showModal(
                getSpriteUrl(oldPoke),
                `Oh no! You took too long and ${oldPoke.toUpperCase()} fled!<br><br>But wait... a wild ${newPoke.toUpperCase()} appeared!`,
                "Continue Battle",
                () => {
                    setupBattleUI(); // re-renders with new pokemon, keeps input states because correct ones are locked, wait...
                    // ACTUALLY, to keep inputs, we should just update the sprite and timer.
                    document.getElementById('poke-name').innerText = newPoke;
                    const sprite = document.getElementById('poke-sprite');
                    sprite.src = getSpriteUrl(newPoke);
                    startTimer();
                }
            );
        }

        /* MODALS & PROGRESSION */
        function startEncounterModal(callback) {
            const poke = state.currentStage.pokemon[0];
            showModal(
                getSpriteUrl(poke),
                `A wild ${poke.toUpperCase()} appeared!<br>Solve the fractions quickly before it runs away!`,
                "BATTLE!",
                callback
            );
        }

        function catchPokemon() {
            sndCatch();
            const poke = state.currentStage.pokemon[state.tier];
            if (!state.pokedex.includes(poke)) {
                state.pokedex.push(poke);
            }

            // Progression
            const stageIdx = state.currentStage.id;
            if (!state.completed.includes(stageIdx)) state.completed.push(stageIdx);
            if (stageIdx + 1 < MAP_DATA.length && !state.unlocked.includes(stageIdx + 1)) {
                state.unlocked.push(stageIdx + 1);
            }

            if (window.ProgressTracker) {
                window.ProgressTracker.autoSave({ unlocked: state.unlocked, completed: state.completed, pokedex: state.pokedex });
            }

            showModal(
                getSpriteUrl(poke),
                `Gotcha! ${poke.toUpperCase()} was caught!<br>Map Updated!`,
                "Return to Map",
                () => switchView('map')
            );
        }

        function showModal(imgSrc, text, btnText, callback) {
            const modal = document.getElementById('modal');
            const img = document.getElementById('modal-img');
            const btn = document.getElementById('modal-btn');

            if (imgSrc) {
                img.src = imgSrc;
                img.classList.remove('hidden');
            } else {
                img.classList.add('hidden');
            }

            document.getElementById('modal-text').innerHTML = text;
            btn.innerText = btnText;

            btn.onclick = () => {
                modal.classList.add('hidden');
                if (callback) callback();
            };

            modal.classList.remove('hidden');
        }

        /* --- TACTICAL BOARD LOGIC --- */
        function openTacticsBoard() {
            // Find the first question container that has unsolved inputs
            const containers = document.querySelectorAll('.q-container');
            let targetDiv = null;

            for (let div of containers) {
                if (div.querySelector('.q-input:not(.correct)')) {
                    targetDiv = div;
                    break;
                }
            }

            if (!targetDiv) {
                sndWrong();
                return; // Nothing to solve!
            }

            state.targetQuestionIdx = targetDiv.getAttribute('data-idx');
            state.targetQuestionRaw = targetDiv.getAttribute('data-raw');

            // Clean question for header display (removes input brackets)
            let cleanQ = state.targetQuestionRaw.replace(/\[[MFWI]:[^\]]+\]/g, '<span class="text-white border-b-2 border-dashed border-white inline-block w-8"></span>');
            document.getElementById('tactics-q-text').innerHTML = parseQuestionText(cleanQ);

            // Generate Steps using regex engine
            state.tacticsSteps = [];
            for (let rule of TACTICS_RULES) {
                const match = state.targetQuestionRaw.match(rule.regex);
                if (match) {
                    state.tacticsSteps = rule.handler(match, state.targetQuestionRaw);
                    break;
                }
            }

            state.currentTacticStep = 0;
            renderTacticsSteps();
            document.getElementById('tactics-modal').classList.remove('hidden');
            sndAttack();
        }

        function renderTacticsSteps() {
            const container = document.getElementById('tactics-steps-container');
            container.innerHTML = '';

            for (let i = 0; i <= state.currentTacticStep; i++) {
                if (i >= state.tacticsSteps.length) break;

                const stepDiv = document.createElement('div');
                stepDiv.className = "tactic-step bg-gray-800 p-4 border-l-4 border-[#0be881]";

                // Parse the math inputs inside the step
                stepDiv.innerHTML = parseQuestionText(state.tacticsSteps[i]);

                // If it's an older step, disable it and mark correct
                if (i < state.currentTacticStep) {
                    const inputs = stepDiv.querySelectorAll('.q-input');
                    inputs.forEach(inp => {
                        inp.value = inp.getAttribute('data-ans');
                        inp.classList.add('correct');
                    });
                } else {
                    // --- AUTO CHECK LOGIC FOR TACTICS ---
                    const inputs = stepDiv.querySelectorAll('.q-input');
                    inputs.forEach(input => {
                        input.addEventListener('input', () => {
                            let allCorrect = true;
                            inputs.forEach(inp => {
                                if (inp.value.trim() !== inp.getAttribute('data-ans')) allCorrect = false;
                            });
                            // If all fields in this step are correct, auto-progress!
                            if (allCorrect) setTimeout(checkTacticsStep, 300);
                        });
                        // Allow pressing 'Enter' to check step
                        input.addEventListener('keyup', (e) => {
                            if (e.key === 'Enter') checkTacticsStep();
                        });

                        // Allow Arrow Keys navigation
                        input.addEventListener('keydown', (e) => {
                            if (['ArrowRight', 'ArrowDown'].includes(e.key)) {
                                e.preventDefault();
                                const allInputs = Array.from(stepDiv.querySelectorAll('.q-input:not(.correct)'));
                                const idx = allInputs.indexOf(input);
                                if (idx > -1 && idx < allInputs.length - 1) allInputs[idx + 1].focus();
                            } else if (['ArrowLeft', 'ArrowUp'].includes(e.key)) {
                                e.preventDefault();
                                const allInputs = Array.from(stepDiv.querySelectorAll('.q-input:not(.correct)'));
                                const idx = allInputs.indexOf(input);
                                if (idx > 0) allInputs[idx - 1].focus();
                            }
                        });
                    });
                }

                container.appendChild(stepDiv);

                // Auto focus first input of the new step
                setTimeout(() => {
                    const firstInput = stepDiv.querySelector('.q-input:not(.correct)');
                    if (firstInput) firstInput.focus();
                }, 50);
            }

            // Auto scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        function checkTacticsStep() {
            const container = document.getElementById('tactics-steps-container');
            const currentStepDiv = container.lastElementChild;
            if (!currentStepDiv) return;

            const inputs = currentStepDiv.querySelectorAll('.q-input');
            let allCorrect = true;

            inputs.forEach(input => {
                if (input.value.trim() !== input.getAttribute('data-ans')) {
                    allCorrect = false;
                    input.classList.add('wrong');
                    setTimeout(() => input.classList.remove('wrong'), 400);
                }
            });

            if (allCorrect) {
                sndCorrect();
                state.currentTacticStep++;

                if (state.currentTacticStep >= state.tacticsSteps.length) {
                    // Board Finished! Auto-fill main question
                    setTimeout(() => finishTactics(), 500);
                } else {
                    renderTacticsSteps();
                }
            } else {
                sndWrong();
            }
        }

        function finishTactics() {
            closeTactics();

            // Auto-fill the active question
            const activeQ = document.querySelector('.active-q');
            if (activeQ) {
                const inputs = activeQ.querySelectorAll('.q-input:not(.correct)');
                inputs.forEach(input => {
                    input.value = input.getAttribute('data-ans');
                    input.classList.add('correct');
                });

                // Automatically trigger the attack so it damages the pokemon and pulls the next question
                setTimeout(attack, 300);
            }
        }

        function closeTactics() {
            document.getElementById('tactics-modal').classList.add('hidden');
        }

        /* POKEDEX RENDERING */
        function renderPokedex() {
            const grid = document.getElementById('pokedex-grid');
            const empty = document.getElementById('pokedex-empty');
            grid.innerHTML = '';

            if (state.pokedex.length === 0) {
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                state.pokedex.forEach(poke => {
                    const card = document.createElement('div');
                    card.className = "pixel-box bg-gray-800 flex flex-col items-center p-2";
                    card.innerHTML = `
                        <img src="${getSpriteUrl(poke)}" class="w-24 h-24 object-contain" onerror="this.src='${getStaticSpriteUrl(poke)}'">
                        <span class="text-xs mt-2 uppercase text-yellow-300">${poke}</span>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        // Initialize Map on load
        window.addEventListener('load', function() {
            ProgressTracker.init(async function(tracker) {
                const saved = await tracker.load();
                if (saved) {
                    if (saved.unlocked) state.unlocked = saved.unlocked;
                    if (saved.completed) state.completed = saved.completed;
                    if (saved.pokedex) state.pokedex = saved.pokedex;
                }
            });
            switchView('map');
        });

    </script>
