<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Angle Quest - Primary 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'VT323', monospace;
            background-color: #3b2a1a;
            background-image:
                linear-gradient(45deg, #463220 25%, transparent 25%, transparent 75%, #463220 75%, #463220),
                linear-gradient(45deg, #463220 25%, transparent 25%, transparent 75%, #463220 75%, #463220);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: #ffffff;
            overflow-x: hidden;
            user-select: none;
            text-shadow: 2px 2px 0px #000000;
            letter-spacing: 1px;
            font-size: 1.2rem;
        }

        .mc-panel {
            background-color: #c6c6c6;
            border: 4px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-bottom-color: #555555;
            border-right-color: #555555;
            color: #ffffff;
        }

        .mc-btn {
            background-color: #72a84d;
            border: 4px solid;
            border-top-color: #a4e171;
            border-left-color: #a4e171;
            border-bottom-color: #3c6321;
            border-right-color: #3c6321;
            color: white;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 #3c6321;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .mc-btn:active {
            transform: scale(0.95);
            border-top-color: #3c6321;
            border-left-color: #3c6321;
            border-bottom-color: #a4e171;
            border-right-color: #a4e171;
        }

        .mc-input {
            background-color: #000000;
            color: #51f0ea;
            border: 4px solid;
            border-top-color: #555555;
            border-left-color: #555555;
            border-bottom-color: #ffffff;
            border-right-color: #ffffff;
            padding: 8px;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            text-align: center;
        }

        .mc-input:focus {
            outline: none;
            border-color: #51f0ea;
        }

        .xp-bar-container {
            background-color: #000;
            border: 2px solid #555;
            height: 24px;
            width: 100%;
            position: relative;
        }

        .xp-bar-fill {
            background-color: #a4e171;
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-out;
            box-shadow: inset 0px -4px 0px rgba(0, 0, 0, 0.3);
        }

        @keyframes popup {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        .animate-popup {
            animation: popup 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }

        .feedback-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 50;
            flex-direction: column;
        }

        .svg-container svg {
            filter: drop-shadow(4px 4px 0px rgba(0, 0, 0, 0.5));
        }

        svg text {
            text-shadow: none;
            font-family: sans-serif;
            font-weight: bold;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 32px;
            width: 32px;
            background: #72a84d;
            border: 4px solid #fff;
            cursor: pointer;
            margin-top: -12px;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #000;
            border: 2px solid #555;
        }

        /* --- Home Button --- */
        .home-btn-fixed {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 99999;
            background: linear-gradient(135deg, #1e3a8a, #764ba2);
            color: #fff;
            border: none;
            padding: 11px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.45);
            transition: all 0.3s ease;
            font-family: "Segoe UI", sans-serif;
            letter-spacing: 0.5px;
        }

        .home-btn-fixed:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.55);
            color: #fff;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center py-4 px-2 sm:px-6">

    <a href="../../../../../index.html" class="home-btn-fixed">🏠 Home</a>

    <script>
        let audioCtx;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
            console.warn("AudioContext not supported", e);
        }

        function playTone(freq, type, delay, duration) {
            if (!audioCtx) return;
            const t = audioCtx.currentTime + delay;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, t);
            gain.gain.setValueAtTime(0.1, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + duration);
        }

        function playSound(type) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const t = audioCtx.currentTime;

            if (type === 'win') {
                const rand = Math.floor(Math.random() * 6);
                if (rand === 0) {
                    playTone(880, 'sine', 0, 0.15);
                    playTone(1108, 'sine', 0.1, 0.3);
                } else if (rand === 1) {
                    playTone(523, 'square', 0, 0.1);
                    playTone(659, 'square', 0.1, 0.1);
                    playTone(783, 'square', 0.2, 0.1);
                    playTone(1046, 'square', 0.3, 0.4);
                } else if (rand === 2) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, t);
                    osc.frequency.exponentialRampToValueAtTime(200, t + 0.15);
                    gain.gain.setValueAtTime(0.2, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(t); osc.stop(t + 0.15);
                } else if (rand === 3) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(2500, t);
                    osc.frequency.exponentialRampToValueAtTime(800, t + 0.3);
                    gain.gain.setValueAtTime(0.2, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(t); osc.stop(t + 0.3);
                } else if (rand === 4) {
                    playTone(523, 'sine', 0, 0.4);
                    playTone(659, 'sine', 0, 0.4);
                    playTone(783, 'sine', 0, 0.4);
                } else if (rand === 5) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(400, t);
                    osc.frequency.setValueAtTime(600, t + 0.1);
                    osc.frequency.setValueAtTime(800, t + 0.2);
                    gain.gain.setValueAtTime(0.1, t);
                    gain.gain.linearRampToValueAtTime(0, t + 0.3);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(t); osc.stop(t + 0.3);
                }
            } else if (type === 'lose') {
                playTone(150, 'sawtooth', 0, 0.3);
            } else if (type === 'click') {
                const baseFreq = 600 + (Math.random() * 100 - 50);
                playTone(baseFreq, 'square', 0, 0.05);
            }
        }
    </script>

    <div class="w-full max-w-2xl mb-4 flex flex-col gap-2">

        <button onclick="nextSlide()" class="mc-btn px-8 py-4 text-3xl">NEXT LEVEL &raquo;</button>
    </div>

    <script>
        const drawGrid = () => {
            let svg = '<svg viewBox="-1 -1 7 6" class="w-full h-full" stroke="#888" stroke-width="0.05">';
            for (let i = 0; i <= 6; i++) svg += '<line x1="' + i + '" y1="0" x2="' + i + '" y2="5" />';
            for (let i = 0; i <= 5; i++) svg += '<line x1="0" y1="' + i + '" x2="6" y2="' + i + '" />';
            svg += '<rect x="-0.8" y="0.7" width="0.8" height="0.6" fill="white" stroke="black"/>';
            svg += '<circle cx="4" cy="1" r="0.3" fill="white" stroke="black"/>';
            svg += '<rect x="2.7" y="2.7" width="0.6" height="0.6" fill="white" stroke="black"/>';
            svg += '<polygon points="6,2.6 5.6,3.3 6.4,3.3" fill="white" stroke="black"/>';
            svg += '<path d="M1,3.6 l0.1,0.3 l0.3,0 l-0.2,0.2 l0.1,0.3 l-0.3,-0.2 l-0.3,0.2 l0.1,-0.3 l-0.2,-0.2 l0.3,0 Z" fill="white" stroke="black"/>';
            svg += '<path d="M2.7,4.9 A0.3,0.3 0 0,1 3.3,4.9 Z" fill="white" stroke="black"/>';
            svg += '<path d="M3.8,3.8 h0.4 v0.4 h-0.4 z M4.2,3.8 h0.4 v0.4 h-0.4 z M4.2,3.4 h0.4 v0.4 h-0.4 z M4.2,4.2 h0.4 v0.4 h-0.4 z M4.6,3.8 h0.4 v0.4 h-0.4 z" fill="white" stroke="black"/>';
            svg += '<g transform="translate(6.5, 3.5) scale(0.3)"><line x1="0" y1="-1" x2="0" y2="1" stroke="black"/><line x1="-0.5" y1="0" x2="0.5" y2="0" stroke="black"/><polygon points="0,-1.5 -0.3,-1 0.3,-1" fill="black"/><text x="-0.2" y="-1.8" font-size="1" fill="black">N</text></g>';
            svg += '</svg>';
            return svg;
        };

        const drawInteractiveCompass = (centerLabel, n, ne, e, se, s, sw, w, nw, showControls = false) => {
            let linesStr = [0, 45, 90, 135, 180, 225, 270, 315].map(ang => {
                return '<line x1="0" y1="0" x2="' + (50 * Math.sin(ang * Math.PI / 180)) + '" y2="' + (-50 * Math.cos(ang * Math.PI / 180)) + '" stroke="gray" stroke-dasharray="2 2" />';
            }).join('');

            let html = '<div class="relative w-full max-w-sm mx-auto">' +
                '<svg viewBox="-90 -90 180 180" class="w-full font-sans" stroke="black" stroke-width="0.5" style="overflow: visible;">' +
                linesStr +
                '<text x="0" y="-60" font-size="8" text-anchor="middle" fill="#ffff55" font-weight="bold">' + n + '</text>' +
                '<text x="50" y="-50" font-size="8" text-anchor="middle" fill="#ffff55" font-weight="bold">' + ne + '</text>' +
                '<text x="60" y="3" font-size="8" text-anchor="start" fill="#ffff55" font-weight="bold">' + e + '</text>' +
                '<text x="50" y="55" font-size="8" text-anchor="middle" fill="#ffff55" font-weight="bold">' + se + '</text>' +
                '<text x="0" y="70" font-size="8" text-anchor="middle" fill="#ffff55" font-weight="bold">' + s + '</text>' +
                '<text x="-50" y="55" font-size="8" text-anchor="middle" fill="#ffff55" font-weight="bold">' + sw + '</text>' +
                '<text x="-60" y="3" font-size="8" text-anchor="end" fill="#ffff55" font-weight="bold">' + w + '</text>' +
                '<text x="-50" y="-50" font-size="8" text-anchor="middle" fill="#ffff55" font-weight="bold">' + nw + '</text>' +
                '<g transform="translate(65, -65) scale(0.6)">' +
                '<circle cx="0" cy="0" r="18" fill="rgba(0,0,0,0.5)" stroke="white" stroke-width="1"/>' +
                '<line x1="0" y1="-12" x2="0" y2="12" stroke="white" stroke-width="1"/>' +
                '<line x1="-12" y1="0" x2="12" y2="0" stroke="white" stroke-width="1"/>' +
                '<polygon points="-3,-12 3,-12 0,-18" fill="red" stroke="none"/>' +
                '<text x="0" y="-22" font-size="8" text-anchor="middle" fill="white" font-weight="bold">N</text>' +
                '<text x="20" y="3" font-size="8" text-anchor="start" fill="white" font-weight="bold">E</text>' +
                '<text x="0" y="26" font-size="8" text-anchor="middle" fill="white" font-weight="bold">S</text>' +
                '<text x="-20" y="3" font-size="8" text-anchor="end" fill="white" font-weight="bold">W</text>' +
                '</g>' +
                '<g id="interactive-player" style="transform: rotate(0deg); transform-origin: 0px 0px; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);">' +
                '<rect x="-8" y="-8" width="16" height="16" fill="#fca17d" stroke="black"/>' +
                '<rect x="-8" y="-8" width="16" height="4" fill="#4d3323"/>' +
                '<rect x="-5" y="-2" width="3" height="3" fill="white"/>' +
                '<rect x="-4" y="-2" width="2" height="3" fill="#3b2bb0"/>' +
                '<rect x="2" y="-2" width="3" height="3" fill="white"/>' +
                '<rect x="2" y="-2" width="2" height="3" fill="#3b2bb0"/>' +
                '<polygon points="-3,-8 3,-8 0,-15" fill="#51f0ea" stroke="black" />' +
                '</g>' +
                '<text x="0" y="18" font-size="6" text-anchor="middle" fill="white" font-weight="bold" stroke="black" stroke-width="0.5">' + centerLabel + '</text>' +
                '</svg>';

            if (showControls) {
                html += '<div class="flex items-center justify-center gap-2 mt-4 bg-black/50 p-2 rounded border border-gray-500">' +
                    '<button onclick="rotatePlayer(-45)" class="mc-btn px-3 py-2 text-sm sm:text-lg">↺ CCW</button>' +
                    '<div id="player-deg-display" class="text-xl text-yellow-300 w-28 text-center flex flex-col leading-none">' +
                    '<span>0°</span>' +
                    '<span class="text-sm text-white mt-1">North</span>' +
                    '</div>' +
                    '<button onclick="rotatePlayer(45)" class="mc-btn px-3 py-2 text-sm sm:text-lg">CW ↻</button>' +
                    '</div>';
            }
            html += '</div>';
            return html;
        };

        window.currentPlayerRot = 0;

        function getDirectionName(deg) {
            const dirs = {
                0: "North",
                45: "Northeast",
                90: "East",
                135: "Southeast",
                180: "South",
                225: "Southwest",
                270: "West",
                315: "Northwest"
            };
            return dirs[deg] || "";
        }

        window.rotatePlayer = function (delta) {
            playSound('click');
            window.currentPlayerRot += delta;
            document.getElementById('interactive-player').style.transform = 'rotate(' + window.currentPlayerRot + 'deg)';
            let normalizedDeg = window.currentPlayerRot % 360;
            if (normalizedDeg < 0) normalizedDeg += 360;

            const dirName = getDirectionName(normalizedDeg);
            document.getElementById('player-deg-display').innerHTML = '<span>' + normalizedDeg + '°</span><span class="text-sm text-white mt-1">' + dirName + '</span>';
        };

        const drawProtractorMeasure = (deg, label, showNow = false, baseRotation = 0) => {
            // Apply base rotation to both lines
            const rad1 = baseRotation * Math.PI / 180;
            const rad2 = (baseRotation + deg) * Math.PI / 180;

            const lx1 = 80 * Math.cos(rad1);
            const ly1 = -80 * Math.sin(rad1);
            const lx2 = 80 * Math.cos(rad2);
            const ly2 = -80 * Math.sin(rad2);

            // Calculate bisector angle to position the text label perfectly in the middle
            const bisectRad = (baseRotation + deg / 2) * Math.PI / 180;
            const tx = 30 * Math.cos(bisectRad);
            const ty = -30 * Math.sin(bisectRad);

            let marksStr = Array.from({ length: 37 }).map((_, i) => {
                const ang = i * 5;
                const rad = ang * Math.PI / 180;
                const isMajor = ang % 10 === 0;
                const lineLen = isMajor ? 75 : 82;
                let marks = '<line x1="' + (lineLen * Math.cos(rad)) + '" y1="' + (-lineLen * Math.sin(rad)) + '" x2="' + (90 * Math.cos(rad)) + '" y2="' + (-90 * Math.sin(rad)) + '" stroke="black" stroke-width="' + (isMajor ? 1.5 : 1) + '"/>';

                if (isMajor) {
                    const textX = 64 * Math.cos(rad);
                    const textY = -64 * Math.sin(rad);
                    marks += '<text x="' + textX + '" y="' + (textY + 2) + '" font-size="7" font-family="sans-serif" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="black">' + ang + '</text>';
                }
                return marks;
            }).join('');

            return '<div class="relative w-full max-w-md mx-auto flex flex-col items-center">' +
                '<svg viewBox="-100 -100 200 150" class="w-full h-56 bg-gray-900 rounded border-2 border-gray-600 mb-2 shadow-inner">' +
                '<line x1="0" y1="0" x2="' + lx1 + '" y2="' + ly1 + '" stroke="#ff00ff" stroke-width="3" stroke-linecap="round"/>' +
                '<line x1="0" y1="0" x2="' + lx2 + '" y2="' + ly2 + '" stroke="#ff00ff" stroke-width="3" stroke-linecap="round"/>' +
                '<text x="' + tx + '" y="' + ty + '" font-size="16" stroke="none" fill="white" font-weight="bold" text-anchor="middle" dominant-baseline="middle">' + label + '</text>' +
                '<circle cx="0" cy="0" r="3" fill="#ff00ff"/>' +
                '<g id="virtual-protractor" style="transform: rotate(0deg); transform-origin: 0px 0px; opacity: ' + (showNow ? '0.9' : '0') + '; pointer-events: none; transition: opacity 0.5s ease-in-out;">' +
                '<path d="M -90 0 A 90 90 0 0 1 90 0 Z" fill="rgba(200, 255, 255, 0.85)" stroke="black" stroke-width="1.5"/>' +
                '<path d="M -30 0 A 30 30 0 0 1 30 0" fill="none" stroke="black" stroke-width="1"/>' +
                '<line x1="-90" y1="0" x2="90" y2="0" stroke="black" stroke-width="1.5"/>' +
                '<circle cx="0" cy="0" r="3" fill="red"/>' +
                '<circle cx="0" cy="0" r="1" fill="white"/>' +
                marksStr +
                '</g>' +
                '</svg>' +
                '<div id="protractor-controls" class="' + (showNow ? '' : 'hidden') + ' text-sm text-yellow-300 w-full text-center mt-2 font-bold bg-black/50 p-2 rounded border border-gray-600">' +
                'Slide to rotate protractor base:' +
                '<input type="range" min="-180" max="180" value="0" class="w-full mt-2" oninput="document.getElementById(\'virtual-protractor\').style.transform = \'rotate(\' + this.value + \'deg)\'">' +
                '</div>' +
                '</div>';
        };

        const drawDynamicPie = () => {
            return '<div class="relative w-full max-w-sm mx-auto flex flex-col items-center">' +
                '<svg viewBox="-50 -50 100 100" class="w-32 h-32 mb-4 bg-gray-800 rounded-full border-4 border-gray-600">' +
                '<circle cx="0" cy="0" r="45" fill="#333" stroke="white" stroke-width="0.5"/>' +
                '<path id="pie-slice" d="M 0 0 L 0 -45 A 45 45 0 0 1 45 0 Z" fill="#a4e171" stroke="black"/>' +
                '<line x1="0" y1="-45" x2="0" y2="45" stroke="#777" stroke-dasharray="2 2"/>' +
                '<line x1="-45" y1="0" x2="45" y2="0" stroke="#777" stroke-dasharray="2 2"/>' +
                '</svg>' +
                '<input type="range" min="0" max="360" step="90" value="90" class="w-full" oninput="updatePieUI(this.value)">' +
                '<div id="pie-display" class="text-xl text-yellow-300 mt-2 font-bold">1/4 Turn (90°)</div>' +
                '</div>';
        };

        window.updatePieUI = function (deg) {
            playSound('click');
            const rad = deg * Math.PI / 180;
            const x = 45 * Math.sin(rad);
            const y = -45 * Math.cos(rad);
            const largeArc = deg > 180 ? 1 : 0;
            const path = deg == 360
                ? 'M 0 -45 A 45 45 0 1 1 -0.01 -45 Z'
                : 'M 0 0 L 0 -45 A 45 45 0 ' + largeArc + ' 1 ' + x + ' ' + y + ' Z';
            document.getElementById('pie-slice').setAttribute('d', path);

            let text = "0 Turn";
            if (deg == 90) text = "1/4 Turn (90°)";
            else if (deg == 180) text = "1/2 Turn (180°)";
            else if (deg == 270) text = "3/4 Turn (270°)";
            else if (deg == 360) text = "1 Complete Turn (360°)";
            document.getElementById('pie-display').innerText = text;
        };

        const drawAngleSimple = (deg, label, arcRadius = 20, extraClass = "h-48") => {
            const rad = deg * Math.PI / 180;
            const x = 80 * Math.cos(rad);
            const y = -80 * Math.sin(rad);
            const largeArc = deg > 180 ? 1 : 0;
            const arcX = arcRadius * Math.cos(rad);
            const arcY = -arcRadius * Math.sin(rad);

                    '</svg>' +
                    '</div>' +
                    '<input type="range" id="angle-slider" min="0" max="180" value="0" class="w-full max-w-sm mb-6" oninput="updateDrawAngle(this.value)">' +
                    '<button onclick="checkDrawAnswer(' + slide.target + ')" class="mc-btn px-8 py-3 text-3xl w-full max-w-sm">Craft it!</button>' +
                    '<p id="hint-text" class="text-red-400 mt-4 text-2xl hidden font-bold"></p>';

                updateDrawAngle(0);
            } else {
                container.innerHTML = '<h2 class="text-3xl text-yellow-300 mb-2 font-bold drop-shadow-md">' + slide.title + '</h2>' +
                    '<div class="svg-container w-full max-w-md mb-4 bg-gray-800 rounded p-4 shadow-inner">' +
                    slide.svg +
                    '</div>' +
                    '<p class="text-2xl mb-4 px-4 font-bold leading-relaxed">' + slide.text + '</p>' +
                    '<input type="text" id="answer-input" class="mc-input w-full max-w-sm mb-4 text-3xl" placeholder="Type answer..." autocomplete="off">' +
                    '<button onclick="checkAnswer()" class="mc-btn px-8 py-3 text-3xl w-full max-w-sm">Submit</button>' +
                    '<p id="hint-text" class="text-red-400 mt-4 text-2xl hidden flex items-center justify-center gap-2 font-bold">' +
                    '<span class="text-3xl">💣</span> <span id="hint-content"></span>' +
                    '</p>';

                setTimeout(() => {
                    const input = document.getElementById('answer-input');
                    if (input) {
                        input.focus();
                        input.addEventListener("keypress", function (event) {
                            if (event.key === "Enter") {
                                event.preventDefault();
                                checkAnswer();
                            }
                        });
                    }
                }, 100);
            }
        }

        window.updateDrawAngle = function (deg) {
            playSound('click');
            const rad = deg * Math.PI / 180;
            const line = document.getElementById('dynamic-line');
            const arc = document.getElementById('dynamic-arc');
            const text = document.getElementById('dynamic-text');

            const x = 80 * Math.cos(rad);
            const y = -80 * Math.sin(rad);
            line.setAttribute('x2', x);
            line.setAttribute('y2', y);

            const arcR = 30;
            const arcX = arcR * Math.cos(rad);
            const arcY = -arcR * Math.sin(rad);
            const largeArc = deg > 180 ? 1 : 0;
            arc.setAttribute('d', 'M ' + arcR + ' 0 A ' + arcR + ' ' + arcR + ' 0 ' + largeArc + ' 0 ' + arcX + ' ' + arcY);

            text.textContent = deg + '°';
        };

        window.checkDrawAnswer = function (target) {
            const slider = document.getElementById('angle-slider');
            const val = parseInt(slider.value);
            if (Math.abs(val - target) <= 2) {
                showSuccess();
            } else {
                showFail('Aiyo, quite close but not exact leh! Try to slide to exactly ' + target + 'º.');
            }
        };

        window.lockEstimate = function () {
            playSound('click');
            const estInput = document.getElementById('answer-est').value;

            if (!estInput) {
                showFail("Aiyo, must guess the Estimate first before taking out the tool loh!");
                return;
            }

            document.getElementById('hint-text').classList.add('hidden');
            document.getElementById('game-container').classList.remove('animate-shake');

            document.getElementById('answer-est').disabled = true;
            document.getElementById('est-container').classList.add('opacity-70');

            const actContainer = document.getElementById('act-container');
            actContainer.classList.remove('opacity-30', 'pointer-events-none');
            const actInput = document.getElementById('answer-act');
            actInput.disabled = false;
            actInput.placeholder = "???";

            document.getElementById('virtual-protractor').style.opacity = '0.9';
            document.getElementById('protractor-controls').classList.remove('hidden');

            const btn = document.getElementById('measure-btn');
            btn.innerText = "Submit Data";
            btn.onclick = checkMeasureAnswer;

            playTone(800, 'sine', 0, 0.2);

            actInput.focus();
        };

        window.checkMeasureAnswer = function () {
            playSound('click');
            const estInput = document.getElementById('answer-est').value;
            const actInput = document.getElementById('answer-act').value;
            const slide = slides[currentSlide];

            if (!actInput) {
                showFail("Must enter the Actual measurement from the protractor loh!");
                return;
            }

            const est = parseInt(estInput);
            const act = parseInt(actInput);
            const target = slide.target;

            if (Math.abs(act - target) > 2) {
                showFail('Aiyo, your Actual Measurement is wrong leh! Try aligning the 0° base line perfectly with the pink line.');
                return;
            }

            if (Math.abs(est - target) > 25) {
                showFail('Your actual measurement is correct, but your Estimate is too far off loh! Look at it carefully before measuring next time!');
                return;
            }

            showSuccess();
        };

        window.checkAnswer = function () {
            playSound('click');
            const input = document.getElementById('answer-input').value.toLowerCase().trim();
            const slide = slides[currentSlide];

            if (!input) return;

            if (slide.ans.includes(input)) {
                showSuccess();
            } else {
                showFail(slide.hint);
            }
        };

        function showSuccess() {
            playSound('win');
            xp += 10;
            xpDisplay.innerText = xp;

            const titles = ["COMBO!", "LEVEL UP!", "DIAMOND!", "STEADY LEH!"];
            feedbackTitle.innerText = titles[Math.floor(Math.random() * titles.length)];
            feedbackTitle.style.color = "#a4e171";
            feedbackMessage.innerText = "+10 XP";

            feedbackModal.style.display = "flex";
        }

        function showFail(hint) {
            playSound('lose');
            const container = document.getElementById('game-container');
            container.classList.add('animate-shake');
            setTimeout(() => container.classList.remove('animate-shake'), 300);

            const hintEl = document.getElementById('hint-text');
            const hintContent = document.getElementById('hint-content');
            hintContent.innerText = "Aiyo! " + hint;
            hintEl.classList.remove('hidden');
        }

        window.nextSlide = function () {
            playSound('click');
            feedbackModal.style.display = "none";
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                ProgressTracker.autoSave({ step: currentSlide, xp: xp });
                renderSlide();
            }
        };

        window.prevSlide = function () {
            playSound('click');
            if (currentSlide > 0) {
                currentSlide--;
                ProgressTracker.autoSave({ step: currentSlide, xp: xp });
                renderSlide();
            }
        };

        function initGame() {
            if (typeof ProgressTracker !== 'undefined') {
                ProgressTracker.init(async function(tracker) {
                    try {
                        const saved = await tracker.load();
                        if (saved) {
                            const p = saved;
                            currentSlide = p.step || 0;
                            xp = p.xp || 0;
                            document.getElementById('xp-display').innerText = xp;
                        }
                    } catch(e) {
                        console.error('Progress load error:', e);
                    }
                    renderSlide();
                });
            } else {
                renderSlide();
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initGame);
        } else {
            initGame();
        }
    </script>
