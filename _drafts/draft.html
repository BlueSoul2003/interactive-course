                toast.style.transition = 'opacity 0.5s ease';

            }, 2500);

            let pool = allSwipeData.filter(item => !state.seenSwipes.includes(item.id));
            if (pool.length === 0) pool = allSwipeData.filter(item => !state.masteredSwipes.includes(item.id));
            state.swipeQueue = shuffle([...pool]).slice(0, 10);
            state.swipeCard = state.swipeQueue[0];
            state.swipeDirection = null;
            state.swipeFeedback = null;
            changeMode('swipe');
        };

        window.startEjaanMode = () => {
            let pool = allEjaanData.filter(item => !state.seenEjaan.includes(item.id));
            if (pool.length === 0) pool = allEjaanData.filter(item => !state.masteredEjaan.includes(item.id));
            state.ejaanQueue = shuffle([...pool]).slice(0, 5);
            state.currentEjaan = state.ejaanQueue[0];
            if (state.currentEjaan) {
                state.currentEjaanChoices = shuffle([state.currentEjaan.wrong, state.currentEjaan.right]);
            }
            state.ejaanFeedback = null;
            changeMode('ejaan');
        };

        window.startGrammarMode = () => {
            let pool = allGrammarRules.filter(item => !state.seenGrammar.includes(item.id));
            if (pool.length === 0) pool = allGrammarRules.filter(item => !state.masteredGrammar.includes(item.id));
            state.grammarQueue = shuffle([...pool]).slice(0, 3);
            state.currentGrammar = state.grammarQueue[0];
            state.grammarFeedback = null;
            changeMode('grammar');
        };

        window.startBossMode = () => {
            let pool = allBossData.filter(item => !state.seenBoss.includes(item.id));
            if (pool.length === 0) { pool = [...allBossData]; state.seenBoss = []; }
            const randomBoss = pool[Math.floor(Math.random() * pool.length)];
            state.seenBoss.push(randomBoss.id);
            state.activeBossGroup = randomBoss;
            state.foundBugs = [];
            state.activeBugId = null;
            changeMode('boss');
        };

        window.printNotes = () => {
            window.print();
        };

        // --- Swipe 拖拽逻辑 ---
        window.handleDragStart = (e) => {
            if (state.swipeDirection || state.swipeFeedback || !state.swipeCard) return;
            state.isDragging = true;
            state.dragStartX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            state.dragCurrentX = state.dragStartX;
        };

        window.handleDragMove = (e) => {
            if (!state.isDragging) return;
            state.dragCurrentX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;

            const deltaX = state.dragCurrentX - state.dragStartX;
            const card = document.getElementById('swipe-card-el');
            const badgeNope = document.getElementById('badge-nope');
            const badgeLike = document.getElementById('badge-like');

            if (card) card.style.transform = `translateX(${deltaX}px) rotate(${deltaX * 0.05}deg)`;
            if (badgeNope) badgeNope.style.opacity = Math.min(1, Math.max(0, -deltaX / 100));
            if (badgeLike) badgeLike.style.opacity = Math.min(1, Math.max(0, deltaX / 100));
        };

        window.handleDragEnd = () => {
            if (!state.isDragging) return;
            state.isDragging = false;
            const deltaX = state.dragCurrentX - state.dragStartX;
            if (deltaX > 100) window.handleSwipe(true);
            else if (deltaX < -100) window.handleSwipe(false);
            else {
                state.dragStartX = 0; state.dragCurrentX = 0;
                render(); // 弹回
            }
        };

        window.handleSwipe = (isBetul) => {
            if (state.swipeDirection || state.swipeFeedback) return;
            const isActuallyCorrect = state.swipeCard.isCorrect;
            const userGotItRight = isBetul === isActuallyCorrect;

            if (!state.seenSwipes.includes(state.swipeCard.id)) state.seenSwipes.push(state.swipeCard.id);

            state.historyLog.unshift({
                id: Date.now(), mode: '刷卡',
                question: `${state.swipeCard.word} (${state.swipeCard.meaning})`,
                userAns: isBetul ? 'BETUL (正确)' : 'SALAH (错误)',
                correctAns: isActuallyCorrect ? 'BETUL' : `SALAH -> ${state.swipeCard.correction}`,
                isCorrect: userGotItRight, attempts: 1, rawItem: state.swipeCard
            });

            if (userGotItRight) {
                state.score += 15;
                state.swipeFeedback = { type: 'success', msg: isActuallyCorrect ? '答对了！这个字拼写完全正确！' : '答对了！你成功抓出错别字！' };
                if (!state.masteredSwipes.includes(state.swipeCard.id)) state.masteredSwipes.push(state.swipeCard.id);
            } else {
                state.swipeFeedback = { type: 'error', msg: isActuallyCorrect ? '其实这是对的！' : `错了！应为：${state.swipeCard.correction}` };
            }

            state.swipeDirection = isBetul ? 'right' : 'left';
            state.dragStartX = 0; state.dragCurrentX = 0;
            render();

            setTimeout(() => {
                state.swipeFeedback = null;
                state.swipeDirection = null;
                state.swipeQueue.shift();
                state.swipeCard = state.swipeQueue.length > 0 ? state.swipeQueue[0] : null;
                render();
            }, 1500);
        };

        // --- Ejaan 逻辑 ---
        window.handleEjaanClick = (selectedWord) => {
            if (state.ejaanFeedback) return;
            const isCorrect = selectedWord === state.currentEjaan.right;
            if (!state.seenEjaan.includes(state.currentEjaan.id)) state.seenEjaan.push(state.currentEjaan.id);

            state.historyLog.unshift({
                id: Date.now(), mode: '二选一', question: state.currentEjaan.meaning,
                userAns: selectedWord, correctAns: state.currentEjaan.right,
                isCorrect: isCorrect, attempts: 1, rawItem: state.currentEjaan
            });

            if (isCorrect) {
                state.score += 10;
                state.ejaanFeedback = { type: 'success', msg: '命中！已完全掌握。' };
                if (!state.masteredEjaan.includes(state.currentEjaan.id)) state.masteredEjaan.push(state.currentEjaan.id);
            } else {
                state.ejaanFeedback = { type: 'error', msg: `记住！正确写法是 ${state.currentEjaan.right}` };
            }
            render();

            setTimeout(() => {
                state.ejaanFeedback = null;
                state.ejaanQueue.shift();
                state.currentEjaan = state.ejaanQueue.length > 0 ? state.ejaanQueue[0] : null;
                if (state.currentEjaan) state.currentEjaanChoices = shuffle([state.currentEjaan.wrong, state.currentEjaan.right]);

            }, 1500);
        };

        // --- Grammar 逻辑 ---
        window.handleGrammarClick = (selectedChoice) => {
            if (state.grammarFeedback) return;
            const isCorrect = selectedChoice === state.currentGrammar.quiz.answer;
            if (!state.seenGrammar.includes(state.currentGrammar.id)) state.seenGrammar.push(state.currentGrammar.id);

            state.historyLog.unshift({
                id: Date.now(), mode: '语法', question: state.currentGrammar.quiz.sentence.replace('________', '[?]'),

            if (isCorrect) {
                state.score += 20;
                state.grammarFeedback = { type: 'success', msg: '套用公式正确！' };
                if (!state.masteredGrammar.includes(state.currentGrammar.id)) state.masteredGrammar.push(state.currentGrammar.id);
            } else {
                state.grammarFeedback = { type: 'error', msg: `再看一眼口诀：${state.currentGrammar.rule}` };

            render();

            setTimeout(() => {
                state.grammarFeedback = null;
                state.grammarQueue.shift();
                state.currentGrammar = state.grammarQueue.length > 0 ? state.grammarQueue[0] : null;

        // --- Boss 逻辑 ---
        window.handleBugClick = (id) => {

        window.submitBossFix = () => {
            const inputEl = document.getElementById('bossFixInput');
            if (!inputEl) return;
            const fixInput = inputEl.value;
            const bugItem = state.activeBossGroup.text.find(b => b.id === state.activeBugId);
            const isCorrect = fixInput.trim().toLowerCase() === bugItem.correct.toLowerCase();

            state.historyLog.unshift({
                id: Date.now(), mode: 'Debug', question: bugItem.text,
                userAns: fixInput, correctAns: bugItem.correct,
                isCorrect: isCorrect, attempts: 1, rawItem: bugItem

            if (isCorrect) {
                state.foundBugs.push(state.activeBugId);
                state.activeBugId = null;
                state.score += 50;
                showToast("修复成功！", true);

        // --- History & Retry ---
        window.toggleHistory = (forceClose = false) => {
            state.isHistoryOpen = forceClose ? false : !state.isHistoryOpen;

        };

        window.clearHistory = () => {
            state.masteredSwipes = []; state.masteredEjaan = []; state.masteredGrammar = [];
            state.seenSwipes = []; state.seenEjaan = []; state.seenGrammar = []; state.seenBoss = [];

        window.openRetry = (id) => {
            const logItem = state.historyLog.find(l => l.id === id);
            if (logItem && !logItem.isCorrect) {

                } else if (mode === '二选一') {
                    const choicesHtml = state.retryEjaanChoices.map(c => `
                        <button onclick="submitRetry(${c === raw.right}, '${escapeHtml(c)}')" class="w-full py-4 border-4 border-gray-200 text-gray-700 font-bold text-xl rounded-xl hover:bg-gray-50 hover:border-blue-400 transition-all">${c}</button>
                    `).join('');
                    retryContent = `
                        <div class="text-center">
                            <p class="text-gray-500 font-bold mb-4">选出正确的拼写：</p>
                            <p class="text-xl font-black text-blue-800 bg-blue-50 py-3 px-6 rounded-xl inline-block mb-8">${raw.meaning}</p>
                            <div class="flex flex-col gap-4">${choicesHtml}</div>
                        </div>`;
                } else if (mode === '语法') {
                    const sentence = escapeHtml(raw.quiz.sentence).replace('________', '[ ? ]');
                    const choicesHtml = raw.quiz.choices.map(c => `
                        <button onclick="submitRetry(${c === raw.quiz.answer}, '${escapeHtml(c)}')" class="flex-1 py-3 border-4 border-gray-200 text-gray-700 font-bold text-lg rounded-xl hover:bg-purple-50 hover:border-purple-400 transition-all">${c}</button>
                    `).join('');
                    retryContent = `
                        <div class="text-center">
                            <p class="text-gray-500 font-bold mb-6">套用口诀填空：</p>
                            <p class="text-xl text-gray-800 font-medium mb-8 leading-relaxed">${sentence}</p>
                            <div class="flex justify-center gap-4">${choicesHtml}</div>
                        </div>`;
                } else if (mode === 'Debug') {
                    retryContent = `
                        <div class="text-center">
                            <p class="text-gray-500 font-bold mb-4">修复这段文字中的 Bug：</p>
                            <p class="text-2xl font-mono bg-gray-900 text-red-400 py-4 px-6 rounded-xl mb-6 shadow-inner">${raw.text}</p>
                            <input type="text" id="retryBugFix" placeholder="输入正确写法..." class="w-full border-4 border-gray-200 rounded-xl p-4 text-xl font-bold mb-6 focus:border-blue-500 focus:outline-none" onkeydown="if(event.key === 'Enter') submitRetryInput()" />
                            <button onclick="submitRetryInput()" class="w-full py-4 bg-orange-500 hover:bg-orange-600 text-white font-bold text-xl rounded-xl transition-all">提交修复</button>
                        </div>`;
                }

                html += `
                <div class="fixed inset-0 bg-gray-900/80 backdrop-blur-sm z-[60] flex justify-center items-center p-4 print-hidden">
                    <div class="bg-white max-w-md w-full rounded-3xl shadow-2xl overflow-hidden animate-bounce-in">
                        <div class="bg-blue-600 p-4 flex justify-between items-center text-white">
                            <h3 class="text-xl font-bold flex items-center"><i class="ph-bold ph-arrow-counter-clockwise mr-2"></i> 错题重温 (${mode})</h3>
                            <button onclick="closeRetry()" class="hover:bg-blue-500 p-1 rounded-lg transition-colors"><i class="ph-bold ph-x text-xl"></i></button>
                        </div>
                        <div class="p-8">${retryContent}</div>
                    </div>
                </div>`;

                // Focus input if debug mode
                if (mode === 'Debug') setTimeout(() => document.getElementById('retryBugFix')?.focus(), 100);
            }

            app.innerHTML = html;
        }

        // Initialize App
        render();

    </script>
</body>

</html>
