<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="maximum-scale=1.0, user-scalable=no, width=device-width">
    <title>Year 6 Unit 6 - Interactive English</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Nunito:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            user-select: none;
            touch-action: manipulation;
            background: radial-gradient(circle at top right, #e8f5e9, #f0fdf4, #e0f2fe);
            background-attachment: fixed;
            min-height: 100vh;
        }
        
        h1, h2, .comic-font { font-family: 'Comic Neue', cursive; }
        
        .section-card {
            border-radius: 1.5rem;
            border-width: 4px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            background-color: rgba(255, 255, 255, 0.95);
            transition: all 0.3s ease;
        }
        
        .dict-word {
            text-decoration: underline dashed #3b82f6 2px;
            text-underline-offset: 4px;
            cursor: pointer;
            position: relative;
            color: #1e40af;
            font-weight: 600;
        }
        
        .tooltip {
            visibility: hidden;
            background-color: #334155; color: #fff; text-align: center;
            border-radius: 8px; padding: 6px 10px; position: absolute;
            z-index: 50; bottom: 125%; left: 50%; transform: translateX(-50%);
            opacity: 0; transition: opacity 0.3s; font-size: 0.875rem;
            white-space: nowrap; font-family: 'Nunito', sans-serif; font-weight: normal;
        }
        
        .tooltip::after {
            content: ""; position: absolute; top: 100%; left: 50%; margin-left: -5px;
            border-width: 5px; border-style: solid; border-color: #334155 transparent transparent transparent;
        }
        
        .dict-word:active .tooltip, .dict-word.active .tooltip { visibility: visible; opacity: 1; }

        .animate-pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .animate-bounce-short { animation: bounceShort 0.5s ease-in-out; }
        @keyframes bounceShort { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .smart-select {
            appearance: none; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 0.5rem center; background-size: 1.2em; 
            padding-right: 2.5rem; cursor: pointer; text-align: center; text-align-last: center;
        }
        
        .toggle-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .msg-bubble-left { background-color: #e5e7eb; color: #1f2937; border-radius: 1.2rem; border-bottom-left-radius: 0.2rem; padding: 0.75rem 1rem; max-width: 85%; align-self: flex-start; margin-bottom: 1rem; }
        .msg-bubble-right { background-color: #3b82f6; color: white; border-radius: 1.2rem; border-bottom-right-radius: 0.2rem; padding: 0.75rem 1rem; max-width: 85%; align-self: flex-end; margin-bottom: 1rem; }

    </style>
</head>

rrect">add a spoonful of tamarind juice for some tanginess</option><option value="wrong">blend 2 onions</option></select>.<br><br>Finally, <select id="sel-e6" class="smart-select bg-orange-100 text-orange-800 font-bold px-2 py-1 rounded border-2 border-orange-400 outline-none w-full md:w-auto my-1"><option value="">[ Choose Step 6 ▾ ]</option><option value="correct">let everything simmer together and add a dash of belacan</option><option value="wrong">sauté the blended paste</option></select>. The belacan is Mum's secret ingredient!<br><br>I hope it turns out exactly like Mum's! Enjoy your meal and stay safe overseas.<br><br>Love,<br>Your Sibling`

        function unlockAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    oscillator.type = 'sine'; oscillator.frequency.value = 440; oscillator.connect(audioCtx.destination);
                    oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.01);
                }
            } catch(e) { console.warn("AudioContext unable to start", e); }
        }

        function playSound(type) {
            try {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                
                if (type === 'ding') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'error') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                } else if (type === 'tada') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(554, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.2); osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.6);
                }
            } catch(e) {}
        }
